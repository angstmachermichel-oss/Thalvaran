<style>
  :root{
    --ink:#0b0e10; --ink2:#12171a; --ink3:#1a2226;
    --bone:#e9e4d8; --bone-dim:#948f83;
    --aurora:#5CB6C2; --ember:#e0824a;
    --serif: Georgia, 'Times New Roman', serif;
    --mono: 'Courier New', monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--bone);font-family:var(--serif);min-height:100vh}
  .wrap{max-width:640px;margin:0 auto;padding:16px 14px 90px}
  h1,h2,h3{font-weight:400;margin:0 0 6px}
  h1{font-size:20px;letter-spacing:.02em}
  h3{font-size:15px}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-dim);margin-bottom:4px}
  .card{background:var(--ink2);border:1px solid #232b2f;border-radius:10px;padding:14px 16px;margin-bottom:12px}
  button{font-family:var(--serif);cursor:pointer;border-radius:8px;border:1px solid #2c363b;background:var(--ink3);color:var(--bone);padding:9px 14px;font-size:14px}
  button:disabled{opacity:.4;cursor:default}
  button.primary{background:linear-gradient(90deg,var(--aurora),var(--ember));color:#0b0e10;border:none;font-weight:600}
  button.ghost{background:transparent;border-color:#2c363b}
  input[type=text]{width:100%;background:var(--ink3);border:1px solid #2c363b;border-radius:8px;color:var(--bone);padding:10px;font-family:var(--serif);font-size:15px}
  select{width:100%;background:var(--ink3);border:1px solid #2c363b;color:var(--bone);padding:9px;border-radius:8px;font-family:var(--serif);font-size:14px;margin-bottom:8px}
  .tribegrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
  .tribebtn{padding:10px 8px;border-radius:8px;border:2px solid transparent;text-align:left;font-size:13px}
  .tribebtn.sel{border-color:#fff}
  .archgrid{display:flex;flex-direction:column;gap:6px;margin:10px 0}
  .archbtn{text-align:left;padding:9px 10px;border-radius:8px;border:2px solid transparent;background:var(--ink3);font-size:13px}
  .archbtn.sel{border-color:#fff}
  .reserve-outer{background:#1a2226;border-radius:20px;height:20px;overflow:hidden;position:relative;border:1px solid #2c363b}
  .reserve-fill{height:100%;background:linear-gradient(90deg,var(--ember),var(--aurora));transition:width .6s ease}
  .reserve-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:#0b0e10;font-weight:bold}
  .feed{max-height:220px;overflow-y:auto;font-family:var(--mono);font-size:12px;color:var(--bone-dim);display:flex;flex-direction:column-reverse;gap:6px}
  .feed div{border-left:2px solid var(--aurora);padding-left:8px}
  .stat{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e2529}
  .stat:last-child{border-bottom:none}
  .statval{font-family:var(--mono);font-size:15px}
  .cardsgrid{display:flex;flex-direction:column;gap:10px}
  .abcard{background:var(--ink3);border-radius:10px;padding:12px;border-left:3px solid var(--aurora)}
  .abcard .cn{font-size:14px;margin-bottom:2px}
  .abcard .ct{font-family:var(--mono);font-size:10px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.08em}
  .abcard .ce{font-size:13px;margin:6px 0;line-height:1.4}
  .chip{display:inline-block;font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:12px;margin:2px 3px 0 0;color:#0b0e10}
  .catrow{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--ink3);border-radius:8px;font-size:13px;margin-bottom:6px;cursor:pointer}
  .catrow-wrap{margin-bottom:0}
  .catrow-wrap .catrow{margin-bottom:0;border-radius:8px 8px 0 0}

  .chev{font-family:var(--mono);font-size:11px;color:var(--bone-dim)}
  .catdetail{background:#0e1315;border:1px solid #232b2f;border-top:none;border-radius:0 0 8px 8px;padding:12px 12px 10px;margin:-2px 0 8px}
  .origline{font-size:13px;line-height:1.5;margin-bottom:8px;padding-left:9px;border-left:2px solid #2c363b}
  .origline .tn{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:1px}
  .origline.accepted{border-left-color:var(--aurora)}
  .origline.pending{border-left-color:var(--ember)}
  .fusedtext{font-style:italic;font-size:14px;line-height:1.5;margin:2px 0 10px;padding:10px 12px;background:var(--ink3);border-radius:8px;border-left:3px solid var(--aurora)}

  .fusionpreview .fp-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ember);margin-bottom:6px}

  .dot{width:10px;height:10px;border-radius:50%;flex:none}

  .catname{flex:1}.badge{font-family:var(--mono);font-size:10px;color:var(--bone-dim)}
  .voteopts{display:flex;gap:8px;margin-top:10px}

  .banner{background:linear-gradient(90deg,var(--aurora),var(--ember));color:#0b0e10;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.5}
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:#0e1315;border-top:1px solid #232b2f;display:flex;z-index:60}
  .tabbtn{flex:1;background:none;border:none;color:var(--bone-dim);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:10px 2px;border-radius:0}
  .tabbtn.active{color:var(--aurora);border-top:2px solid var(--aurora)}
  .infoSubBtn{background:var(--ink3);border:1px solid #232b2f;color:var(--bone-dim);font-family:var(--mono);font-size:11px;padding:8px 12px;border-radius:16px}
  .infoSubBtn.active{background:var(--aurora);color:#08110d;border-color:var(--aurora)}
  .gmbtn{position:fixed;top:12px;right:12px;z-index:70;font-size:11px;padding:6px 10px;opacity:.65}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;overflow-y:auto}
  .overlay .wrap{background:var(--ink);min-height:100vh}
  .row{display:flex;gap:8px}.row>*{flex:1}
  .small{font-size:12px;color:var(--bone-dim)}
  .divider{height:1px;background:#232b2f;margin:14px 0}
  .talcell{display:flex;justify-content:space-between;padding:4px 0;font-family:var(--mono);font-size:12px}
  .msg{margin-bottom:10px}
  .msg .mh{font-family:var(--mono);font-size:10px;margin-bottom:2px}
  .msg .mb{font-size:14px;background:var(--ink3);padding:8px 10px;border-radius:8px;display:inline-block}
  .chatfeed{max-height:280px;overflow-y:auto;display:flex;flex-direction:column-reverse;margin-bottom:10px}
  .announce{position:fixed;inset:0;background:radial-gradient(circle at 50% 30%,#1a2226,#050607);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
  .announce-box{max-width:480px;text-align:center}
  .announce-box .eyebrow{color:var(--ember);font-size:11px}
  .announce-box p{font-size:19px;line-height:1.6;margin:18px 0 28px}
  .announce-box button{padding:12px 28px}

let _fbDb = null, _fbTried = false;
function fbReady(){
  if(_fbDb) return true;
  if(_fbTried) return false;
  _fbTried = true;
  if(!FIREBASE_CONFIG.databaseURL || typeof firebase === 'undefined') return false;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    _fbDb = firebase.database();
    return true;
  }catch(e){ console.warn('Firebase-Start fehlgeschlagen:', e); return false; }
}

const _memStore = {}; // nur Behelf, falls weder localStorage noch Firebase verfügbar sind
function _hasRealStorage(){ return typeof window!=='undefined' && window.storage && typeof window.storage.get==='function'; }
function _hasLocalStorage(){ try{ return typeof localStorage !== 'undefined'; }catch(e){ return false; } }

async function sGet(k, sh){
  if(!sh){
    // Privat: gehört nur zu diesem Gerät — nie über Firebase teilen.
    if(_hasLocalStorage()){
      try{ const raw = localStorage.getItem('thalvaran:'+k); return raw===null ? null : JSON.parse(raw); }catch(e){}
    }
    if(_hasRealStorage()){
      try{ const r=await window.storage.get(k,false); return r?JSON.parse(r.value):null; }catch(e){}
    }
    return Object.prototype.hasOwnProperty.call(_memStore,'priv:'+k) ? JSON.parse(_memStore['priv:'+k]) : null;
  }
  // Geteilt: Firebase zuerst (sobald konfiguriert), sonst Claude-Artifact-Storage, sonst Memory (nur Einzelgerät-Tests).
  if(fbReady()){
    try{
      const snap = await _fbDb.ref('shared/'+k).once('value');
      const raw = snap.val();
      return (raw===null || raw===undefined) ? null : JSON.parse(raw);
    }catch(e){ console.warn('Firebase sGet Fehler:', e); }
  }
  if(_hasRealStorage()){
    try{ const r=await window.storage.get(k,true); return r?JSON.parse(r.value):null; }catch(e){}
  }
  return Object.prototype.hasOwnProperty.call(_memStore,'shared:'+k) ? JSON.parse(_memStore['shared:'+k]) : null;
}

async function sSet(k, v, sh){
  if(!sh){
    if(_hasLocalStorage()){
      try{ localStorage.setItem('thalvaran:'+k, JSON.stringify(v)); return; }catch(e){}
    }
    if(_hasRealStorage()){
      try{ await window.storage.set(k, JSON.stringify(v), false); return; }catch(e){}
    }
    _memStore['priv:'+k] = JSON.stringify(v);
    return;
  }
  if(fbReady()){
    try{ await _fbDb.ref('shared/'+k).set(JSON.stringify(v)); return; }catch(e){ console.warn('Firebase sSet Fehler:', e); }
  }
  if(_hasRealStorage()){
    try{ await window.storage.set(k, JSON.stringify(v), true); return; }catch(e){}
  }
  _memStore['shared:'+k] = JSON.stringify(v);
}

let _lastSnapshot = null;
async function loadSharedDataOnly(){
  const reserve = await sGet('reserve', true);
  const events = await sGet('events', true);
  const guests = await sGet('guests', true);
  const kodex = await sGet('kodex', true);
  const pending = await sGet('pending', true);
  const fu = await sGet('fusionUnlocked', true);
  const economy = await sGet('economy', true);
  const hands = await sGet('hands', true);
  const items = await sGet('items', true);
  const chat = await sGet('chat', true);
  const announcement = await sGet('announcement', true);
  const incapacitated = await sGet('incapacitated', true);
  const votingLock = await sGet('votingLock', true);
  if(reserve!==null) state.reserve = reserve.value;
  if(events) state.events = events;
  if(guests) state.guests = guests;
  if(kodex) state.kodex = kodex;
  state.pending = pending && pending.active ? pending : null;
  state.fusionUnlocked = !!(fu && fu.on);
  if(economy) state.economy = economy;
  if(hands) state.hands = hands;
  if(items) state.items = items;
  if(chat) state.chat = chat;
  state.announcement = announcement;
  if(incapacitated) state.incapacitated = incapacitated;
  state.votingLock = votingLock;

  const snapshot = JSON.stringify({reserve:state.reserve, events:state.events, guests:state.guests, kodex:state.kodex,

    items:state.items, chat:state.chat, announcement:state.announcement, incapacitated:state.incapacitated, votingLock:state.votingLock});
  const changed = snapshot !== _lastSnapshot;
  _lastSnapshot = snapshot;
  return changed;
}

const TRIBE_BASE_TIER = {
  fer:{g:1,m:2}, val:{g:2,m:0}, moy:{g:1,m:1}, rhu:{g:2,m:0}, axi:{g:1,m:2}, myr:{g:0,m:0}, sol:{g:2,m:0}
};
const GLUT_TIERS=[3,5,7], MARKEN_TIERS=[1,2,3];
function clampTier(v){ return Math.max(0, Math.min(2, v)); }
function starterEconomy(code){
  const p = PLAYERS[code]; if(!p) return {glut:5, marken:2};
  const base = TRIBE_BASE_TIER[p.tribe] || {g:1,m:1};
  let g = base.g, m = base.m;
  if(p.archetype==='aeltester') m = clampTier(m+1);
  if(p.archetype==='lehrling') g = clampTier(g-1);
  if(p.archetype==='hueter') g = clampTier(g+1);
  return { glut: GLUT_TIERS[g], marken: MARKEN_TIERS[m] };
}
function starterHand(code){
  const p = PLAYERS[code]; if(!p) return [];
  const {tribe, archetype} = p;
  const hand = [];
  if(archetype==='aeltester'){
    hand.push('ratsstimme');
    const tribeKeyByTribe = {fer:'kreisbefehl', val:'buffetschluessel', moy:'torimpuls', rhu:'wegzeichen', sol:'gluthauch'};
    if(tribeKeyByTribe[tribe]) hand.push(tribeKeyByTribe[tribe]);
  } else if(archetype==='stimme'){
    hand.push('lauschen');
    if(tribe==='axi') hand.push('folgenglied');
    if(tribe==='myr') hand.push('dritterton');
  } else if(archetype==='skeptiker'){
    hand.push('widerstand');
    if(tribe==='myr') hand.push('dritterton');
  } else if(archetype==='lehrling'){
    // Alle Lernenden tragen Zwischenklang — außer Sera (Axiomaten), der sie bewusst verweigert wurde.
    if(code !== "XREJEH") hand.push('zwischenklang');
  } else if(archetype==='hueter'){
    if(tribe==='myr') hand.push('dritterton');
    // Auch alle Hütenden tragen Zwischenklang — ihr Geheimnis verbindet ebenso wie es trennt.
    hand.push('zwischenklang');
  }
  // Jede Rolle bekommt zusätzlich die drei stammtypischen Fähigkeiten
  hand.push('einblick_'+tribe, 'laehmung_'+tribe, 'aderlass_'+tribe);
  return hand;
}
async function registerGuest(){
  const guests=(await sGet('guests',true))||{};
  guests[state.identity.guestId] = {name:state.identity.name, tribe:state.identity.tribe, archetype:state.identity.archetype};
  await sSet('guests', guests, true);
  const economy=(await sGet('economy',true))||{};
  if(!economy[state.identity.guestId]) economy[state.identity.guestId] = starterEconomy(state.identity.guestId);
  await sSet('economy', economy, true);
  const hands=(await sGet('hands',true))||{};
  if(!hands[state.identity.guestId]) hands[state.identity.guestId] = starterHand(state.identity.guestId);
  await sSet('hands', hands, true);
  const items=(await sGet('items',true))||{};
  if(!items[state.identity.guestId]) items[state.identity.guestId] = STARTER_ITEMS[state.identity.guestId] ? [STARTER_ITEMS[state.identity.guestId]] : [];
  await sSet('items', items, true);
}
async function checkFusionUnlock(){
  const kodex=(await sGet('kodex',true))||state.kodex;
  const all=[]; Object.values(kodex).forEach(c=>c.accepted.forEach(t=>all.push(t)));
  const set=new Set(all);
  if(GRABEN.some(([a,b])=>set.has(a)&&set.has(b))){
    const flag=await sGet('fusionUnlocked',true);
    if(!flag||!flag.on){
      await sSet('fusionUnlocked',{on:true},true);
      await pushEvent('Eurya: "Zwei Stimmen, die sich widersprachen, stehen jetzt nebeneinander im selben Text." — Zwischenklang ist jetzt möglich.');
    }
  }
}

async function gmFinalize(accept){
  const pending=await sGet('pending',true); if(!pending||!pending.active) return;
  const kodex=(await sGet('kodex',true))||emptyKodex();
  if(accept){
    if(pending.type==='basis'){
      if(!kodex[pending.catId].accepted.includes(pending.tribe)) kodex[pending.catId].accepted.push(pending.tribe);
      await pushEvent(`Angenommen: "${pending.text}" (${TRIBES[pending.tribe].name}) steht im Kodex.`);
    } else {
      kodex[pending.catId].fusedWith = pending.fusionId;
      await pushEvent(`Zwischenklang gelungen: ${CATEGORIES.find(c=>c.id===pending.catId).name} ist fusioniert.`);
    }
  } else { await pushEvent('Abgelehnt: keine Tragfähigkeit gefunden.'); }
  await sSet('kodex', kodex, true);
  await sSet('pending', {active:false}, true);
  await checkFusionUnlock();
  await loadShared();
}

async function gmAdjustEconomy(guestId, field, delta){
  const economy=(await sGet('economy',true))||{};
  if(!economy[guestId]) economy[guestId]={glut:0,marken:0};
  economy[guestId][field] = Math.max(0, economy[guestId][field] + delta);
  await sSet('economy', economy, true);
  await loadShared();
}

function cardNeedsTarget(card){ return card.type==='Einblick' || card.type==='Lähmung' || card.type==='Aderlass'; }

async function playCard(cardId, targetGid){
  const card = CARD_POOL.find(c=>c.id===cardId);
  if(cardNeedsTarget(card) && !targetGid){
    state.targetingCard = cardId;
    render();
    return;
  }
  const economy=(await sGet('economy',true))||{};
  const mine = economy[state.identity.guestId] || {glut:0,marken:0};
  if(card.cost > 0 && mine.marken < card.cost){ alert('Nicht genug Marken.'); return; }
  if(card.cost > 0){ mine.marken -= card.cost; economy[state.identity.guestId]=mine; }

  if(card.type==='Einblick' && targetGid){
    const hands=(await sGet('hands',true))||{};
    const targetHand=(hands[targetGid]||[]).map(cid=>{ const c=CARD_POOL.find(x=>x.id===cid); return c?c.name:cid; });
    const targetName = (state.guests[targetGid]||{}).name || 'diese Person';
    await sSet('economy', economy, true);
    await pushEvent(`${state.identity.name} (${TRIBES[state.identity.tribe].name}) nutzt "${card.name}" an ${targetName}.`);
    await loadShared();
    alert(`Fähigkeiten von ${targetName}:\n` + (targetHand.length ? targetHand.join('\n') : '(keine)'));
    state.targetingCard = null;
    render();
    return;
  }

  if(card.type==='Lähmung' && targetGid){
    const inc=(await sGet('incapacitated',true))||{};
    inc[targetGid] = Date.now() + 5*60*1000;
    await sSet('incapacitated', inc, true);
    await sSet('economy', economy, true);
    const targetName = (state.guests[targetGid]||{}).name || 'diese Person';
    await pushEvent(`${state.identity.name} (${TRIBES[state.identity.tribe].name}) macht ${targetName} für 5 Minuten handlungsunfähig ("${card.name}").`);
    state.targetingCard = null;
    await loadShared();
    return;
  }

  if(card.type==='Aderlass' && targetGid){
    const targetEco = economy[targetGid] || {glut:0,marken:0};
    const amount = Math.min(2, targetEco.glut);
    targetEco.glut -= amount;
    mine.glut = (mine.glut||0) + amount;
    economy[targetGid] = targetEco;
    economy[state.identity.guestId] = mine;
    await sSet('economy', economy, true);
    const targetName = (state.guests[targetGid]||{}).name || 'diese Person';
    await pushEvent(`${state.identity.name} (${TRIBES[state.identity.tribe].name}) fordert ${amount} Glut von ${targetName} ("${card.name}").`);
    state.targetingCard = null;
    await loadShared();
    return;
  }

  await sSet('economy', economy, true);
  await pushEvent(`${state.identity.name} (${TRIBES[state.identity.tribe].name}) spielt "${card.name}".`);
  state.targetingCard = null;
  await loadShared();
}

function renderTradeQR(){
  const canvas = document.getElementById('myQrCanvas');
  const fallback = document.getElementById('qrFallback');
  if(!canvas) return;
  if(typeof QRCode === 'undefined'){
    if(fallback) fallback.textContent = 'QR-Code aktuell nicht verfügbar — der Code oben funktioniert genauso gut.';
    return;
  }
  QRCode.toCanvas(canvas, state.identity.guestId, {width:160, margin:1, color:{dark:'#0b0e10', light:'#e9e3d6'}}, function(err){
    if(err){
      if(fallback) fallback.textContent = 'QR-Code konnte nicht erzeugt werden — der Code oben funktioniert genauso gut.';
      return;
    }
    canvas.style.display = 'block';
    if(fallback) fallback.textContent = '';
  });
}

async function startScan(){
  state.tradeScanning = true; state.tradeError = null; render();
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video = document.getElementById('scanVideo');
    video.srcObject = stream;
    await video.play();
    const canvas = document.getElementById('scanCanvas');
    const ctx = canvas.getContext('2d');
    state._scanStream = stream;
    const tick = () => {
      if(!state.tradeScanning) return;
      if(video.readyState === video.HAVE_ENOUGH_DATA && typeof jsQR !== 'undefined'){
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if(code && code.data){ resolveTarget(code.data.trim().toUpperCase()); return; }
      }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }catch(e){
    state.tradeError = 'Kamera nicht verfügbar — bitte Code manuell eingeben.';
    state.tradeScanning = false;
    render();
  }
}
function stopScan(){
  state.tradeScanning = false;
  if(state._scanStream){ state._scanStream.getTracks().forEach(t=>t.stop()); state._scanStream = null; }
}
function resolveTarget(code){
  stopScan();
  if(code === state.identity.guestId){ state.tradeError = 'Du kannst dir selbst nichts schicken.'; render(); return; }
  const g = state.guests[code];
  if(!g){ state.tradeError = 'Code nicht erkannt — Person hat sich evtl. noch nicht eingeloggt.'; render(); return; }
  state.tradeTarget = code;
  state.tradeTargetName = g.name;
  state.tradeError = null;
  render();
}
async function sendResourcesTo(){
  const glutAmt = parseInt(document.getElementById('sendGlut').value)||0;
  const markenAmt = parseInt(document.getElementById('sendMarken').value)||0;
  if(glutAmt<=0 && markenAmt<=0) return;
  const economy=(await sGet('economy',true))||{};
  const mine = economy[state.identity.guestId]||{glut:0,marken:0};
  const target = economy[state.tradeTarget]||{glut:0,marken:0};
  const g = Math.max(0, Math.min(glutAmt, mine.glut));
  const m = Math.max(0, Math.min(markenAmt, mine.marken));
  mine.glut -= g; mine.marken -= m;
  target.glut = (target.glut||0)+g; target.marken=(target.marken||0)+m;
  economy[state.identity.guestId]=mine; economy[state.tradeTarget]=target;
  await sSet('economy', economy, true);
  await pushEvent(`${state.identity.name} schickt ${state.tradeTargetName} ${g} Glut und ${m} Marken.`);
  state.tradeTarget=null; state.tradeTargetName=null;
  await loadShared();
}
async function sendCardTo(cardId){
  const hands=(await sGet('hands',true))||{};
  const mine = hands[state.identity.guestId]||[];
  const idx = mine.indexOf(cardId);
  if(idx===-1) return;
  mine.splice(idx,1);
  const target = hands[state.tradeTarget]||[];
  target.push(cardId);
  hands[state.identity.guestId]=mine; hands[state.tradeTarget]=target;
  await sSet('hands', hands, true);
  const c = CARD_POOL.find(x=>x.id===cardId);
  await pushEvent(`${state.identity.name} gibt "${c.name}" an ${state.tradeTargetName} weiter.`);
  state.tradeTarget=null; state.tradeTargetName=null;
  await loadShared();
}
async function sendItemTo(idx){

function renderCatDetail(cat, st, pending){
  const availableFusions = FUSIONS.filter(f=>f.cat===cat.id && f.tribes.every(t=>st.accepted.includes(t)) && !st.fusedWith);
  let html = '';

  if(st.fusedWith){
    const f = FUSIONS.find(x=>x.id===st.fusedWith);
    html += `<div class="fusedtext">"${f.text}"</div>`;
    html += `<div class="small" style="margin-bottom:6px">Entstanden aus:</div>`;
    html += f.tribes.map(t=>tribeLine(t, cat.saetze[t], 'accepted')).join('');
  } else {
    if(st.accepted.length){
      html += st.accepted.map(t=>tribeLine(t, cat.saetze[t], 'accepted')).join('');
    }
    if(pending && pending.catId===cat.id && pending.type==='basis'){
      html += tribeLine(pending.tribe, pending.text, 'pending', 'in Abstimmung');
    }
    if(!st.accepted.length && !(pending && pending.catId===cat.id)){
      html += `<div class="small">Noch kein Satz angenommen oder zur Abstimmung gestellt.</div>`;
    }
    if(availableFusions.length){
      html += availableFusions.map(f=>`
        <div class="fusionpreview">
          <div class="fp-label">Mögliches Ergebnis bei Fusion — ${f.tribes.map(t=>TRIBES[t].name).join(' + ')} (${f.cost}× Glut)</div>
          <div class="fusedtext preview">"${f.text}"</div>
        </div>`).join('');
    }
  }
  return `<div class="catdetail">${html}</div>`;
}

        const open = state.kodexExpanded === c.id;
        return `<div class="catrow-wrap ${open?'open':''}">
          <div class="catrow" data-cat="${c.id}"><div class="dot ${dc}"></div><div class="catname">${c.name}</div><div class="badge">${badge}</div><div class="chev">${open?'▾':'▸'}</div></div>
          ${open ? renderCatDetail(c, st, state.pending) : ''}
        </div>`; }).join('')}
    </div>
  `;
}

function tabChat(){
  const others = Object.entries(state.guests).filter(([gid])=>gid!==state.identity.guestId);
  return `
    <div class="card">
      <div class="eyebrow">Verdacht aussprechen</div>
      <div class="small" style="margin-bottom:8px">Ein öffentlicher Verdacht kostet 1 Glut und ist für alle sichtbar — die Wahrheit bleibt Sache des Spiels, nicht der App.</div>
      <select id="suspicionTarget">
        <option value="">— Person wählen —</option>
        ${others.map(([gid,g])=>`<option value="${gid}">${g.name} (${TRIBES[g.tribe].name})</option>`).join('')}
      </select>
      <input type="text" id="suspicionNote" placeholder="Begründung (optional)"><div style="height:8px"></div>
      <button class="primary" id="raiseSuspicion" style="width:100%">Verdacht öffentlich aussprechen (1 Glut)</button>
    </div>
    <div class="card">
      <div class="eyebrow">Der Rat · gemeinsamer Kanal</div>
      <div class="chatfeed">
        ${state.chat.slice().reverse().map(m=>`<div class="msg"><div class="mh" style="color:${TRIBES[m.tribe].c}">${m.sender} · ${TRIBES[m.tribe].name}</div><div class="mb">${m.text}</div></div>`).join('') || '<div class="small">Noch keine Nachrichten.</div>'}
      </div>
      <div class="row"><input type="text" id="chatInput" placeholder="Nachricht an den Rat..."><button class="primary" id="chatSend">Senden</button></div>
    </div>
    <div class="card small">Alle Nachrichten sind für alle sichtbar — es gibt noch keinen privaten Flüsterkanal in diesem Prototyp.</div>
  `;
}
async function raiseSuspicion(targetGid, note){
  if(!targetGid) return;
  const economy=(await sGet('economy',true))||{};
  const mine = economy[state.identity.guestId]||{glut:0,marken:0};
  if(mine.glut < 1){ alert('Nicht genug Glut für einen offiziellen Verdacht.'); return; }
  mine.glut -= 1;
  economy[state.identity.guestId]=mine;
  await sSet('economy', economy, true);
  const targetName = (state.guests[targetGid]||{}).name || 'jemand';
  await pushEvent(`⚠ ${state.identity.name} (${TRIBES[state.identity.tribe].name}) spricht einen Verdacht gegen ${targetName} aus${note?': „'+note+'"':''}.`);
  await loadShared();
}

function render(){
  const scrollY = window.scrollY;
  const root = document.getElementById('root');
  if(state.isGM){ root.innerHTML = gmScreen(); attachHandlers(); window.scrollTo(0, scrollY); return; }
  if(!state.identity){ root.innerHTML = gateScreen(); attachGateHandlers(); return; }

  if(state.announcement && state.announcement.id !== state.seenAnnouncementId){
    root.innerHTML = `
      <div class="announce"><div class="announce-box">
        <div class="eyebrow">Für alle Stämme</div>
        <p>${state.announcement.text}</p>
        <button class="primary" id="ackAnnounce">Verstanden</button>
      </div></div>`;
    document.getElementById('ackAnnounce').onclick = async () => {
      state.seenAnnouncementId = state.announcement.id;
      await sSet('seenAnnouncementId', state.seenAnnouncementId, false);
      render();
    };
    return;
  }

  const tabs = {profil:tabProfil, oekonomie:tabOekonomie, karten:tabKarten, handel:tabHandel, kodex:tabKodex, chat:tabChat, info:tabInfo};
  root.innerHTML = `
    <div class="wrap">${tabs[state.tab]()}</div>
    <div class="tabbar">
      ${['profil','oekonomie','karten','handel','kodex','chat','info'].map(t=>`<button class="tabbtn ${state.tab===t?'active':''}" data-tab="${t}">${labelFor(t)}</button>`).join('')}
    </div>
  `;
  attachHandlers();
  if(state.tab==='handel') renderTradeQR();
  window.scrollTo(0, scrollY);
}
function labelFor(t){ return {profil:'Profil',oekonomie:'Glut',karten:'Karten',handel:'Handel',kodex:'Kodex',chat:'Rat',info:'Info'}[t]; }

function gateScreen(){
  return `
  <div class="wrap" style="padding-top:60px;text-align:center">
    <div class="eyebrow">Thalvaràn · Die Lange Nacht</div>
    <h1>Dein Zugang</h1>
    <div class="card" style="text-align:left">
      <input type="text" id="codeInput" placeholder="DEIN CODE" style="text-transform:uppercase;text-align:center;letter-spacing:.14em;font-family:var(--mono)">
      <button class="primary" id="codeBtn" style="width:100%;margin-top:10px">Eintreten</button>
      <div class="small" id="codeErr" style="margin-top:8px;min-height:16px"></div>
    </div>
    <p class="small">Deinen Code findest du auf deiner Einladung / Zugangsseite. Bitte nicht weitergeben.</p>
  </div>`;
}

function gmKodexOverview(){
  return `
  <div class="card">
    <div class="eyebrow">Kodex steuern — Fragmente freischalten</div>
    <div class="small" style="margin-bottom:8px">Kategorie antippen, dann einen Stammes-Satz direkt zur Abstimmung stellen.</div>
    ${CATEGORIES.map(c=>{
      const st = state.kodex[c.id] || {accepted:[], fusedWith:null};
      const open = state.gmKodexExpanded === c.id;
      const dc = st.fusedWith?'fusion':(st.accepted.length?'arbeit':'offen');
      const badge = st.fusedWith?'fusioniert':`${st.accepted.length}/7`;
      const availableFusions = FUSIONS.filter(f=>f.cat===c.id && f.tribes.every(t=>st.accepted.includes(t)) && !st.fusedWith);
      let detail = '';
      if(open){
        detail += Object.keys(TRIBES).map(t=>{
          const isAccepted = st.accepted.includes(t);
          const isPendingHere = state.pending && state.pending.catId===c.id && state.pending.type==='basis' && state.pending.tribe===t;
          const status = isAccepted ? '<span class="small" style="color:var(--aurora)">angenommen</span>'
                       : isPendingHere ? '<span class="small" style="color:var(--ember)">in Abstimmung</span>'
                       : `<button class="gmProposeBasisBtn" data-cat="${c.id}" data-tribe="${t}">Vorschlagen</button>`;
          return `<div class="origline" style="display:flex;justify-content:space-between;align-items:center">
            <span><span class="tn" style="color:${TRIBES[t].c}">${TRIBES[t].name}</span>"${c.saetze[t]}"</span>
            <span style="margin-left:8px;white-space:nowrap">${status}</span></div>`;
        }).join('');
        if(st.fusedWith){
          const f = FUSIONS.find(x=>x.id===st.fusedWith);
          detail += `<div class="fusedtext">Fusioniert: "${f.text}"</div>`;
        } else if(availableFusions.length){
          detail += availableFusions.map(f=>`<div class="fusionpreview">
            <div class="fp-label">Zwischenklang verfügbar — ${f.tribes.map(t=>TRIBES[t].name).join(' + ')} (${f.cost}× Glut)</div>
            <div class="fusedtext preview">"${f.text}"</div>
            <button data-f="${f.id}" class="proposeFusion">Fusion vorschlagen</button></div>`).join('');
        }
      }
      return `<div class="catrow-wrap ${open?'open':''}">
        <div class="catrow gmCatRow" data-cat="${c.id}"><div class="dot ${dc}"></div><div class="catname">${c.name}</div><div class="badge">${badge}</div><div class="chev">${open?'▾':'▸'}</div></div>
        ${open ? `<div class="catdetail">${detail}</div>` : ''}
      </div>`;
    }).join('')}
  </div>`;
}

function gmScreen(){
  return `
  <div class="wrap" style="padding-top:20px">
    <div class="eyebrow">Spielleitung</div>
    <h2 style="margin-bottom:14px">GM-Panel</h2>
    <div class="card"><div class="eyebrow">Reserve setzen</div>
      <div class="row"><input type="text" id="reserveInput" value="${state.gmReserveInput}"><button id="reserveSet">Setzen</button></div></div>
    <div class="card"><div class="eyebrow">Ereignis senden</div>
      <input type="text" id="eventInput" placeholder="z.B. Die Asche zeigt sich..."><div style="height:8px"></div>
      <button id="eventSend" style="width:100%">An alle senden</button></div>
    ${gmKodexOverview()}
    <div class="card"><div class="eyebrow">Tempo steuern</div>
      ${state.votingLock && state.votingLock.until > Date.now() ? `
        <div class="small" style="margin-bottom:8px">Abstimmungen pausiert bis ${new Date(state.votingLock.until).toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})}.</div>
        <button id="unlockVoting" style="width:100%">Sperre sofort aufheben</button>
      ` : `
        <div class="small" style="margin-bottom:8px">Alle Abstimmungen für eine Atempause einfrieren.</div>
        <div class="row">
          <button data-min="5" class="lockVoting">5 Min. sperren</button>
          <button data-min="10" class="lockVoting">10 Min. sperren</button>
          <button data-min="15" class="lockVoting">15 Min. sperren</button>
        </div>
      `}
    </div>
    ${state.pending ? `<div class="card"><div class="eyebrow">Laufende Abstimmung auswerten</div>
      <div style="font-style:italic;margin-bottom:8px">"${state.pending.text}"</div>${tallyHtml(state.pending)}
      ${state.pending.deadline && state.pending.deadline > Date.now() ? `<div class="small" style="margin-top:8px;color:var(--ember)">Zeitdruck läuft — endet ${new Date(state.pending.deadline).toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})}.</div>` : `
      <div class="small" style="margin-top:10px">Zeitdruck aufbauen:</div>
      <div class="row"><button data-min="2" class="setDeadline">2 Min.</button><button data-min="5" class="setDeadline">5 Min.</button></div>`}
      <div class="row" style="margin-top:10px"><button class="primary" id="finalAccept">Annehmen</button><button id="finalReject">Ablehnen</button></div></div>` : ''}
    <div class="card"><div class="eyebrow">Gäste & Ökonomie (${Object.keys(state.guests).length})</div>
      ${Object.entries(state.guests).map(([gid,g])=>{
        const eco = state.economy[gid]||{glut:0,marken:0};
        return `<div class="stat"><span style="color:${TRIBES[g.tribe].c}">${g.name} (${TRIBES[g.tribe].name})</span>
        <span class="small">Glut ${eco.glut} · Marken ${eco.marken}
        <button data-gid="${gid}" data-f="glut" data-d="1" class="ecoBtn">+G</button>
        <button data-gid="${gid}" data-f="glut" data-d="-1" class="ecoBtn">-G</button>
        <button data-gid="${gid}" data-f="marken" data-d="1" class="ecoBtn">+M</button>
        <button data-gid="${gid}" data-f="marken" data-d="-1" class="ecoBtn">-M</button></span></div>`;
      }).join('') || '<div class="small">noch niemand</div>'}
    </div>
    <button id="gmLogout" style="width:100%">Als Spielleitung abmelden</button>
  </div>`;
}

function attachGateHandlers(){
  const btn = document.getElementById('codeBtn');
  const input = document.getElementById('codeInput');
  function tryEnter(){
    const code = (input.value||'').trim().toUpperCase();
    if(code === GM_CODE){ enterAsGM(); return; }
    const p = PLAYERS[code];
    if(!p){ document.getElementById('codeErr').textContent = 'Code nicht erkannt. Bitte prüfe die Schreibweise.'; return; }
    enterWithCode(code);
  }
  btn.onclick = tryEnter;
  input.addEventListener('keydown', e => { if(e.key === 'Enter') tryEnter(); });
  input.focus();
}
async function enterWithCode(code){
  const p = PLAYERS[code];
  state.identity = { guestId: code, name: p.name, tribe: p.tribe, archetype: p.archetype,
    strengths: p.strengths, weaknesses: p.weaknesses,
    goalPersonal: p.goalPersonal, goalTribe: p.goalTribe, goalSecret: p.goalSecret,
    tick: p.tick, ritual: p.ritual };
  await sSet('playerCode', code, false);
  await registerGuest();
  await loadShared();
  if(!state._pollingStarted){ state._pollingStarted = true; setInterval(() => loadShared(true), 3000); }
}
async function enterAsGM(){
  state.isGM = true;
  await sSet('isGM', true, false);
  await loadShared();
  if(!state._pollingStarted){ state._pollingStarted = true; setInterval(() => loadShared(true), 3000); }
  render();
}
function attachHandlers(){
  document.querySelectorAll('.tabbtn').forEach(b=>b.onclick=()=>{ stopScan(); state.tab=b.dataset.tab; render(); });
  document.querySelectorAll('.catrow').forEach(b=>b.onclick=()=>{
    const id = b.dataset.cat;
    state.kodexExpanded = (state.kodexExpanded === id) ? null : id;
    render();
  });
  const gmLogout=document.getElementById('gmLogout'); if(gmLogout) gmLogout.onclick = async () => {
    state.isGM = false;
    await sSet('isGM', null, false);
    render();
  };
  document.querySelectorAll('.lockVoting').forEach(b=>b.onclick=()=>gmLockVoting(parseInt(b.dataset.min)));
  const unlockVoting=document.getElementById('unlockVoting'); if(unlockVoting) unlockVoting.onclick=gmUnlockVoting;
  document.querySelectorAll('.setDeadline').forEach(b=>b.onclick=()=>gmSetDeadline(parseInt(b.dataset.min)));
  const voteJa=document.getElementById('voteJa'); if(voteJa) voteJa.onclick=()=>castVote('ja');
  const voteNein=document.getElementById('voteNein'); if(voteNein) voteNein.onclick=()=>castVote('nein');
  document.querySelectorAll('.playCard').forEach(b=>b.onclick=()=>playCard(b.dataset.c));
  document.querySelectorAll('.playCardTarget').forEach(b=>b.onclick=()=>playCard(b.dataset.c, b.dataset.target));
  document.querySelectorAll('.cancelTarget').forEach(b=>b.onclick=()=>{ state.targetingCard=null; render(); });
  const startScanBtn=document.getElementById('startScan'); if(startScanBtn) startScanBtn.onclick=startScan;
  const confirmManual=document.getElementById('confirmManualCode'); if(confirmManual) confirmManual.onclick=()=>{ const v=document.getElementById('manualTargetCode').value.trim().toUpperCase(); if(v) resolveTarget(v); };
  const clearTarget=document.getElementById('clearTarget'); if(clearTarget) clearTarget.onclick=()=>{ state.tradeTarget=null; state.tradeTargetName=null; render(); };
  const sendResBtn=document.getElementById('sendResources'); if(sendResBtn) sendResBtn.onclick=sendResourcesTo;
  document.querySelectorAll('.sendCard').forEach(b=>b.onclick=()=>sendCardTo(b.dataset.c));
  document.querySelectorAll('.infoSubBtn').forEach(b=>b.onclick=()=>{ state.infoSub=b.dataset.sub; render(); });
  document.querySelectorAll('.sendItem').forEach(b=>b.onclick=()=>sendItemTo(parseInt(b.dataset.idx)));
  const chatSend=document.getElementById('chatSend'); if(chatSend) chatSend.onclick=()=>{ sendChat(document.getElementById('chatInput').value); };
  const chatInput=document.getElementById('chatInput'); if(chatInput) chatInput.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); sendChat(chatInput.value); } });
  const raiseSuspicionBtn=document.getElementById('raiseSuspicion'); if(raiseSuspicionBtn) raiseSuspicionBtn.onclick=()=>{
    const t = document.getElementById('suspicionTarget').value;
    const n = document.getElementById('suspicionNote').value;
    raiseSuspicion(t, n);
  };
  document.querySelectorAll('.gmCatRow').forEach(b=>b.onclick=()=>{
    const id = b.dataset.cat;
    state.gmKodexExpanded = (state.gmKodexExpanded === id) ? null : id;
    render();
  });
  document.querySelectorAll('.gmProposeBasisBtn').forEach(b=>b.onclick=()=>gmProposeBasis(b.dataset.cat, b.dataset.tribe));
  document.querySelectorAll('.proposeFusion').forEach(b=>b.onclick=()=>gmProposeFusion(b.dataset.f));
  const finalAccept=document.getElementById('finalAccept'); if(finalAccept) finalAccept.onclick=()=>gmFinalize(true);
  const finalReject=document.getElementById('finalReject'); if(finalReject) finalReject.onclick=()=>gmFinalize(false);
  const reserveSet=document.getElementById('reserveSet'); if(reserveSet) reserveSet.onclick=()=>gmSetReserve(document.getElementById('reserveInput').value);
  const eventSend=document.getElementById('eventSend'); if(eventSend) eventSend.onclick=()=>gmBroadcast(document.getElementById('eventInput').value);
  document.querySelectorAll('.ecoBtn').forEach(b=>b.onclick=()=>gmAdjustEconomy(b.dataset.gid, b.dataset.f, parseInt(b.dataset.d)));
  const switchCode=document.getElementById('switchCode'); if(switchCode) switchCode.onclick = async () => {
    await sSet('playerCode', null, false);
    state.identity = null;
    render();
  };
}

async function boot(){
  await initSharedIfEmpty();
  const seen = await sGet('seenAnnouncementId', false);
  if(seen) state.seenAnnouncementId = seen;
  const savedGM = await sGet('isGM', false);
  if(savedGM){ await enterAsGM(); return; }
  const savedCode = await sGet('playerCode', false);
  if(savedCode && PLAYERS[savedCode]){
    await enterWithCode(savedCode);
  } else {
    render();
  }
}
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch((e) => console.warn("SW-Registrierung fehlgeschlagen:", e));
  });
}
boot();
</script>
</body>
</html>
