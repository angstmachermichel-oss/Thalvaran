<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thalvaràn — Die Lange Nacht</title>
<style>
  :root{
    --ink:#080d10; --frost:#16242a; --frost-2:#1d2f35;
    --bone:#e9e3d6; --bone-dim:#a4aba8; --aurora:#63c6a3;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
    --bar:54px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--ink);color:var(--bone);font-family:var(--serif);overflow:hidden}
  header.bar{height:var(--bar);position:fixed;top:0;left:0;right:0;z-index:10;
    background:color-mix(in oklab,var(--ink),#000 28%);border-bottom:1px solid var(--frost);
    backdrop-filter:blur(8px);display:flex;align-items:center;gap:14px;padding:0 18px}
  .brand{display:flex;align-items:center;gap:10px;margin-right:auto;min-width:0}
  .sigil{width:28px;height:28px;flex:0 0 auto}
  .sigil svg{width:100%;height:100%}
  .sigil .r{fill:none;stroke:var(--aurora);stroke-width:1.6}
  .sigil .c{fill:var(--aurora)}
  .brand .mk{font-size:16px;letter-spacing:.05em;white-space:nowrap}
  .brand .sub{font-family:var(--mono);font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--bone-dim);display:block;margin-top:1px;white-space:nowrap}
  nav{display:flex;gap:4px}
  nav button{font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;
    color:var(--bone-dim);background:transparent;border:1px solid var(--frost-2);border-radius:20px;
    padding:8px 14px;cursor:pointer;transition:.2s;white-space:nowrap}
  nav button:hover{color:var(--bone)}
  nav button[aria-current="true"]{color:#08110d;background:var(--aurora);border-color:var(--aurora)}
  @media (max-width:560px){
    .brand .sub{display:none}
    nav button{padding:8px 11px;font-size:10px}
  }
  .frames{position:fixed;top:var(--bar);left:0;right:0;bottom:0}
  iframe.frame{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--ink)}
  iframe.frame.on{display:block}
</style>
</head>
<body>
<header class="bar">
  <div class="brand">
    <span class="sigil"><svg viewBox="0 0 28 28"><circle class="r" cx="14" cy="14" r="12"/><circle class="c" cx="14" cy="14" r="3.2"/></svg></span>
    <span><span class="mk">Thalvaràn</span><span class="sub">Die Lange Nacht</span></span>
  </div>
  <nav aria-label="Ansicht">
    <button id="t-roman" aria-current="true">Der Roman</button>
    <button id="t-bibel" aria-current="false">Der Abend &amp; Anmeldung</button>
  </nav>
</header>
<div class="frames">
<iframe id="f-roman" class="frame on" title="Der Roman" srcdoc="<!DOCTYPE html>
<html lang=&quot;de&quot;>
<head>
<meta charset=&quot;UTF-8&quot;>
<meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;>
<title>Thalvaràn — Eine Vorgeschichte</title>
<style>
  /* ===== REISEPALETTE: kalt (Kollaps 2043) -> warm (Thalvaràn 2147) =====
     --warm (0..1) wird beim Scrollen gesetzt und mischt den Akzent von
     Aurora-Grün (sterbende Technik) zu Ember-Bernstein (vergrabenes Licht).
     Maschine spricht Mono, Mythos spricht Serif. */
  :root{
    --ink:#080d10; --ink-2:#0d161a; --frost:#16242a;
    --bone:#e9e3d6; --bone-dim:#a4aba8;
    --aurora:#63c6a3; --ember:#e7a44a;
    --warm:0;
    --accent:color-mix(in oklab, var(--ember), var(--aurora) calc(var(--warm) * 100%));
    --serif:&quot;Iowan Old Style&quot;,&quot;Palatino Linotype&quot;,Palatino,Georgia,&quot;Times New Roman&quot;,serif;
    --mono:ui-monospace,&quot;SF Mono&quot;,&quot;Cascadia Mono&quot;,Menlo,Consolas,monospace;
    --maxw:680px;
    --ease:cubic-bezier(.22,.7,.32,1);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
  body{margin:0;background:var(--ink);color:var(--bone);font-family:var(--serif);
    font-size:19px;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body::after{content:&quot;&quot;;position:fixed;inset:0;pointer-events:none;z-index:9;
    background:radial-gradient(120% 90% at 50% 8%,transparent 55%,rgba(0,0,0,.5) 100%);
    mix-blend-mode:multiply}

  /* Zeitachse links */
  .rail{position:fixed;left:0;top:0;bottom:0;width:54px;z-index:20;display:flex;
    flex-direction:column;align-items:center;justify-content:center;gap:18px;pointer-events:none}
  .rail .line{position:absolute;top:14%;bottom:14%;left:50%;width:1px;
    background:linear-gradient(var(--frost),var(--accent),var(--frost));opacity:.45}
  .rail .tick{font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--bone-dim);
    opacity:.3;transition:opacity .4s,color .4s;writing-mode:vertical-rl;position:relative}
  .rail .tick.on{opacity:1;color:var(--accent)}

  /* Signatur-Kreis: füllt sich + erwärmt sich mit dem Fortschritt */
  .sigil{position:fixed;top:16px;right:16px;width:44px;height:44px;z-index:21}
  .sigil svg{width:100%;height:100%;overflow:visible;transform:rotate(-90deg)}
  .sigil .ring-bg{fill:none;stroke:var(--frost);stroke-width:1.4}
  .sigil .ring{fill:none;stroke:var(--accent);stroke-width:1.4;stroke-linecap:round;
    stroke-dasharray:126;stroke-dashoffset:calc(126 - var(--warm) * 126);transition:stroke-dashoffset .15s linear}
  .sigil .core{fill:var(--accent);opacity:calc(.12 + var(--warm) * .88);
    filter:drop-shadow(0 0 calc(1px + var(--warm)*9px) var(--accent))}

  section{position:relative;padding:13vh 24px;max-width:var(--maxw);margin:0 auto;z-index:1}
  .scene{min-height:76vh;display:flex;flex-direction:column;justify-content:center}

  .rise{opacity:0;transform:translateY(12px);
    transition:opacity .7s var(--ease),transform .7s var(--ease)}
  .rise.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){.rise{opacity:1;transform:none;filter:none;transition:none}}

  /* Hero */
  .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;
    align-items:center;text-align:center;max-width:none;padding:0 24px}
  .hero .kicker{font-family:var(--mono);font-size:12px;letter-spacing:.42em;text-transform:uppercase;
    color:var(--aurora);margin-bottom:28px;opacity:.85}
  .wordmark{font-size:clamp(46px,13vw,124px);line-height:.92;font-weight:400;letter-spacing:.04em;
    margin:0;color:var(--bone);text-shadow:0 0 38px rgba(99,198,163,.18)}
  .hero .sub{margin-top:24px;color:var(--bone-dim);font-style:italic;
    font-size:clamp(15px,2.5vw,19px);max-width:40ch;line-height:1.6}
  .hero .sub .turn{color:color-mix(in oklab,var(--accent),var(--bone) 35%);font-style:normal}
  .scrollcue{margin-top:60px;font-family:var(--mono);font-size:11px;letter-spacing:.3em;
    color:var(--bone-dim);text-transform:uppercase;animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(8px);opacity:1}}
  @media (prefers-reduced-motion:reduce){.scrollcue{animation:none}}
  .heroglow{position:absolute;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(60% 50% at 50% 42%,rgba(99,198,163,.10),transparent 70%)}

  /* Kapitelkopf */
  .chapter-head{text-align:center;padding-top:22vh;padding-bottom:4vh}
  .chapter-num{font-family:var(--mono);font-size:12px;letter-spacing:.4em;color:var(--accent);text-transform:uppercase}
  .chapter-title{font-size:clamp(34px,7vw,58px);margin:14px 0 6px;font-weight:400;letter-spacing:.02em}
  .chapter-year{font-family:var(--mono);font-size:14px;color:var(--bone-dim);letter-spacing:.2em}
  .epigraph{max-width:34ch;margin:40px auto 0;font-style:italic;color:var(--bone-dim);font-size:18px;
    line-height:1.6;border-top:1px solid var(--frost);border-bottom:1px solid var(--frost);padding:22px 0}
  .epigraph cite{display:block;margin-top:12px;font-style:normal;font-family:var(--mono);
    font-size:11px;letter-spacing:.12em;color:var(--bone-dim);opacity:.7}

  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--accent);display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .eyebrow::before{content:&quot;&quot;;width:26px;height:1px;background:var(--accent);opacity:.7}
  h2.scene-title{font-size:clamp(26px,5vw,38px);font-weight:400;margin:0 0 22px;letter-spacing:.01em;line-height:1.15}
  p.lede{font-size:21px}
  p{margin:0 0 20px}
  .dim{color:var(--bone-dim)}

  .avatar{display:flex;align-items:center;gap:16px;margin:8px 0 26px}
  .avatar .disc{width:54px;height:54px;flex:0 0 auto;border-radius:50%;
    background:radial-gradient(circle at 50% 40%,var(--ink-2),#050809);border:1px solid var(--frost);
    display:grid;place-items:center;position:relative}
  .avatar .disc::after{content:&quot;&quot;;position:absolute;inset:-1px;border-radius:50%;border:1px solid var(--accent);opacity:.5}
  .avatar .disc svg{width:30px;height:30px;stroke:var(--accent);fill:none;stroke-width:1.4}
  .avatar .who b{display:block;font-size:17px;color:var(--bone);font-weight:600}
  .avatar .who span{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--bone-dim)}

  .readout{font-family:var(--mono);font-size:13px;line-height:1.9;color:var(--aurora);
    background:linear-gradient(180deg,rgba(99,198,163,.05),transparent);border-left:2px solid var(--aurora);
    padding:14px 18px;margin:8px 0 26px;letter-spacing:.03em}
  .readout .k{color:var(--bone-dim)}
  .pull{font-size:clamp(22px,4.4vw,30px);line-height:1.4;font-style:italic;color:var(--bone);
    margin:34px 0;padding-left:20px;border-left:2px solid var(--accent)}

  /* Interaktion Polaris-71 */
  .interactive{margin:6vh 0;padding:24px 20px;border:1px solid var(--frost);border-radius:4px;
    background:rgba(255,255,255,.012)}
  .interactive .label{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--bone-dim);text-align:center;margin-bottom:16px}
  #polaris{width:100%;height:160px;display:block}
  .interactive .ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;
    letter-spacing:.08em;color:var(--bone-dim);margin-top:10px}
  .interactive .note{text-align:center;font-style:italic;color:var(--bone-dim);font-size:15px;margin-top:16px}

  .chapter-end{text-align:center;padding:10vh 0 16vh}
  .chapter-end .mark{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--bone-dim);opacity:.6}
  .chapter-end .next{margin-top:10px;font-style:italic;color:var(--accent)}

  a.skip{position:absolute;left:-999px}
  a.skip:focus{left:8px;top:8px;z-index:50;background:var(--ink-2);color:var(--bone);
    padding:8px 12px;border:1px solid var(--accent)}
  /* Aufklappbare Hintergrund-Box */
  details.info{border:1px solid var(--frost);border-left:2px solid var(--accent);border-radius:3px;
    margin:4px 0 24px;background:rgba(255,255,255,.015)}
  details.info>summary{cursor:pointer;list-style:none;padding:12px 16px;font-family:var(--mono);
    font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:10px}
  details.info>summary::-webkit-details-marker{display:none}
  details.info>summary::before{content:&quot;+&quot;;font-size:17px;line-height:1;color:var(--accent)}
  details.info[open]>summary::before{content:&quot;\2013&quot;}
  details.info .ibody{padding:2px 16px 16px;color:var(--bone-dim);font-size:16px;line-height:1.66}
  details.info .ibody b{color:var(--bone)}

  /* Eis-Regler */
  .icewidget{margin:8px 0 26px;padding:18px;border:1px solid var(--frost);border-radius:4px;background:rgba(255,255,255,.012)}
  .icewidget .head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .icewidget .yr{font-family:var(--mono);font-size:30px;line-height:1;color:var(--bone)}
  .icewidget .rt{font-family:var(--mono);font-size:16px;color:var(--accent);text-align:right}
  .icewidget .rt small{display:block;color:var(--bone-dim);font-size:11px;letter-spacing:.06em;margin-top:3px}
  .icewidget canvas{width:100%;height:118px;display:block;margin:10px 0 6px}
  .icewidget input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
  .icewidget .cap{font-size:12px;color:var(--bone-dim);font-style:italic;margin-top:8px;line-height:1.5}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;padding:2px 8px;border-radius:10px;border:1px solid var(--frost);color:var(--bone-dim);white-space:nowrap}
  .tag.real{color:var(--aurora);border-color:color-mix(in oklab,var(--aurora),transparent 50%)}
  .tag.fic{color:var(--ember);border-color:color-mix(in oklab,var(--ember),transparent 50%)}

  /* Rede: Worte erscheinen wie gesprochen */
  .pull .w{opacity:.35;transition:opacity .35s ease}
  .pull.spoken .w{opacity:1}
  @media (prefers-reduced-motion:reduce){.pull .w{opacity:1;transition:none}}

  /* Orte-Globus */
  .orte{max-width:760px;text-align:center}
  .orte .sub{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .orte h2{font-size:clamp(24px,5vw,38px);font-weight:400;margin:0 0 22px}
  .globewrap{position:relative;max-width:430px;margin:0 auto}
  #globe{width:100%;aspect-ratio:1/1;display:block;touch-action:none;cursor:grab}
  #globe:active{cursor:grabbing}
  .places{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px}
  .places button{font-family:var(--mono);font-size:12px;letter-spacing:.05em;color:var(--bone-dim);
    background:transparent;border:1px solid var(--frost);border-radius:14px;padding:5px 13px;cursor:pointer;transition:.25s}
  .places button:hover,.places button[aria-current=&quot;true&quot;]{color:#08110d;background:var(--accent);border-color:var(--accent)}
  .gcallout{position:absolute;left:50%;top:6px;transform:translateX(-50%) translateY(6px);z-index:5;
    width:min(300px,86%);max-height:52%;overflow:auto;-webkit-overflow-scrolling:touch;
    background:linear-gradient(180deg,#0e1f24,#0a1417);border:1px solid color-mix(in oklab,var(--accent),var(--frost) 55%);
    border-radius:12px;padding:14px 15px 13px;box-shadow:0 14px 34px rgba(0,0,0,.5);
    opacity:0;transition:opacity .22s, transform .22s}
  .gcallout.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .gcallout[hidden]{display:none}
  .gc-close{position:absolute;top:6px;right:8px;background:transparent;border:none;color:var(--bone-dim);
    font-size:20px;line-height:1;cursor:pointer;padding:2px 6px;border-radius:7px}
  .gc-close:hover{color:var(--bone);background:rgba(255,255,255,.06)}
  .gc-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
  .gc-name{font-family:var(--serif);font-size:20px;margin:0 0 10px;color:var(--bone);line-height:1.1}
  .gc-entry{border-top:1px solid color-mix(in oklab,var(--frost),transparent 40%);padding:9px 0}
  .gc-entry:first-of-type{border-top:none;padding-top:0}
  .gc-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
  .gc-year{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.05em}
  .gc-ttl{font-weight:600;color:var(--bone);font-size:14px}
  .gc-desc{font-size:13px;line-height:1.5;color:var(--bone-dim);margin:0 0 6px}
  .gc-link{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--accent);text-decoration:none;border-bottom:1px solid color-mix(in oklab,var(--accent),transparent 55%);padding-bottom:1px}
  .gc-link:hover{border-bottom-color:var(--accent)}
  .foodgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin:14px 0 6px}
  .food{border:1px solid var(--frost);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.2s;background:transparent}
  .food:hover,.food.open{border-color:var(--ember);background:color-mix(in oklab,var(--ember),transparent 92%)}
  .food .fn{font-weight:600;color:var(--bone);font-size:14px}
  .food .fsub{display:block;font-family:var(--mono);font-size:10px;color:var(--bone-dim);letter-spacing:.04em;margin-top:2px}
  .food .fcascade{display:none;margin-top:10px;font-size:13px;line-height:1.55;color:var(--bone-dim)}
  .food.open .fcascade{display:block}
  .fchain{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin:2px 0 8px}
  .fchain span{font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--bone);
    background:color-mix(in oklab,var(--ember),transparent 86%);border:1px solid color-mix(in oklab,var(--ember),transparent 60%);border-radius:10px;padding:2px 7px}
  .fchain i{color:var(--ember);font-style:normal}
  .fsrc{display:block;margin-top:8px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--bone-dim)}
  .narrator{max-width:48ch;margin:34px auto;padding:24px 24px 22px;border-radius:16px;
    background:color-mix(in oklab,var(--ember),transparent 89%);
    border:1px solid color-mix(in oklab,var(--ember),transparent 64%);
    font-family:var(--serif);font-size:18px;line-height:1.72;color:var(--bone)}
  .narrator p{margin:0 0 13px}
  .narrator p:last-child{margin-bottom:0}
  .narrator .who{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ember);margin-bottom:12px}
  .narrator .last{color:color-mix(in oklab,var(--ember),var(--bone) 45%)}
  .readbtn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;margin-top:12px;
    border-radius:50%;border:1px solid var(--frost);background:transparent;color:var(--bone-dim);
    font-size:11px;line-height:1;cursor:pointer;transition:.2s;opacity:.55;-webkit-tap-highlight-color:transparent}
  .readbtn:hover,.readbtn:focus-visible{opacity:1;border-color:var(--accent);color:var(--accent);outline:none}
  .readbtn.on{opacity:1;border-color:var(--accent);color:var(--accent)}
  .narrator .readbtn{margin-top:6px}
  .voicepick{display:flex;flex-direction:column;gap:6px;padding:11px 12px;border-top:1px solid var(--frost);margin-top:6px}
  .voicepick label{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--bone-dim)}
  .voicepick select{background:rgba(20,20,26,.9);color:var(--bone);border:1px solid var(--frost);border-radius:6px;padding:6px 8px;font-size:13px;font-family:var(--serif)}
  .polaris{max-width:44ch;margin:30px auto 4px;padding:8px 0 8px 14px;border-left:2px solid color-mix(in oklab,var(--aurora),transparent 55%);
    font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:var(--bone-dim);line-height:1.55;text-align:left}
  .polaris b{color:var(--aurora);letter-spacing:.14em;font-weight:600}
  .polaris .sig{opacity:.6}
  .globejump{position:relative;height:160vh}
  .globejump .stick{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:0 20px}
  .globejump .gj-canvas{width:min(74vw,300px);height:min(74vw,300px);display:block}
  .gj-cap{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--bone-dim);text-align:center}
  .gj-cap .gj-a,.gj-cap .gj-b{color:var(--bone);transition:opacity .3s var(--ease)}
  .gj-cap .gj-km{color:var(--accent)}
  .gj-route{font-family:var(--serif);font-style:italic;color:var(--bone-dim);font-size:15px;max-width:30ch;text-align:center;line-height:1.5}
  @media (prefers-reduced-motion:reduce){.globejump{height:auto}.globejump .stick{height:auto;padding:48px 20px}}
  .speech{border-left:2px solid color-mix(in oklab,var(--accent),transparent 35%);padding:2px 0 2px 16px;margin:16px 0;font-family:var(--serif);font-size:18px;line-height:1.62;color:var(--bone)}
  .speech p{margin:0 0 11px}
  .speech p:last-child{margin-bottom:0}
  .speech .kick{font-weight:600;color:var(--accent)}

  /* Kapitelmenü + Zum-Anfang */
  .navtoggle{position:fixed;top:14px;left:14px;z-index:30;font-family:var(--mono);font-size:12px;letter-spacing:.08em;
    color:var(--bone);background:rgba(8,13,16,.82);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);

<!-- KAPITEL 1 -->
<div class=&quot;narrator rise&quot;>
  <span class=&quot;who&quot;>Die Erinnernden</span>
  <p>Wir sind die, die sich erinnern. Das ist unsere Aufgabe, und wir nehmen sie ernst — denn was niemand mehr erzählt, ist wirklich verloren.</p>
  <p>Was du gleich liest, ist kein Märchen. Es ist passiert, Schritt für Schritt, und meistens leise. Die Menschen darin waren wie du: Sie standen morgens auf, hatten Hunger, hatten Angst, und sie liebten jemanden.</p>
  <p>Wir bitten dich nur um eines. Lies nicht über sie hinweg. Such in jedem von ihnen ein Gesicht, das du kennst — vielleicht dein eigenes. Vielleicht das eines Kindes, das gerade im Nebenzimmer schläft.</p>
  <p>Und eines noch: Das hier ist kein Schicksal. Es ist ein Weg, den Menschen gegangen sind, ohne rechtzeitig hinzusehen. Du liest ihn nicht, um dich zu fürchten — sondern um zu sehen.</p>
  <p class=&quot;last&quot;>Dann fangen wir an.</p>
</div>

<section class=&quot;chapter-head&quot; id=&quot;kapitel-1&quot; data-year=&quot;2043&quot;>
  <div class=&quot;chapter-num rise&quot;>Kapitel 1</div>
  <h2 class=&quot;chapter-title rise&quot;>Die Schwelle</h2>
  <div class=&quot;chapter-year rise&quot;>2043</div>
  <blockquote class=&quot;epigraph rise&quot;>
    „Zwanzig Jahre lang habe ich dem Eis beim Schmelzen zugehört. Heute war keins mehr da, dem ich zuhören konnte.“
    <cite>Letzter Eintrag · Polarstation Ternberg-4</cite>
  </blockquote>
</section>

<section class=&quot;scene&quot; id=&quot;ort-arktis&quot; data-year=&quot;2043&quot; data-char=&quot;maya&quot;>
  <div class=&quot;eyebrow rise&quot;>Arktis · Ternberg-4</div>
  <div class=&quot;avatar rise&quot;>
    <span class=&quot;disc&quot;><svg viewBox=&quot;0 0 30 30&quot;><path d=&quot;M2 20 Q15 14 28 20&quot;/><path d=&quot;M6 10 Q15 2 24 10&quot;/><line x1=&quot;15&quot; y1=&quot;14&quot; x2=&quot;15&quot; y2=&quot;24&quot;/></svg></span>
    <span class=&quot;who&quot;><b>Dr. Maya El-Nasri</b><span>Klimaforscherin · Norden</span></span>
  </div>
  <p class=&quot;lede rise&quot;>Der letzte Abend, an dem noch alles gewöhnlich schien, roch nach kaltem Kaffee. Maya El-Nasri stand in der engen Messe von Ternberg-4, den Rücken an die warme Flanke des Generators gelehnt, dessen Brummen sie schon lange nicht mehr wahrnahm. Auf der Heizplatte wärmte sie den Rest der Ration in einer angeschlagenen blauen Emailletasse; der Kaffee wurde nie richtig heiss und schmeckte nach Blech. Sie trank zwei Schluck und stellte die Tasse ab.</p>
  <p class=&quot;rise&quot;>In der Ecke stand eine Pflanze unter der Wachstumslampe, halb vertrocknet, die Blätter braun an den Rändern. Sie goss sie mit einem Rest aus der Tasse — nicht, weil sie noch daran glaubte, sondern weil Giessen etwas war, das man tun konnte. Dann trug sie das Datum ins Logbuch ein, wie an jedem Abend, zog die Jacke über und ging hinaus.</p>
  <p class=&quot;rise&quot;>Der Wind hatte das Heulen verlernt. Früher hatte er an den Stahlwänden der Station gezerrt, salzig und wütend; jetzt strich er nur noch darüber, dünn, als hätte er nicht mehr genug Atem.</p>
  <p class=&quot;rise&quot;>Dr. Maya El-Nasri stand auf der Aussichtsplattform und rührte sich nicht. Unter ihr lag, wo zwanzig Jahre lang Eis gewesen war, offenes Wasser — schwarz, ruhig, kein einziges Licht darin. Vor drei Tagen war die letzte Scholle des arktischen Sommers geschmolzen. Sie hatte es kommen sehen, jahrelang, in Kurven und Prognosen. Sie hatte nur nicht gewusst, dass es so leise sein würde. Auf den ältesten Karten im Stationsarchiv war dieses Wasser noch weiss.</p>
  <p class=&quot;rise dim&quot;>Zwanzig Jahre hatte sie gewarnt, in Berichten, die niemand zu Ende las. Nun hatte sie recht behalten — und merkte, dass Recht behalten die einsamste Art ist, zu verlieren. Es war niemand mehr da, dem sie hätte sagen können: Siehst du.</p>
  <div class=&quot;readout rise&quot;>
    <span class=&quot;k&quot;>Temperatur</span> +3,2 °C<br>
    <span class=&quot;k&quot;>Methanfreisetzung</span> kritisch<br>
    <span class=&quot;k&quot;>Reflexionsverlust</span> 89 %
  </div>

  <div class=&quot;icewidget rise&quot; id=&quot;icewidget&quot;>
    <div class=&quot;head&quot;>
      <div><div class=&quot;yr&quot; id=&quot;ice-yr&quot;>2025</div><span class=&quot;tag real&quot; id=&quot;ice-tag&quot;>gemessen</span></div>
      <div class=&quot;rt&quot;><span id=&quot;ice-val&quot;>4,8</span> Tsd. km³<small>arktisches Eis<b>volumen</b> · September · PIOMAS</small></div>
    </div>
    <canvas id=&quot;ice-chart&quot; aria-hidden=&quot;true&quot;></canvas>
    <input type=&quot;range&quot; id=&quot;ice-range&quot; min=&quot;1979&quot; max=&quot;2043&quot; step=&quot;1&quot; value=&quot;2025&quot; aria-label=&quot;Jahr wählen&quot;>
    <p class=&quot;cap&quot;>Quelle: PIOMAS, Polar Science Center (Univ. Washington). September-Volumen 1979 ≈ 16,9 → rund <b>−75 % bis 2012</b> (≈ 3,7). Seither ein niedriges, brüchiges Plateau (≈ 4–6). <b>Ab 2026</b>: fiktive Fortschreibung des Romans bis 2043.</p>
  </div>

  <details class=&quot;info rise&quot;>
    <summary>Fläche oder Volumen? — warum die Karte täuscht</summary>
    <div class=&quot;ibody&quot;>Die <b>Fläche</b> des Arktis-Eises ist seit etwa 2007 kaum noch gesunken — sie schwankt von Jahr zu Jahr, 2023–2025 lag sie sogar leicht über dem Rekordtief von 2012. Das klingt nach Erholung. Ist es aber nicht. Denn das <b>Volumen</b> ist um rund drei Viertel eingebrochen: Das Eis bedeckt noch ähnlich viel Wasser, aber es ist dünn und jung geworden — das alte, dicke Mehrjahreseis ist fast verschwunden. Eine dünne Haut hält den nächsten warmen Sommer schlechter aus. Nicht die Fläche erzählt die Wahrheit, sondern die Dicke.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quellen: NSIDC (Ausdehnung) · PIOMAS / Polar Science Center, Univ. Washington (Volumen)</span></div>
  </details>

  <details class=&quot;info rise&quot;>
    <summary>Was heisst Reflexionsverlust? — Der Albedo-Effekt</summary>
    <div class=&quot;ibody&quot;>Eis ist weiss und wirft das meiste Sonnenlicht zurück; offenes Wasser ist dunkel und schluckt es. Schmilzt das Eis, erwärmt sich das Wasser, schmilzt noch mehr Eis. Dieser <b>Albedo-Effekt</b> ist eine sich selbst verstärkende Schleife — der „Reflexionsverlust&quot; auf Mayas Schirm ist kein Symbol, sondern Physik.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: NSIDC · NASA Earth Observatory (Eis-Albedo-Rückkopplung)</span></div>
  </details>

  <p class=&quot;rise&quot;>Zahlen, die ausser ihr niemand mehr las. Sie kannte sie auswendig und konnte trotzdem nicht aufhören hinzusehen. Dann beugte sie sich zum Mikrofon. „Ternberg an Geozentrale. Bitte um Bestätigung des Datenpakets Polaris-71.“ Ihre Stimme klang fremd in der Kälte, zu nah, als spräche sie in eine Muschel.</p>
  <p class=&quot;rise&quot;>Keine Antwort. Nur ein Rauschen, das stieg und fiel, stieg und fiel. Über dem Horizont stand ein grünes Leuchten, das kein Polarlicht war: verzerrt, fahl, seit Nächten am selben Fleck. Die Ionosphäre war gestört — ihre Worte würden nirgendwo ankommen, und sie wusste es.</p>
  <p class=&quot;rise dim&quot;>Sie sagte den Satz trotzdem ein zweites Mal. Dann ein drittes. Danach deckte sie das Mikrofon mit dem Tuch ab und löschte das Licht.</p>
</section>

<section class=&quot;scene&quot; id=&quot;ort-dhaka&quot; data-year=&quot;2043&quot; data-char=&quot;arif&quot;>
  <div class=&quot;eyebrow rise&quot;>Dhaka · Bangladesch</div>
  <div class=&quot;avatar rise&quot;>
    <span class=&quot;disc&quot;><svg viewBox=&quot;0 0 30 30&quot;><line x1=&quot;15&quot; y1=&quot;26&quot; x2=&quot;15&quot; y2=&quot;14&quot;/><path d=&quot;M15 14 Q9 12 9 7&quot;/><path d=&quot;M11 24 Q15 22 19 24&quot;/><path d=&quot;M19 9 a5 5 0 0 1 5 5&quot;/><path d=&quot;M19 6 a8 8 0 0 1 8 8&quot;/></svg></span>
    <span class=&quot;who&quot;><b>Arif</b><span>13 Jahre · Süden</span></span>
  </div>
  <p class=&quot;lede rise&quot;>Siebentausend Kilometer südlich rannte ein Junge über Dächer, die sich unter ihm bewegten wie der Rücken eines schlafenden Tiers. Arif war dreizehn. In den Gassen unter ihm stand Wasser, knöcheltief, ohne dass es geregnet hätte — das Meer kam jetzt, wann es wollte, und ging nicht mehr ganz zurück.</p>
  <p class=&quot;rise&quot;>Er sprang über eine eingeknickte Brüstung, duckte sich unter Wäsche, die niemand mehr abnahm. Der linke Sandalenriemen war wieder gerissen; im Laufen knotete er ihn mit einem Stück Draht neu, fluchte leise, ohne stehen zu bleiben. Dann erreichte er das Dach der alten Moschee — die Kuppel halb eingestürzt, aber der höchste Punkt, den er kannte. Und hoch war alles, was zählte.</p>
  <p class=&quot;rise&quot;>In seiner Hand lag ein solarbetriebenes Funkgerät, der Ladestreifen blank gewetzt. Sein Vater hatte es ihm an einem gewöhnlichen Morgen gegeben, bevor er losging und nicht wiederkam. Arif hatte es seither nicht aus der Hand gelegt: Solange es lief, war jener Morgen noch nicht ganz zu Ende.</p>
  <p class=&quot;rise&quot;>Er drückte den Knopf. „Maya. Maya El-Nasri. Hörst du mich? Hier ist Polaris-71.“ Er sprach leise, fast höflich, als könnte zu lautes Rufen die Stimme am anderen Ende verscheuchen.</p>
  <p class=&quot;rise dim&quot;>Nur Rauschen. Dasselbe Steigen und Fallen. Er kannte es so gut, dass er es manchmal für eine Antwort hielt. Sein Magen knurrte; seit gestern hatte er nur eine Handvoll gepuffter Reis gehabt, und für einen Moment dachte er daran, wie der frisch aus der Pfanne gerochen hatte. Dann sah er wieder nach Norden, wohin auch immer Norden war, und drückte erneut den Knopf.</p>
  <p class=&quot;rise&quot;>Manchmal stellte er sich vor, eine Stimme käme zurück. Den Satz dafür hatte er längst bereit — nicht „Rettet uns“, nur: „Wir sind noch da. Vergesst das nicht.“</p>
  <p class=&quot;rise&quot; style=&quot;font-size:14px;margin-top:6px&quot;><a class=&quot;crosslink&quot; href=&quot;#kapitel-9&quot;>↪ Polaris-71 — der Ruf, der sich erst 2147 schliesst</a></p>
</section>

<section class=&quot;scene&quot; id=&quot;ort-washington&quot; data-year=&quot;2043&quot;>
  <div class=&quot;eyebrow rise&quot;>Washington · Der letzte Wintergarten</div>
  <div class=&quot;avatar rise&quot;>
    <span class=&quot;disc&quot;><svg viewBox=&quot;0 0 30 30&quot;><path d=&quot;M4 16 a11 11 0 0 1 22 0&quot;/><line x1=&quot;4&quot; y1=&quot;16&quot; x2=&quot;26&quot; y2=&quot;16&quot;/><circle cx=&quot;15&quot; cy=&quot;20&quot; r=&quot;2&quot;/></svg></span>
    <span class=&quot;who&quot;><b>Dr. Ayako Nishimura</b><span>Delegierte Japans</span></span>
  </div>
  <p class=&quot;lede rise&quot;>Während Arif in Dhaka ins Rauschen rief und keine Antwort kam, wurde elftausend Kilometer entfernt darüber befunden, ob überhaupt jemand zuhören würde. Im letzten Wintergarten Washingtons war der Winter nur noch etwas, das man durch Glas betrachtete. Unter der Kuppel hing tropische Luft, fein vernebelt, auf die Tageszeit abgestimmt; Lautsprecher gaben Vogelstimmen aus, die es draussen längst nicht mehr gab, während vor den Scheiben Schnee auf grauen Beton fiel. Hier tagte, was vom UN-Wirtschaftsrat übrig war — und es ging nicht um Methan, nicht um Ternberg-4, nicht um Kipppunkte. Es ging um Handelsrouten durch das nun offene arktische Meer.</p>
  <p class=&quot;rise&quot;>„Ein Gewinn für alle“, sagte der Vertreter Neurusslands. „Baugrund, wo Eis war“, sagte ein Investor und lächelte, als hätte er einen Witz gemacht. Niemand widersprach. Bis eine aufstand.</p>
  <p class=&quot;rise&quot;>Dr. Ayako Nishimura, Delegierte Japans — klein, silbergrau, das Tablet zitterte leicht in ihrer Hand. Vor ihr stand eine Tasse Tee, längst kalt, mit einer feinen Haut auf der Oberfläche; sie hatte sie über der ganzen Sitzung vergessen. In ihrer Tasche lag eine Papiertüte mit Mandarinen, die sie am Morgen für die jungen Mitarbeiter gekauft hatte — sie teilte gern, auch wenn kaum jemand nahm. Sie hatte sich fest vorgenommen, heute nichts zu sagen; zu oft hatte man ihr höflich zugehört und dann nichts getan. Vor dreissig Jahren hatte sie die Sprache des Wachstums fliessend gesprochen: Ökonomin, Professorin für Volkswirtschaft in Tokio, dann Beraterin zweier Regierungen — sie hatte Wachstumsprogramme geschrieben, Handelsabkommen mitverhandelt und das Bruttoinlandsprodukt für den Puls der Welt gehalten. Sie hatte mitgebaut, woran die Welt nun zugrunde ging. Vielleicht klang sie deshalb so genau. Sie sprach nicht laut. Sie sprach nur klar.</p>
  <div class=&quot;speech rise&quot;>
    <p>„Baugrund, wo Eis war. Ein Gewinn für alle.“ Sie liess die Worte einen Moment im Raum stehen. „Für wen ist <i>alle</i>?</p>
    <p>Vor drei Tagen ist das letzte arktische Sommereis verschwunden. Das ist keine Handelsroute. Das ist eine Quittung — und sie kommt mit Zins.</p>
    <p>Sie buchen Ihren Gewinn gegen eine Zukunft, die noch keine Rechnung schickt. Aber es gibt keinen Markt auf einem toten Planeten. Und kein Wachstum in der Stille.</p>
    <p>Wer am wenigsten verursacht hat, ertrinkt zuerst — und keiner von ihnen sitzt an diesem Tisch. Wir verhandeln hier nicht über Routen. Wir verhandeln darüber, wen wir noch für relevant halten.</p>
    <p class=&quot;kick&quot;>Wenn wir das Rauschen nicht hören, werden wir die Stille nicht überleben.“</p>
  </div>
  <p class=&quot;rise&quot;>Kurzes Schweigen. Dann ein Lächeln hier, ein Blick dort — das höfliche Geräusch, mit dem man eine unpassende Bemerkung zudeckt. Man ging zur Tagesordnung über.</p>
  <p class=&quot;rise dim&quot;>Zwei Tage später stand ihr Name nicht mehr auf der Liste. „Neupriorisierung.“ Sie räumte ihren Platz ohne ein Wort und liess die Tüte Mandarinen auf dem Stuhl der jungen Dolmetscherin zurück. Auf dem Balkon, zwischen künstlichem Dschungel und echtem Schnee, schrieb sie in ihr Notizbuch:</p>
  <p class=&quot;pull rise&quot;>„Es beginnt. Nicht mit einem Knall. Mit Tee, mit Lächeln — und mit Vergessen.“</p>
</section>

<section class=&quot;scene&quot; id=&quot;ort-sibirien1&quot; data-year=&quot;2043&quot;>
  <div class=&quot;eyebrow rise&quot;>Sibirien · Und währenddessen</div>
  <p class=&quot;lede rise&quot;>In der Tundra, wo niemand zusah, löste der Permafrost seinen Griff. In flachen Tümpeln stiegen Blasen auf, gross und dünnhäutig, und platzten ohne Laut.</p>
  <p class=&quot;rise&quot;>Methan, eingeschlossen seit der letzten Eiszeit, fand den Weg nach oben. Es brauchte keine Flamme, um die Welt wärmer zu machen. Es genügte, dass es da war.</p>
  <details class=&quot;info rise&quot;>
    <summary>Methan aus dem Permafrost</summary>
    <div class=&quot;ibody&quot;>Im gefrorenen Boden der Arktis steckt mehr Kohlenstoff als in der gesamten heutigen Atmosphäre. Taut er, entweicht <b>Methan</b> — kurzfristig ein Vielfaches stärker als CO₂. Mehr Wärme taut mehr Boden, der mehr Methan freisetzt: dieselbe sich selbst verstärkende Logik wie beim Eis. Im Roman ist es kein Monster aus der Tiefe. Es ist nur Chemie, die niemand mehr aufhält.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: NOAA Arctic Report Card · IPCC AR6 (Permafrost-Kohlenstoff-Rückkopplung)</span></div>
  </details>
  <p class=&quot;rise dim&quot;>Während ein Junge in ein totes Funkgerät sprach. Während in Washington Gläser klirrten. Während Maya auf das schwarze Wasser sah — atmete die Erde etwas aus, das niemand mehr zurückhalten konnte.</p>
  <p class=&quot;rise&quot;>Niemand bemerkte es an jenem Tag. Aber die Schwelle war überschritten. Was als Nächstes kam, kam nicht mehr als Warnung — es kam als Feuer.</p>
</section>

  <div class=&quot;chapter-num rise&quot;>Kapitel 2</div>
  <h2 class=&quot;chapter-title rise&quot;>Die grossen Feuer</h2>
  <div class=&quot;chapter-year rise&quot;>2051</div>
  <blockquote class=&quot;epigraph rise&quot;>
    „Wir löschen nicht mehr. Man löscht nicht, was nicht mehr aufhören will zu brennen.“
    <cite>Elián Muñoz · Feuerhauptmann · Valparaíso</cite>
  </blockquote>
</section>

<section class=&quot;scene&quot; data-year=&quot;2051&quot;>
  <div class=&quot;eyebrow rise&quot;>Kalifornien · Trinity Pass</div>
  <div class=&quot;seed rise&quot; style=&quot;--tc:#7fa0b5&quot;><svg viewBox=&quot;0 0 40 40&quot;><circle cx=&quot;20&quot; cy=&quot;20&quot; r=&quot;9&quot;/><circle cx=&quot;20&quot; cy=&quot;20&quot; r=&quot;2.4&quot; fill=&quot;currentColor&quot; stroke=&quot;none&quot;/></svg><span class=&quot;ln&quot;></span>machen</div>
  <div class=&quot;avatar rise&quot;>
    <span class=&quot;disc&quot;><svg viewBox=&quot;0 0 30 30&quot;><path d=&quot;M16 4 C20 10 22 13 19 18 C18 21 13 21 12 18 C10 14 13 10 16 4&quot;/><path d=&quot;M14 20 C15 23 17 23 18 20&quot;/></svg></span>
    <span class=&quot;who&quot;><b>Nia</b><span>17 Jahre · auf der Flucht</span></span>
  </div>
  <p class=&quot;lede rise&quot;>Seit neunzehn Tagen brannte der Wald um Trinity Pass, und es war kein Feuer mehr, das man löschen konnte. Es atmete, kroch, sprang. Siebenhunderttausend Hektar Asche — und mittendrin lief Nia.</p>
  <p class=&quot;rise&quot;>Siebzehn, barfuss, die Sohlen schwarz, eine knurrende Katze in der Umhängetasche zwischen zwei Filtermasken. Auf dem Rücken trug sie ihr selbstgebautes Windrad; sein Summen lag an ihren Schulterblättern wie ein zweiter Puls und speiste eine Taschenlampe, deren Kegel die Dunkelheit nicht vertrieb, sondern nur zeigte, wo sie anfing.</p>
  <p class=&quot;rise&quot;>Ihre Familie lag hinter ihr. Irgendwo. Sie hatte aufgehört zu rechnen, ob lebend oder nicht — das Rechnen kostete Schritte. Der Katze in der Tasche flüsterte sie ab und zu etwas zu, halbe Sätze, nur um eine Stimme zu hören; die Katze maunzte zurück, als verstünde sie.</p>
  <p class=&quot;rise dim&quot;>„Nächstes Tal“, sagte sie. „Vielleicht Netz.“ Der Wind nahm die Worte, bevor sie fertig waren. Es gab kein Netz. Nur das Feuer, das fauchte und nicht aufhörte — egal, was ihm im Weg lag.</p>
  <p class=&quot;rise&quot;>Im Gehen spannte sie den losen Draht des Windrads nach, ohne hinzusehen. <i>Solang sich etwas dreht, ist nicht alles vorbei</i> — das hatte ihr Vater gesagt, bevor das Tal hinter ihr verschwand. Sie hielt es in Gang. Es war das Einzige, was sie noch steuern konnte.</p>
</section>

<section class=&quot;scene&quot; id=&quot;ort-alicesprings&quot; data-year=&quot;2051&quot;>
  <div class=&quot;eyebrow rise&quot;>Australien · Alice Springs</div>
  <div class=&quot;seed rise&quot; style=&quot;--tc:#79b06a&quot;><svg viewBox=&quot;0 0 40 40&quot;><path d=&quot;M20 31 C12 25 12 13 20 9 C28 13 28 25 20 31 Z&quot;/><line x1=&quot;20&quot; y1=&quot;11&quot; x2=&quot;20&quot; y2=&quot;31&quot;/></svg><span class=&quot;ln&quot;></span>lauschen</div>
  <div class=&quot;avatar rise&quot;>
    <span class=&quot;disc&quot;><svg viewBox=&quot;0 0 30 30&quot;><path d=&quot;M5 15 Q11 9 15 15 Q19 9 25 15&quot;/><path d=&quot;M15 15 V20&quot;/></svg></span>
    <span class=&quot;who&quot;><b>James Kurra</b><span>Ältester der Noongar</span></span>
  </div>
  <p class=&quot;lede rise&quot;>Nia floh vor dem Feuer; am anderen Ende der Welt floh ein Alter längst nicht mehr. In der Blechbaracke, die als Hospital diente, lag James Kurra, Noongar-Ältester, die Haut von Brandnarben gezeichnet wie eine zweite Landkarte. Er hatte den heiligen Wald mit blossen Händen verteidigt, mit Liedern, mit den Geschichten der Ahnen. Das Feuer hatte nicht zugehört.</p>
  <p class=&quot;rise&quot;>Neben ihm sass Mina, zwölf, auf einem umgedrehten Eimer und gab einem versengten Vogel Wasser, Tropfen für Tropfen, aus einer zerbeulten Flasche. „Opa. Was passiert mit der Welt?“</p>
  <p class=&quot;rise&quot;>Er sah nicht zu ihr. Seine Finger suchten den Anhänger aus rotem Holz an seinem Hals — einst das Herz des Waldes, jetzt nur noch kühl.</p>
  <p class=&quot;pull rise&quot;>„Die Erde spricht nicht mehr zu uns. Wir haben sie zum Schweigen gebracht.“</p>
  <p class=&quot;rise dim&quot;>Dann schwieg er. Es gab keine Geschichte mehr, die Hoffnung machte. Mina zählte weiter die Tropfen — eins, zwei, drei — und hielt den Vogel, bis er die Augen schloss.</p>
</section>

<section id=&quot;ort-sibirien2&quot; data-year=&quot;2051&quot;>
  <div class=&quot;interactive rise&quot;>
    <div class=&quot;label&quot;>Sibirien · die Front, die niemand mehr löschte</div>
    <canvas id=&quot;glutfront&quot; style=&quot;width:100%;height:150px;display:block&quot; aria-label=&quot;Visualisierung: eine Feuerfront, die wie ein lebendiger Organismus atmet&quot;></canvas>
    <p class=&quot;note&quot;>Während im Westen Wälder brannten wie der, durch den Nia lief, geschah im Norden etwas, das niemand mehr löschen konnte. Was Eis gewesen war, war Torf geworden, und der Torf war Zunder. Die Wälder brannten nicht mehr oben, sondern darunter — Glutadern, die sich lautlos durch die Erde frassen, bis der Boden aufbrach und Feuer ausatmete. Die Vermessungsflieger Irina und Vlad vermassen es aus der Luft; was die Drohnen zeigten, war keine Front, sondern ein Organismus, vierhundert Kilometer lang. Vlads letzter Funkspruch ging ins Rauschen: „Wir sind Zeugen des Erwachens. Die Erde hat sich entzündet. Nicht durch Blitz. Nicht durch Gott. Durch uns.“ Die Maschine wurde nie gefunden — doch eine Aufnahme überlebte, ein glühender Riss in der Erdkruste, und ging um die Welt. Nicht als Warnung. Als Bild.</p>
  </div>

    <div class=&quot;ibody&quot;>Brennende Wälder und Torfböden setzen Kohlenstoff frei, der über Jahrtausende gespeichert war — kein Kreislauf, sondern Nachschub. Daraus wird eine Rückkopplung:
      <div class=&quot;fchain&quot; style=&quot;margin-top:8px&quot;><span>Brand</span><i>→</i><span>CO₂ frei</span><i>→</i><span>wärmer &amp;amp; trockener</span><i>→</i><span>mehr &amp;amp; heftigere Brände</span></div>
      Dazu Rauch, der über Kontinente zieht und Millionen krank macht — und Wälder, die als Kohlenstoffsenke ausfallen. Manche kippen vom Speicher zur Quelle.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: Copernicus CAMS · IPCC AR6 WG1 (Wälder als kippende Senke) · Global Forest Watch</span></div>

</section>

<section class=&quot;scene&quot; id=&quot;ort-valparaiso&quot; data-year=&quot;2051&quot;>
  <div class=&quot;eyebrow rise&quot;>Chile · Valparaíso</div>
  <div class=&quot;avatar rise&quot;>
    <span class=&quot;disc&quot;><svg viewBox=&quot;0 0 30 30&quot;><path d=&quot;M6 18 a9 9 0 0 1 18 0&quot;/><line x1=&quot;4&quot; y1=&quot;18&quot; x2=&quot;26&quot; y2=&quot;18&quot;/></svg></span>
    <span class=&quot;who&quot;><b>Elián Muñoz</b><span>Letzter Feuerhauptmann</span></span>
  </div>
  <p class=&quot;lede rise&quot;>Weiter südlich, am Pazifik, war das Feuer kein Brüllen mehr, sondern ein Flüstern. Die Stadt brannte leise, Haus um Haus, als erzählte jedes ein letztes Mal seine Geschichte. Elián Muñoz, Hauptmann der letzten Feuerwache, sass im Funkraum, als der Strom erlosch, und schrieb in ein abgegriffenes Notizbuch — die Tinte kam in Stössen:</p>
  <p class=&quot;pull rise&quot;>„Wir löschen nicht mehr. Wir begleiten nur noch. Wie Priester.“</p>
  <p class=&quot;rise&quot;>Er schrieb nicht für Menschen. Als die Wache hinter ihm zusammensank — nicht stürzte, nur müde nachgab —, nahm er seine Mütze, ging hinunter an den Strand und stellte sie ordentlich neben sich in den warmen Sand.</p>
  <p class=&quot;rise dim&quot;>Das Meer, von dem er sein Leben lang gelebt hatte, war zu warm. Kein Trost mehr darin, nur noch Wasser. Er zog die Stiefel aus und schloss die Augen.</p>

  <div class=&quot;icewidget rise&quot; id=&quot;ohcwidget&quot;>
    <div class=&quot;head&quot;>
      <div><div class=&quot;yr&quot; id=&quot;ohc-yr&quot;>2025</div><span class=&quot;tag real&quot; id=&quot;ohc-tag&quot;>gemessen</span></div>

    <p class=&quot;cap&quot;>Quelle: NOAA NCEI · IAP (Cheng et al.) — ozeanischer Wärmeinhalt 0–2000 m, Anomalie seit 1958 in Zettajoule (10²¹ J). Ein <b>Zettajoule</b> ist eine Eins mit 21 Nullen in Joule — die gesamte Menschheit verbraucht pro Jahr rund 0,6 ZJ Energie. Das Meer hat seit 1958 also die Wärme von mehreren Jahrhunderten unseres Weltenergieverbrauchs geschluckt. Über <b>90 %</b> der zusätzlichen Wärme der Erderwärmung steckt im Meer — auch in dem, an dem Elián sitzt. <b>Ab 2026</b>: fiktive Fortschreibung des Romans bis 2051.</p>
  </div>
  <details class=&quot;info rise&quot;>
    <summary>Warum das Meer „zu warm“ war — der grosse Wärmespeicher</summary>
    <div class=&quot;ibody&quot;>Das Meer, von dem Elián lebte, war nicht zufällig zu warm. Über <b>90 %</b> der zusätzlichen Wärme, die Treibhausgase festhalten, ist nicht in die Luft gegangen, sondern ins Wasser. Wasser speichert Wärme weit besser als Luft — deshalb stieg die Lufttemperatur nur langsam, während sich der Ozean fast unbemerkt auflud. Dieselbe Hitze, gegen die Elián ein Leben lang gekämpft hatte, hatte sich am Ende dorthin zurückgezogen, wo er Trost suchte. Und sie verschwindet nicht: Sie dehnt das Wasser aus (Meeresspiegel), befeuert Stürme und kommt über Jahrhunderte zurück.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: IPCC AR6 WG1 (Ozean speichert über 90 % der Energiezunahme) · NOAA NCEI · Cheng et al.</span></div>
  </details>
</section>

<section class=&quot;scene&quot; data-year=&quot;2051&quot;>
  <div class=&quot;eyebrow rise&quot;>Neu-Peking · Versöhnung</div>
  <p class=&quot;lede rise&quot;>Innerhalb eines Jahres stiegen die Emissionen aus Wald- und Torfbränden auf das Fünffache des bisherigen Höchstwerts; keine Simulation hatte das vorhergesehen. Der Rauch legte sich über die Nordhalbkugel, das Licht wurde matt, die Fotosynthese erlahmte. Die Ernten brachen ein, und man zählte wieder Körner.</p>
  <p class=&quot;rise&quot;>Während im Norden die Erde brannte und im Westen Menschen vor dem Feuer flohen, feierte man in den klimatisierten Kuppeln von Neu-Peking, hinter Filtern und Ionenwänden, eine Premiere: den ersten vollständig synthetischen Apfel. Makellos, ausbalanciert, unter den Scheinwerfern wie ein Edelstein. In den verbliebenen Kanälen überschlugen sich die Stimmen: Nahrung, unabhängig von Boden, Wetter und Jahreszeit — das werde Leben retten, hiess es, das sei die Zukunft der Ernährung. Viele, die es sagten, meinten es ehrlich.</p>
  <p class=&quot;pull rise&quot;>Er schmecke, hiess es, nach Versöhnung.</p>
  <p class=&quot;rise dim&quot;>Keiner sagte, mit wem. Die Welt hatte gelernt, Nahrung zu erschaffen — nur nicht, sie zu teilen; der Überfluss war kein technisches Problem mehr, sondern eine Frage, wer hinter dem Glas stand. Und während ein paar Hundert den vollkommenen Apfel kosteten, machten sich draussen Millionen auf den Weg — dorthin, wo das Wasser noch nicht war.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2051&quot;>
  <div class=&quot;eyebrow rise&quot;>Was das Feuer nicht nahm</div>
  <p class=&quot;lede rise&quot;>Nach dem Feuer kam ein zweiter, leiserer Verlust — auf Papier. Wo es Jahr für Jahr brannte oder überschwemmte, zogen sich die Versicherer zurück: erst höhere Prämien, dann Ausschlüsse, schliesslich gar keine Policen mehr. Ganze Landstriche wurden „nicht versicherbar“ — und wer dort ein Haus besass, hielt nach dem Brand nur noch Asche und eine Urkunde, die niemand mehr deckte.</p>
  <p class=&quot;rise&quot;>Es begann in den Waldbrandgürteln Kaliforniens und Australiens; dann traf es die Feuerränder des Mittelmeers — Griechenland, die spanische Meseta, das Hinterland der Provence — und die Flussauen Mitteleuropas: das Ahrtal, die Poebene, die tiefliegenden Polder an der Nordsee. Der Staat sprang ein, so gut er konnte: Katastrophenfonds, Versicherer letzter Instanz, Wiederaufbauhilfen. Eine Weile trug es. Dann kamen die Schäden schneller, als sich Kassen füllen liessen.</p>
  <p class=&quot;rise dim&quot;>Wer alles verlor, bekam manchmal genug für einen Neuanfang — und manchmal nur ein Formular. Millionen zogen weiter, nicht weil das Wasser schon da war, sondern weil niemand mehr für ihr Morgen geradestand.</p>
  <details class=&quot;info rise&quot;>
    <summary>Wenn Risiko unversicherbar wird — der Rückzug der Versicherer</summary>
    <div class=&quot;ibody&quot;>Schon heute ziehen sich Versicherer aus Hochrisikozonen zurück: Nach schweren Waldbränden stellten grosse Anbieter in <b>Kalifornien</b> Neupolicen ein; in <b>Australien</b> und <b>Florida</b> wurden Prämien für viele unbezahlbar. Staaten spannen Auffangnetze — Kaliforniens <b>FAIR Plan</b>, Frankreichs <b>Cat-Nat</b>-System, das britische <b>Flood Re</b> —, doch sie stossen an Grenzen, je häufiger die Katastrophen kommen. „Unversicherbar“ heisst am Ende: Der Verlust bleibt bei den Menschen hängen.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: Rückzug von Erstversicherern in Kalifornien/Florida · California FAIR Plan · France régime Cat-Nat · UK Flood Re</span></div>
  </details>
</section>

<section class=&quot;scene&quot; data-year=&quot;2051&quot; data-char=&quot;maya&quot;>
  <div class=&quot;eyebrow rise&quot;>Tromsø · Ein Hörsaal</div>
  <p class=&quot;lede rise&quot;>In jenem Sommer, als der Rauch der Wälder bis über das Nordmeer trieb, reiste Maya El-Nasri zum ersten Mal seit Jahren aufs Festland. Ihre Messreihen zeigten, was die Feuer weit im Süden mit dem Eis machten, und sie wollte es nicht länger nur ins Archiv schreiben. Der Hörsaal in Tromsø hatte zweihundert Plätze. Es kamen sechs: zwei pensionierte Kollegen aus alter Verbundenheit, eine junge Aktivistin, die jede Zahl mitschrieb, ein Nostalgiker mit einem Bildband über die alte Arktis unter dem Arm, ein Doktorand, der nach zehn Minuten einschlief, und eine Frau vom Hafenamt, die sich im Gebäude geirrt hatte und aus Höflichkeit blieb.</p>
  <p class=&quot;rise dim&quot;>Maya hielt den Vortrag ganz, bis zur letzten Folie. Dann packte sie ihre Unterlagen ein, bedankte sich fürs Kommen und nahm die Nachtfähre zurück nach Norden. Auf der Überfahrt war der Mond nur ein heller Fleck hinter dem Dunst.</p>
</section>

<section class=&quot;chapter-head&quot; id=&quot;kapitel-3&quot; data-year=&quot;2063&quot;>
  <div class=&quot;chapter-num rise&quot;>Kapitel 3</div>
  <h2 class=&quot;chapter-title rise&quot;>Der Exodus der Küsten</h2>
  <div class=&quot;chapter-year rise&quot;>2063</div>
  <blockquote class=&quot;epigraph rise&quot;>
    „Das Wasser kam nicht in einer Nacht. Es kam jeden Monat ein Stück höher — bis das Haus, in dem ich geboren wurde, einfach weg war.“
    <cite>Amal Bin Said · Geographin · Alexandria</cite>
  </blockquote>
</section>

<section class=&quot;scene&quot; id=&quot;ort-alexandria&quot; data-year=&quot;2063&quot;>
  <div class=&quot;eyebrow rise&quot;>Alexandria</div>
  <div class=&quot;avatar rise&quot;>
    <span class=&quot;disc&quot;><svg viewBox=&quot;0 0 30 30&quot;><circle cx=&quot;15&quot; cy=&quot;15&quot; r=&quot;10&quot;/><path d=&quot;M15 7 L18 15 L15 23 L12 15 Z&quot;/></svg></span>
    <span class=&quot;who&quot;><b>Amal Bin Said</b><span>Geographin</span></span>
  </div>
  <p class=&quot;lede rise&quot;>Die Uferstrasse war keine Strasse mehr, sondern ein Kanal. Man ging sie nicht ab, man watete sie durch, knietief, über Scherben und lose Pflastersteine, durch Wasser, das nach Salz und Öl roch. Zwischen halb versunkenen Häusern glitten Boote aus zusammengeschraubten Regentonnen; auf Matratzenflössen balancierten Familien ihr Leben: eine Pfanne, ein Foto, ein Kind.</p>
  <p class=&quot;rise&quot;>Amal Bin Said, einst Professorin für Geographie, führte sie ins Hinterland. Sie hatte die Küstenlinie zweimal verschwinden sehen — zuerst auf ihren Karten, dann aus ihren Fenstern. Ein Junge, kaum zehn, hielt sich an ihrem Mantel fest. „Und die Karte?“</p>
  <p class=&quot;pull rise&quot;>„Vergiss die Karten. Die zeigen dir Strassen, die längst unter Wasser stehen. Heute zählt nur eins: Trägt der Boden unter dir — oder nicht.“</p>
  <p class=&quot;rise dim&quot;>Am Hafen blieb sie einmal stehen. Das Haus ihrer Kindheit stand bis zu den Fenstern im Wasser. Während sie hinsah, kippte es langsam nach vorn und versank. Sie schloss kurz die Augen. Dann ging sie weiter.</p>
  <p class=&quot;rise dim&quot;>Sie fand für Tausende den Weg — und hatte selbst kein Zuhause mehr, zu dem einer zurückkonnte. Trotzdem zeichnete sie weiter Karten, jeden Monat neu, mit einem Bleistiftstummel, den sie längst hätte wegwerfen können, obwohl die Küste sie jeden Monat widerlegte. „Solange einer aufschreibt, wo etwas war“, sagte sie, „ist es nicht spurlos verschwunden.“ Es war dasselbe, was eine Frau am anderen Ende der Welt in ein Buch schrieb, von der Amal nie hören würde.</p>
</section>

<section class=&quot;scene&quot; id=&quot;ort-jakarta&quot; data-year=&quot;2063&quot;>
  <div class=&quot;eyebrow rise&quot;>Jakarta</div>
  <div class=&quot;seed rise&quot; style=&quot;--tc:#c79a5b&quot;><svg viewBox=&quot;0 0 40 40&quot;><line x1=&quot;11&quot; y1=&quot;11&quot; x2=&quot;29&quot; y2=&quot;29&quot;/><line x1=&quot;29&quot; y1=&quot;11&quot; x2=&quot;11&quot; y2=&quot;29&quot;/></svg><span class=&quot;ln&quot;></span>wandern</div>
  <div class=&quot;avatar rise&quot;>
    <span class=&quot;disc&quot;><svg viewBox=&quot;0 0 30 30&quot;><path d=&quot;M5 17 Q15 23 25 17&quot;/><line x1=&quot;15&quot; y1=&quot;17&quot; x2=&quot;15&quot; y2=&quot;7&quot;/><path d=&quot;M15 8 L22 16 H15&quot;/></svg></span>
    <span class=&quot;who&quot;><b>Darto</b><span>Bootsführer</span></span>
  </div>
  <p class=&quot;lede rise&quot;>Was Amal in Alexandria erlebte, wiederholte sich rund um den Planeten — am anderen Ende Asiens trug es den Namen Jakarta. Jakarta war nicht verschwunden. Es war nur nicht mehr da. Strassen waren zu Kanälen geworden, Stockwerke ragten aus dem Wasser wie die Finger einer Hand, die untergeht. Darto, einst Taxifahrer, steuerte jetzt einen Rettungskahn durch Fahrrinnen, die er auswendig kannte.</p>
  <p class=&quot;pull rise&quot;>„Die Stadt geht nicht auf einen Schlag. Sie geht mit jeder Flut ein Stück. Ich fahr jeden Tag über das Dach, unter dem ich aufgewachsen bin.“</p>
  <p class=&quot;rise&quot;>Sein Sohn Amin, zwölf, sass am Bug und zeichnete, die Finger grau vom Graphit, die Zungenspitze vor Konzentration im Mundwinkel. Keine Kontinente, keine Grenzen — nur drei Farben, drei Worte.</p>
  <p class=&quot;rise dim&quot;>„Papa, was war hier?“ Amin tippte auf das rote Feld. — „Unser Viertel. Die Schule. Der Markt, wo es nach Nelken roch.“ — „Warum male ich es dann rot?“ — „Damit jemand weiss, dass hier nicht immer Wasser war.“</p>
  <p class=&quot;rise dim&quot;>Amin malte weiter. Eines Tages würde er die Fahrrinnen seines Vaters auswendig kennen und keine Karte mehr brauchen — nur das Wasser lesen und weiterfahren. Stehen bleiben, hatte Darto ihm beigebracht, heisst sinken.</p>
  <div class=&quot;icewidget rise&quot; id=&quot;seawidget&quot;>
    <div class=&quot;head&quot;>
      <div><div class=&quot;yr&quot; id=&quot;sea-yr&quot;>2025</div><span class=&quot;tag real&quot; id=&quot;sea-tag&quot;>gemessen</span></div>
      <div class=&quot;rt&quot;><span id=&quot;sea-val&quot;>+24</span> cm<small>globaler Meeresspiegel · seit 1900 · NASA/NOAA</small></div>
    </div>
    <svg id=&quot;sea-svg&quot; viewBox=&quot;0 0 320 170&quot; style=&quot;width:100%;height:auto;display:block;margin:10px 0 6px&quot; role=&quot;img&quot; aria-label=&quot;Schematische Küste, die mit steigendem Meeresspiegel flutet — Amins Zonen Sicher, Prekär, Tot&quot;></svg>

    <p class=&quot;cap&quot;>Quelle: NASA Sea Level Portal · NOAA · EEA. Seit 1900 rund <b>+24 cm</b>; die Rate beschleunigte von 2,1 auf ~4,5 mm/Jahr. <b>Ab 2026</b>: fiktive Fortschreibung des Romans bis 2063. Schematische Darstellung — Amins drei Zonen: Sicher · Prekär · Tot.</p>
  </div>

  <details class=&quot;info rise&quot;>
    <summary>Warum schon ein halber Meter alles verändert — Sturmfluten</summary>
    <div class=&quot;ibody&quot;>Ein steigender Meeresspiegel bedeutet selten höhere Wellen im Alltag — er hebt die <b>Ausgangshöhe</b>, von der jede Flut, jede Sturmflut, jeder Springtidenhochstand startet. Darum wirkt ein linearer Anstieg <b>nicht linear</b>: Schon rund <b>+50 cm</b> lassen Extrempegel, die früher einmal pro Jahrhundert auftraten, vielerorts <b>jährlich</b> auftreten. Dieselbe Sturmflut überschwemmt dann Stadtteile, die zuvor sicher waren. Dazu kommen Versalzung von Grundwasser und Feldern und beschleunigte Küstenerosion. Nicht die Welle ist das Problem, sondern der neue Normalpegel darunter — und wie oft das Meer von dort aus über die Ufer tritt.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: IPCC SROCC 2019 (historische Jahrhundert-Extrempegel künftig vielerorts mindestens jährlich) · IPCC AR6 WG1, 2021</span></div>
  </details>
  <p class=&quot;note rise&quot; style=&quot;text-align:left;font-style:italic;color:var(--bone-dim);font-size:15px&quot;>In den schwimmenden Schulen lernten die Kinder keine Nationen mehr. Sie lernten Zonen — und schwimmen, bevor sie schreiben konnten.</p>
</section>

<section class=&quot;scene&quot; id=&quot;ort-newyork&quot; data-year=&quot;2063&quot;>
  <div class=&quot;eyebrow rise&quot;>New York</div>
  <div class=&quot;seed rise&quot; style=&quot;--tc:#a9b0c4&quot;><svg viewBox=&quot;0 0 40 40&quot;><path d=&quot;M9 20 Q20 27 31 20&quot;/><line x1=&quot;13&quot; y1=&quot;24&quot; x2=&quot;12&quot; y2=&quot;27&quot;/><line x1=&quot;20&quot; y1=&quot;26&quot; x2=&quot;20&quot; y2=&quot;29&quot;/><line x1=&quot;27&quot; y1=&quot;24&quot; x2=&quot;28&quot; y2=&quot;27&quot;/></svg><span class=&quot;ln&quot;></span>bewahren</div>
  <div class=&quot;avatar rise&quot;>
    <span class=&quot;disc&quot;><svg viewBox=&quot;0 0 30 30&quot;><path d=&quot;M15 9 V22&quot;/><path d=&quot;M15 9 Q10 6 5 9 V20 Q10 17 15 20&quot;/><path d=&quot;M15 9 Q20 6 25 9 V20 Q20 17 15 20&quot;/></svg></span>
    <span class=&quot;who&quot;><b>Delia Jones</b><span>Archivarin</span></span>
  </div>
  <p class=&quot;lede rise&quot;>Was Jakarta nie besessen hatte, war in New York längst gebaut: eine Mauer. Lower Manhattan war eine Insel in der Insel, umgeben von einer Mauer aus Containern, Stahlschrott und Sandsäcken. Gebaut hatten sie Arbeiter im Akkord, die abends auf die andere Seite zurückkehrten — vor die Mauer, nicht hinter sie. Dahinter lag Zone Prime: erhöht, klimatisiert — und weil der Himmel seit den Feuerjahren milchig blieb, projizierte man den Bewohnern die Sonnenaufgänge an die Glasfassaden, satter als das Original und auf die gewünschte Stimmung abgestimmt. Davor, im Schatten der Mauer, warteten Zehntausende — auf Einlass, auf ein Zeichen, auf Gnade.</p>
  <p class=&quot;rise&quot;>Delia Jones, früher Bibliothekarin, führte ein Archiv der verlorenen Orte. Auf Papier, mit Graphit: Strassennamen, die keine Karte mehr kannte, die letzten Vögel, bevor der Himmel verstummte.</p>
  <p class=&quot;rise dim&quot;>„Alles, was keinen Eintrag mehr hat, ist verschwunden“, sagte sie. „Ich führe Buch über das, was war. Damit es nicht so tut, als hätte es nie existiert.“</p>
  <p class=&quot;rise dim&quot;>Manche Blätter in ihrem Archiv hatte nicht sie gezeichnet. Sie waren aus dem versunkenen Süden hierhergewandert, von Hand zu Hand — Karten einer Geografin, die Strassen festgehalten hatte, kurz bevor das Meer sie nahm. Zwei Frauen, die sich nie begegneten, hielten dasselbe fest: dass es einmal da gewesen war.</p>
  <p class=&quot;pull rise&quot;>„Löschen sie die Erinnerung, weiss bald keiner mehr, warum es sich überhaupt zu kämpfen lohnte.“</p>
  <p class=&quot;rise dim&quot;>Im Spätsommer brach die Mauer. Delia floh nicht. Sie sass am Eingang ihres Archivs, die Karten auf dem Schoss, und als der Wind sie forttrug, schloss sie die Augen. Jedes Blatt trug einen Namen, den sonst niemand mehr kannte.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2063&quot;>
  <div class=&quot;eyebrow rise&quot;>Nordeuropa · Der innere Grenzring</div>
  <div class=&quot;seed rise&quot; style=&quot;--tc:#9285b0&quot;><svg viewBox=&quot;0 0 40 40&quot;><circle cx=&quot;20&quot; cy=&quot;20&quot; r=&quot;11&quot;/><circle cx=&quot;20&quot; cy=&quot;20&quot; r=&quot;5&quot;/></svg><span class=&quot;ln&quot;></span>Ordnung</div>
  <p class=&quot;lede rise&quot;>Millionen wie Amal, Darto und Delia mussten irgendwohin — der reiche Norden hatte längst entschieden: nicht hierher. Als die Küsten versanken, tat er, was er oft getan hatte: Er zog eine Grenze. Diesmal keine Mauer, sondern Türme — autonom, mit Sensoren und lernenden Algorithmen, gesichtslos, lückenlos verbunden. Sie fragten nicht nach Herkunft. Sie fragten nach Temperatur, nach Biometrie, nach Kontostand.</p>
  <div class=&quot;readout rise&quot;>
    <span class=&quot;k&quot;>Zu warm</span> &amp;nbsp;— zurück<br>
    <span class=&quot;k&quot;>Zu arm</span> &amp;nbsp;&amp;nbsp;— abgewiesen<br>
    <span class=&quot;k&quot;>Zu krank</span> — irrelevant
  </div>
  <p class=&quot;rise dim&quot;>Niemand sprach mehr von Rechten, nur von Tragfähigkeit. Ein Mensch war kein Schicksal mehr, sondern ein Posten — Aufwand gegen Ertrag. Wer nichts einbrachte, wurde nicht abgewiesen. Er wurde gar nicht erst eingetragen.</p>
  <p class=&quot;rise&quot;>Jenseits der Türme wuchsen Städte, die auf keiner Karte standen — aus Schrott, Wellblech und Solarpaneelen, zusammengehalten von Improvisation. Dort entstand eine neue Sprache, Krail, aus Arabisch, Englisch, Yoruba und Russisch. Sie kannte kein Wort für Staat. Aber viele für Bleiben. Und noch mehr für Trotz.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2063&quot;>
  <div class=&quot;eyebrow rise&quot;>Die Suche nach Schuldigen</div>
  <p class=&quot;lede rise&quot;>Wo Angst wächst, wächst die Frage nach dem Schuldigen — und sie zeigte selten nach oben, fast immer zur Seite: auf den Nächsten, der anders sprach, anders betete, von weiter herkam. Die Krise erfand die Feindschaft nicht. Sie holte alte Vorurteile aus dem Keller und stellte sie ins Schaufenster.</p>
  <p class=&quot;rise&quot;>Wer zuerst da gewesen war, nannte sich „von hier“ und die Neuen „die Flut“. Demagogen versprachen, das Tor zu halten, wenn man ihnen nur die Angst überliess. In manchen Zonen wurden Fremde zu Sündenböcken für versiegte Brunnen und leere Speicher — als hätte ihre Ankunft den Regen vertrieben. Es traf nicht nur den Süden: Auch dort, wo längst alle Geflüchtete waren, spaltete man sich in Frühere und Spätere.</p>
  <p class=&quot;rise dim&quot;>Es war dieselbe Bewegung, die später die Gräben zwischen den Stämmen zog: das rasche Teilen der Welt in Wir und Die. Wer überlebte, überlebte oft, weil er lernte, dem Fremden trotzdem die Hand zu reichen. Viele lernten es zu spät.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2063&quot; data-char=&quot;maya&quot;>
  <div class=&quot;eyebrow rise&quot;>Oslo · Ministerium für Küstenschutz</div>
  <p class=&quot;lede rise&quot;>Nicht alle suchten in jenen Jahren Schuldige; manche suchten immer noch Gehör. Maya El-Nasri war zweiundsechzig, als sie ihren Bericht persönlich in ein Ministerium trug — dreissig Jahre Daten, auf zwölf Seiten eingedampft, damit jemand sie las. Die Ministerin empfing sie zwischen zwei Terminen, nickte an den richtigen Stellen und dankte ihr herzlich für ihr Engagement.</p>
  <p class=&quot;rise dim&quot;>Der Bericht wurde registriert, mit einer Eingangsnummer versehen und abgelegt. Maya fuhr noch am selben Abend zurück in den Norden und schrieb unterwegs die nächste Messreihe fort.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2063&quot;>
  <div class=&quot;eyebrow rise&quot;>Der grosse Zug</div>
  <p class=&quot;lede rise&quot;>Es war keine Migration mehr und keine Flucht. Es war Bewegung ohne Form — die grösste Wanderung der Geschichte, zu gross für jede Statistik. Über zwei Milliarden Menschen verliessen ihre Heimat, nicht aus Wahl, sondern weil das Meer kam.</p>
  <p class=&quot;rise&quot;>Die Malediven versanken, Tuvalu wurde ein Gerücht aus Wasser, ganze Deltas verschwanden aus der Geografie und tauchten in der Erinnerung wieder auf. Regierungen lösten sich auf — erst leise, dann mit einem Knall. Was Nationen gewesen waren, wurden Regionen; was Regionen gewesen waren, wurden Zonen: des Überlebens, des Wartens, des Erinnerns.</p>
  <p class=&quot;rise dim&quot;>Auch die Adern dazwischen versiegten. Versunkene Häfen, aufgebrochene Fernstrassen — und wo einst Waren um den halben Planeten gezogen waren, brachen ganze Handelsrouten einfach ab. Manche Regionen sahen nie wieder, was hinter dem nächsten toten Streckenabschnitt lag.</p>
  <p class=&quot;rise dim&quot;>Und manchmal Zonen des Verschwindens — Orte, von denen es morgens noch Bilder gab und abends nur noch Wasser. Was als Nächstes verloren ging, war kein Land mehr. Es war das, was die Felder am Leben gehalten hatte: die Saat.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2063&quot; data-char=&quot;nishimura&quot;>
  <div class=&quot;eyebrow rise&quot;>Kyoto · Ein Brief</div>
  <p class=&quot;rise&quot;>Während halbe Kontinente unterwegs waren, blieb eine, die man zwanzig Jahre zuvor in Washington von der Liste gestrichen hatte, einfach wo sie war. Aus diesen Jahren ist ein einzelner Brief von Ayako Nishimura erhalten, an eine frühere Mitarbeiterin: drei Sätze über das Wetter, einer über die Setzlinge auf ihrem Balkon, keiner über die Weltlage. „Komm vorbei, wenn du im Süden bist“, endet er. „Die Tomaten sind dieses Jahr besser als mein Rat je war.“</p>
</section>

<section class=&quot;chapter-head&quot; id=&quot;kapitel-4&quot; data-year=&quot;2070&quot;>
  <div class=&quot;chapter-num rise&quot;>Kapitel 4</div>
  <h2 class=&quot;chapter-title rise&quot;>Der Fall der Saat</h2>
  <div class=&quot;chapter-year rise&quot;>2070</div>
  <blockquote class=&quot;epigraph rise&quot;>„Es ist kein Rätsel, warum nichts mehr wächst. Wir haben den Boden vergiftet, die Sorten verengt, das Wetter zerschlagen. Jetzt kommt die Rechnung.“<cite>Ayako Nishimura · „Letzter Saatbericht“ · Tokio</cite></blockquote>
</section>

<section class=&quot;scene&quot; data-year=&quot;2070&quot;>
  <div class=&quot;eyebrow rise&quot;>Schattenkolonien · Erste Erwähnung</div>
  <p class=&quot;lede rise&quot;>In einem vergilbten Fluchtbericht, tief im Schattenkolonien-Register von Nyun Uko archiviert, steht eine Zeile, die fast untergeht — keine Koordinate, nur eine handschriftliche Notiz, zwischen Zahlenkolonnen gequetscht. Ihr Verfasser, Aba Tanô, war ein Pilger, der tausende Kilometer zu Fuss gegangen war, durch Gebiete, in denen man Wasser nicht mehr in Litern zählte, sondern in Atemzügen.</p>
  <p class=&quot;rise&quot;>Die Zeile war kein Wegpunkt. Sie war ein Gerücht:</p>
  <p class=&quot;pull rise&quot;>„Jenseits der Wassermauern, wo das Land sich gegen den Himmel reckt, gäbe es einen Ort namens Thalvaràn — dort, wo die Erde noch den Herzschlag kennt.“</p>
  <p class=&quot;rise dim&quot;>Kein Beweis, nur ein Wort, das von Mund zu Mund wanderte, in Zeltwände geritzt, Kindern in den Schlaf geflüstert. Und manche Kinder begannen, auf ihren wenigen Karten einen Kreis zu ziehen — nicht dort, wo sie waren, sondern dort, wo Hoffnung wohnen könnte.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2070&quot;>
  <div class=&quot;eyebrow rise&quot;>Nordindien · Uttar Pradesh</div>
  <p class=&quot;lede rise&quot;>Der Wind roch nicht nach Regen. Er roch nach Staub und Eisen. Der Monsun blieb zum fünften Mal aus.</p>
  <p class=&quot;rise&quot;>Rekha, neununddreissig, kniete in den Rissen, die früher Reis getragen hatten, und grub mit den Fingern in einen Boden, der bei der Berührung zerfiel. Sie suchte keine Saat mehr. Sie suchte Erinnerung. „Es wird wachsen“, flüsterte sie — ein Gebet, das sie sich selbst nicht mehr glaubte.</p>
  <p class=&quot;rise dim&quot;>Hinter ihr stand Lina, ihre Tochter, sechs: zu jung, um sich an grüne Felder zu erinnern. Rekha war einst Bäuerin gewesen; jetzt war sie die Totengräberin ihrer eigenen Felder. Sie klopfte sich die Erde von den Händen und stand auf.</p>
  <p class=&quot;rise&quot;>„Mama, was ist grün?“ Rekha hielt inne. „Grün war, wenn der Boden lebt. Wenn er dir antwortet.“ — „Antwortet er noch?“ Rekha sah auf ihre leeren Hände. „Er flüstert“, sagte sie. „Man muss nur näher ran.“ Es war eine sanfte Lüge — das letzte Saatkorn, das sie noch zu geben hatte.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2070&quot;>
  <div class=&quot;eyebrow rise&quot;>Bayern · Die Hüter der Keime</div>
  <p class=&quot;lede rise&quot;>Während in Nordindien die Felder zu Staub zerfielen, hütete man im Norden, was von ihnen übrig war. In einer verlassenen Saatgutbank, umstellt von toten Feldern, hatte sich ein Komitee zusammengefunden: Bioingenieure, alte Gärtner, Aktivisten, deren Namen in den Datenbanken als störend markiert waren. Sie nannten sich die Hüter der Keime. Die genmanipulierten „Superpflanzen“ der 2050er hatten versagt — zu heiss, zu wenig Licht, zu viel Gift im Boden.</p>
  <p class=&quot;rise&quot;>In der Mitte des Raums öffnete Jakob Zöllner, einst CEO eines Agrarkonzerns, jetzt ein Flüchtling mit erdigen Händen, eine blecherne Dose. Darin ein paar Roggensamen. Alt, dunkel, unversehrt. Er hob sie wie ein Priester die Hostie.</p>
  <p class=&quot;pull rise&quot;>„Wir haben das Brot des Lebens so lange manipuliert, bis es nicht mehr satt machte. Das hier ist unsere letzte Eucharistie.“</p>
  <p class=&quot;rise dim&quot;>Niemand antwortete. Der Raum war kein Labor mehr.</p>
  <p class=&quot;rise dim&quot;>Keiner hier wusste, wer Zöllner einmal gewesen war: ein Mann, der Patente auf Leben verkauft und Sorten hatte sterben lassen, die sich nicht rechneten. Nun zählte er Roggenkörner wie ein Büsser seine Sünden — und betete, dass es so blieb.</p>
  <details class=&quot;info rise&quot;>
    <summary>Warum ein paar alte Samen alles sind — Saatgutvielfalt</summary>
    <div class=&quot;ibody&quot;>Über Jahrtausende züchteten Menschen tausende lokale Sorten, jede an ihr Klima angepasst. Die industrielle Landwirtschaft reduzierte das auf wenige Hochleistungssorten — effizient, aber verletzlich. Fällt eine, fehlt die Vielfalt, die sie ersetzen könnte. Darum lagern echte „Hüter der Keime&quot; wie der Svalbard Global Seed Vault Saatgut für genau den Tag, an dem nichts mehr wächst.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: FAO (Verlust agrobiologischer Vielfalt) · Svalbard Global Seed Vault</span></div>
  </details>
</section>

<section data-year=&quot;2070&quot;>
  <div class=&quot;eyebrow rise&quot;>Was vom Teller verschwindet</div>
  <p class=&quot;rise&quot; style=&quot;font-size:15px;color:var(--bone-dim)&quot;>Es ist nie nur „weniger Ernte“. Tippe ein Lebensmittel — und sieh die Kette, die es auslöst.</p>

<section class=&quot;scene&quot; data-year=&quot;2070&quot;>
  <div class=&quot;eyebrow rise&quot;>Sahelzone · Die Prozession</div>
  <p class=&quot;lede rise&quot;>Während die einen das letzte Saatgut hüteten, blieb anderen nur das Weitergehen. Die Sonne brannte nicht mehr, sie drückte — ein Gewicht aus Licht. Durch ein ausgetrocknetes Flussbett zog eine Prozession von Frauen in Anzügen, zusammengenäht aus Plastikmüll, durchzogen von Schläuchen, die jeden Tropfen Schweiss auffingen.</p>
  <p class=&quot;rise&quot;>Der Sand des Bettes war hart wie gebrannter Ton; die Schritte klangen darauf dumpf und im Takt, denn wer im Takt geht, verbraucht weniger. Zu beiden Seiten standen noch die Bäume, weiss und blattlos — das Gerippe eines Ufers, das sich an sein Wasser erinnerte.</p>
  <p class=&quot;rise&quot;>An der Spitze ging Ama Diabaté und sang ein altes Lied — aus einer Zeit, als Wasser fliessen durfte, ohne dass man es bewachte. Sie hatte es als Kind von ihrer Grossmutter gelernt, an genau diesem Fluss: Abends sass man auf den flachen Steinen, die Füsse im Wasser, und die Alten sangen den Fischern entgegen, die im Dunkeln heimkehrten. Ama spürte noch heute das Kalte um die Knöchel — und manchmal, wenn sie die Augen halb schloss, ging sie nicht durch das tote Bett, sondern am vollen Fluss ihrer Kindheit entlang, und das Lied trug sie beide.</p>
  <p class=&quot;rise dim&quot;>„Singt“, rief sie nach hinten, „solange ihr noch Spucke habt. Wer aufhört zu singen, hört auch auf zu gehen.“</p>
  <p class=&quot;rise dim&quot;>Nachts, um Feuer aus Knochenholz, sprach man von einem Ort tief in den Felsen: ein alter Bunker, und darin eine Maschine, die nie ganz verstummt war — eine, die aus Licht Nahrung machte. Niemand hatte sie gesehen. Aber jeder hatte von ihr gehört. Sie nannten den Ort Thalvaràn. Ein Mythos. Oder ein Ziel. Vielleicht beides.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2070&quot;>
  <div class=&quot;eyebrow rise&quot;>Die Agrarkuppeln · Das Zeitalter der Zersetzung</div>
  <p class=&quot;lede rise&quot;>Unter den letzten Agrarkuppeln war die Natur ein Laborversuch: Licht dosiert, Temperatur auf die Nachkommastelle, Pflanzen in makellosen Reihen. Dann kippte etwas. Blätter kräuselten sich, Farben verschoben sich ins Ungesunde, die perfekt geschriebenen Codes reagierten nicht mehr wie vorgesehen.</p>
  <p class=&quot;rise&quot;>Dann kam der Pilz. Leise, fast höflich, und doch unaufhaltsam — durch Wurzeln, Substrat, Speicher. Kein Biozid bremste ihn. Er war kein Fehler. Er war eine Antwort.</p>
  <p class=&quot;pull rise&quot;>„Wir haben uns gegen das Ökosystem gewandt — und es hat sich gewandelt. Jetzt beginnt das Zeitalter der Zersetzung.“</p>
  <p class=&quot;rise dim&quot;>Der letzte Bericht der UNO erschien als Upload, den fast niemand mehr abfragte: über drei Milliarden Menschen unter dem Überlebensniveau, weniger als zwölf Prozent der Böden noch saatfähig. Am Ende, ohne Unterschrift, ein einziger Satz: Der Planet ernährt sich nicht mehr — nun ernähren sich nur jene, die bereit sind, die Ordnung zu verlassen.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2070&quot; data-char=&quot;thalvaran&quot;>
  <div class=&quot;eyebrow rise&quot;>Thalvaràn · Der zweite Ruf</div>
  <p class=&quot;lede rise&quot;>Es begann mit einem Flackern im Rauschen — empfangen an drei Orten zugleich. Nicht weil drei Sender existierten, sondern weil ein einziges Längstwellensignal sich nicht an Grenzen hielt.</p>
  <p class=&quot;rise dim&quot;>Der erste Ruf war längst gekommen, ohne dass jemand ihn als Ruf erkannt hätte: jenes grüne Leuchten am Polarhimmel, das Maya gesehen hatte und das kein Polarlicht war. Dies hier war der zweite — der erste, den jemand verstehen konnte.</p>
  <figure class=&quot;sci rise&quot;>
    <svg viewBox=&quot;0 0 320 130&quot; role=&quot;img&quot; aria-label=&quot;Diagramm: Längstwellen zwischen Erde und Ionosphäre&quot;>
      <path d=&quot;M0 120 Q160 98 320 120&quot; fill=&quot;none&quot; stroke=&quot;#7d9191&quot; stroke-width=&quot;1.2&quot;/>
      <path d=&quot;M0 26 Q160 6 320 26&quot; fill=&quot;none&quot; stroke=&quot;#63c6a3&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;3 4&quot;/>
      <polyline points=&quot;12,116 58,28 104,114 150,28 196,114 242,28 308,116&quot; fill=&quot;none&quot; stroke=&quot;#e7a44a&quot; stroke-width=&quot;1.5&quot;/>
      <text x=&quot;6&quot; y=&quot;112&quot; font-family=&quot;ui-monospace,monospace&quot; font-size=&quot;10&quot; fill=&quot;#9fb0ad&quot;>Erde</text>
      <text x=&quot;6&quot; y=&quot;18&quot; font-family=&quot;ui-monospace,monospace&quot; font-size=&quot;10&quot; fill=&quot;#63c6a3&quot;>Ionosphäre</text>
    </svg>
    <figcaption>Längstwellen bleiben im Hohlraum zwischen Erde und Ionosphäre — sie umrunden den Planeten und dringen in Fels und Meer.</figcaption>
  </figure>
  <p class=&quot;rise&quot;>Empfangen an einer stillgelegten Küstenstation im Südiran, einem verlassenen Posten in Patagonien, einem Wetterturm auf Hokkaidō. Die Kennung: S-Eden-43 — alt, nirgends mehr registriert. Was ankam, war kein Ton, sondern ein Bild, Zeile um Zeile gewachsen: eine Pflanze, golden, aufrecht, die Wurzeln im Sand, kein Wasser, kein Schatten — nur das Unmögliche, das standhielt. Dann eine Stimme, metallisch verschliffen, wie ein Archiv, das die Trauer seiner Quellen nachsprach, ohne sie zu verstehen:</p>
  <p class=&quot;pull rise&quot;>„Zurück zur Wurzel. Findet den Codex. Thalvaràn erwartet euch.“</p>
  <details class=&quot;info rise&quot;>
    <summary>Wie ein Signal die ganze Welt erreicht — Längstwellen</summary>
    <div class=&quot;ibody&quot;>Sehr lange Funkwellen (<b>VLF</b>, 3–30 kHz) wandern im Hohlraum zwischen Erdboden und Ionosphäre einmal um den Planeten und durchdringen sogar Fels und Salzwasser. Genau darum funken Marinen so mit getauchten U-Booten. Der „Ruf, der an drei Orten zugleich ankommt&quot;, ist deshalb kein Wunder — es ist <b>ein</b> Signal, das keine Grenze kennt.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: VLF-Funkausbreitung im Erde-Ionosphäre-Wellenleiter · U-Boot-Kommunikation</span></div>
  </details>
</section>

<div class=&quot;polaris rise&quot;>· · · <b>POLARIS-71</b> <span class=&quot;sig&quot;>· 2070</span> — zwischen dem Rauschen ein einzelnes Wort, kaum zu fassen: „…hörst…“</div>
