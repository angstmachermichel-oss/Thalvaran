<section class=&quot;chapter-head&quot; id=&quot;kapitel-5&quot; data-year=&quot;2074&quot;>
  <div class=&quot;chapter-num rise&quot;>Kapitel 5</div>
  <h2 class=&quot;chapter-title rise&quot;>Die letzte Konferenz</h2>
  <div class=&quot;chapter-year rise&quot;>2074</div>
  <blockquote class=&quot;epigraph rise&quot;>„Wir stritten über Handelsrouten, während draussen die Felder starben. Es war das letzte Mal, dass wir überhaupt miteinander redeten.“<cite>Aus den verschollenen Memoiren von Ayako Nishimura</cite></blockquote>
</section>

<section class=&quot;scene&quot; id=&quot;ort-oslo3&quot; data-year=&quot;2074&quot;>
  <div class=&quot;eyebrow rise&quot;>OSLO-3 · 14. Februar 2074</div>
  <p class=&quot;lede rise&quot;>Tief im Fels der Arktis, wo einst das Saatgut der Welt lag, versammelten sich jene, die noch glaubten, handeln zu können. Sie nannten sich die Konferenz der 53. Doch nur wenige der 53 waren noch Staaten. Die Delegierten trugen Namen von Konzernen, Technogilden, Privatmilizen, Reliktregierungen — manche kamen in Anzügen mit leuchtenden Logos, andere ohne Abzeichen, nur mit dem Gewicht ihrer Macht.</p>
  <p class=&quot;rise dim&quot;>Der Saal war kreisrund, einst gebaut, um über Zukunft zu sprechen. Heute war er keine Kammer der Hoffnung mehr. Er war eine Arena — nicht für Zusammenarbeit, sondern für Zugriff.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2074&quot; data-char=&quot;nishimura&quot;>
  <div class=&quot;eyebrow rise&quot;>Die Eröffnung</div>
  <div class=&quot;seed rise&quot; style=&quot;--tc:#e0824a&quot;><svg viewBox=&quot;0 0 40 40&quot;><circle cx=&quot;20&quot; cy=&quot;20&quot; r=&quot;6&quot;/><line x1=&quot;20&quot; y1=&quot;3&quot; x2=&quot;20&quot; y2=&quot;9&quot;/><line x1=&quot;20&quot; y1=&quot;31&quot; x2=&quot;20&quot; y2=&quot;37&quot;/><line x1=&quot;3&quot; y1=&quot;20&quot; x2=&quot;9&quot; y2=&quot;20&quot;/><line x1=&quot;31&quot; y1=&quot;20&quot; x2=&quot;37&quot; y2=&quot;20&quot;/></svg><span class=&quot;ln&quot;></span>Wahrheit</div>
  <div class=&quot;avatar rise&quot;>
    <span class=&quot;disc&quot;><svg viewBox=&quot;0 0 30 30&quot;><path d=&quot;M4 16 a11 11 0 0 1 22 0&quot;/><line x1=&quot;4&quot; y1=&quot;16&quot; x2=&quot;26&quot; y2=&quot;16&quot;/><circle cx=&quot;15&quot; cy=&quot;20&quot; r=&quot;2&quot;/></svg></span>
    <span class=&quot;who&quot;><b>Dr. Ayako Nishimura</b><span>halb zerstört, ganz wach</span></span>
  </div>
  <p class=&quot;lede rise&quot;>Ayako Nishimura war gealtert, nicht gebrochen — dieselbe zierliche Frau, die einst zwischen künstlichen Palmen vergeblich das Wort Kipppunkt ausgesprochen hatte. Jetzt stand sie im Zentrum der Arena. „Ich spreche nicht für Japan“, begann sie. „Ich spreche für das, was wir verloren haben.“</p>
  <p class=&quot;rise&quot;>Auf den gebogenen Wänden erschienen Bilder: überflutete Städte, brennende Wälder, Kinder mit Hülsen in den Händen, zu leicht, um satt zu machen. Dazwischen Messreihen einer arktischen Station namens Ternberg-4 — dreissig Jahre lang von derselben Hand geführt, im Winter 2071 ohne Schlussvermerk abgebrochen. Sie liess alles stehen, ohne ein Wort. Dann:</p>
  <p class=&quot;pull rise&quot;>„Wir stehen nicht mehr am Rand des Abgrunds. Wir sind längst gefallen. Die Frage ist nicht ob. Die Frage ist: Wie tief wollen wir noch?“</p>
  <p class=&quot;rise&quot;>Sie liess die Stille arbeiten. Dann, leiser: „Man wird sagen, ich hätte gut reden — ich habe das Wachstum gelehrt, ich habe seine Programme geschrieben. Also hört es von mir: Unser Fehler war nicht, dass wir wuchsen. Kinder wachsen, Wälder wachsen. Unser Fehler war, wem wir die Ernte gaben und wem die Rechnung. Wir haben Gewinne behandelt wie Eigentum — und Schäden wie Wetter.“</p>
  <details class=&quot;info rise&quot;>
    <summary>Was ist ein Kipppunkt?</summary>
    <div class=&quot;ibody&quot;>Manche Teile des Klimasystems kippen ab einer Schwelle in einen neuen Zustand, der sich nicht einfach zurückdrehen lässt — etwa das Grönland-Eis, die Permafrostböden oder tropische Korallen. Forschung warnt, dass schon bei 1,5 °C Erwärmung mehrere solcher Punkte überschritten werden könnten. Nishimuras Satz ist keine Rhetorik, sondern die Sprache der Systemforschung.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: Armstrong McKay et al., Science 2022 · IPCC AR6</span></div>
  </details>

  <details class=&quot;info rise&quot;>
    <summary>Die andere Hälfte der Rechnung — warum das Meer „sauer“ wird</summary>
    <div class=&quot;ibody&quot;>Etwa jedes vierte Molekül CO₂, das wir ausstossen, löst sich im Meer — das hat uns lange Zeit verschafft, denn diese Menge blieb aus der Luft. Doch im Wasser wird CO₂ zu Kohlensäure: Der <b>pH</b> sinkt, der Ozean „versauert“. Ein Rückgang um 0,1 pH-Einheiten klingt winzig, ist aber rund <b>30 % mehr Säure</b>, weil die Skala logarithmisch ist. Für alles, was Kalkschalen baut — Korallen, Muscheln, Flügelschnecken, winzige Planktonarten — wird es damit schwerer zu existieren. Und an ihnen hängt die ganze Nahrungskette darüber. Der Puffer wirkt zudem in <b>beide Richtungen</b>: Entzieht man der Luft später wieder CO₂, gibt das Meer einen Teil davon zurück, um sein Gleichgewicht zu halten — wer Kohlendioxid aus der Atmosphäre holt, muss also mehr holen, als am Ende gutgeschrieben wird, und die Versauerung weicht nur langsam zurück.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: IPCC AR6 WG1 (Ozeanversauerung; rund ein Viertel der CO₂-Emissionen vom Ozean aufgenommen; Reversibilität des ozeanischen Kohlenstoffs) · NOAA PMEL</span></div>
  </details>
</section>

<section class=&quot;scene&quot; data-year=&quot;2074&quot;>
  <div class=&quot;eyebrow rise&quot;>Das Ringen</div>
  <p class=&quot;lede rise&quot;>Die Stille danach gärte. Dann begann das Ringen. Die Panasiatische Allianz forderte militärisch gesicherte Klima-Grenzzonen — Wasser und Nahrung nur gegen lückenlosen Emissionsnachweis: „Nachhaltigkeit braucht Härte.“</p>
  <p class=&quot;rise&quot;>Die Konzernföderation TerraArk konterte mit Enklaven für jene, die Kapital einbrachten: „Wer gibt, darf leben.“ Da erhoben sich die Delegierten des Südens, gemeinsam.</p>
  <div class=&quot;speech rise&quot;>
    <p>„Ihr nennt es Nachhaltigkeit. Wir nennen es die Rechnung für ein Feuer, das ihr gelegt habt.</p>
    <p>Zwei Jahrhunderte habt ihr die Luft verbrannt und den Gewinn behalten. Jetzt steigt das Wasser zuerst bei uns — und ihr verlangt einen Emissionsnachweis, bevor ihr uns trinken lasst.</p>
    <p class=&quot;kick&quot;>Wer am wenigsten verbrannt hat, soll am meisten zahlen. Das ist keine Ordnung. Das ist Kolonie mit besserer Software.“</p>
  </div>
  <p class=&quot;rise&quot;>Mitten im Tumult brach ein fremder Stream durch die Wände — das Hacker-Kollektiv Flock aus der Antarktis. Es projizierte einen Vertrag dreier Tech-Giganten und eine Wasserkarte des Amazonas, darunter ein Satz: Verkaufbare Tiefwasserblasen — Zugriff nach Anteilsschein.</p>
  <p class=&quot;rise dim&quot;>Einige sprangen auf, einer weinte. Und in einem stillen Winkel flackerte ein weiteres Bild über die Wand: eine goldene Pflanze im Sand. Thalvaràn erwartet euch.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2074&quot;>
  <div class=&quot;eyebrow rise&quot;>Der Zwischenfall</div>
  <p class=&quot;lede rise&quot;>Niemand bemerkte den Schatten zwischen den Kabelsträngen. Rami Haroun war dreiundzwanzig, Sohn einer sudanesischen Klimaforscherin, aufgewachsen zwischen Zeltstädten und rostigen Kais, ausgebildet von einem Technikkollektiv im Maghreb. Ein stiller Junge, ein präziser Bastler — er kannte die Wartungsschächte von OSLO-3 aus Bauplänen, die nie für offizielle Augen bestimmt waren.</p>
  <p class=&quot;rise&quot;>Über das interne Lautsprechersystem legte er seine Stimme in den Saal, ruhig, von einer Glut getragen, die nicht zu löschen war:</p>
  <p class=&quot;pull rise&quot;>„Ihr habt das Morgen getötet. Nun stirbt euer Gestern.“</p>
  <p class=&quot;rise dim&quot;>Dann Licht. Druck. Schwärze. Elf Tote — zwei Vorstandsvorsitzende, ein General, drei Abgesandte der Reliktstaaten, eine, deren Name nie ermittelt wurde. Ayako Nishimura überlebte, aber nur halb: ihre linke Seite zerschmettert, ihr Gehör für immer verloren. Doch ihre Augen blieben offen. Und sie sahen.</p>
  <p class=&quot;rise dim&quot;>Sie hörte nichts mehr — und zum ersten Mal war die Stille ehrlich. Sie hatte gewarnt; man hatte gelächelt. Jetzt lächelte niemand. Es war kein Sieg. Es war nur die Stille, von der sie immer gesprochen hatte.</p>
  <p class=&quot;rise dim&quot;>Ihr Notizbuch fand man unter dem Schutt, die Seiten verrusst, aber lesbar. Jemand schrieb es ab. Dann schrieb es jemand anderes wieder ab. So überdauerte ihre Stimme das Jahrhundert — und wer viel später diese Vorgeschichte bewahrte, zitierte ohne es zu wissen eine Frau, der man zu Lebzeiten nicht zugehört hatte.</p>
  <p class=&quot;rise&quot;>Sie selbst lebte noch lange. Halb gelähmt und ohne Gehör, wurde sie still auf eine neue Art: Die Wut, die sie ein Leben lang getragen hatte, fiel langsam von ihr ab wie eine zu schwer gewordene Jacke. Sie zog in eine Kammer über einem Gemeinschaftsgarten, zog Bohnen an einem Draht und lernte mit den Händen die Namen der Kinder, die vorbeikamen. Im ersten Frühjahr pflanzte sie am Rand des Gartens einen Apfelbaum. Sie, die einst die Sprache des Wachstums fliessend gesprochen hatte, begnügte sich nun mit einer Handvoll Erde und dem, was daraus wuchs.</p>
  <p class=&quot;rise dim&quot;>„Ich habe zu lange zu viel gewollt“, schrieb sie in ihren späten Jahren. „Jetzt will ich wenig — und das Wenige ist genug.“ Es war kein Verzicht, sondern das Erste, was sich seit Jahrzehnten wie Frieden anfühlte.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2074&quot;>
  <div class=&quot;eyebrow rise&quot;>Das Nachspiel · „Ende“</div>
  <p class=&quot;lede rise&quot;>Die Konferenz endete nicht. Sie zerfiel. Keine Resolution, kein Abkommen — nur ein Saal, der vom Rauch noch warm war. OSLO-3 wurde versiegelt wie ein Grab. Die Welt draussen reagierte nicht; nicht, weil niemand wissen wollte, sondern weil kaum noch etwas existierte, das solche Nachrichten tragen konnte.</p>
  <p class=&quot;rise&quot;>Nur ein Netzwerk stellte ein Bild ins digitale Dunkel: Xer0Net, verborgen in den unterirdischen Städten Eurasiens. Es zeigte keinen Feuerball, nur den verkohlten Konferenztisch in einem Saal, in dem das Echo gestorben war. Darüber ein Wort: Ende.</p>
  <p class=&quot;rise dim&quot;>Doch manche reichten das Bild weiter — nicht als Schluss, sondern als Anfang. Und einige fragten leise: Wer hat das Wort geschrieben? Denn „Ende“ ist manchmal nur der Deckname für etwas, das im Verborgenen beginnt.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2074&quot; data-char=&quot;thalvaran&quot;>
  <div class=&quot;eyebrow rise&quot;>Thalvaràn · Dritte Erscheinung</div>
  <p class=&quot;lede rise&quot;>Sieben Jahre später, 2081, wurde in Nuuk der letzte Weltpass ausgestellt — für ein Mädchen, das nie erfuhr, was man damit einst durfte; nur, dass es etwas war, das es nicht mehr gab. Zur selben Stunde erwachten an drei weit entfernten Orten — einem Bunker unter Ljubljana, einer Kaserne bei Córdoba, einem Frachtschiff im Indischen Ozean — alte Funkgeräte.</p>
  <p class=&quot;rise&quot;>Auf einem uralten Band, voller Knacken, wuchs ein Bild — Zeile um Zeile, wie aus einer Zeit, als Information noch Geduld brauchte: ein kreisrunder Steinkomplex, eingebettet in eine grüne Senke, behütet von Bergen, darüber reines Licht. Dann eine Stimme, metallisch verschliffen, ein Altenglisch mit französischem Akzent, als käme sie durch einen Spalt in der Zeit:</p>
  <p class=&quot;pull rise&quot;>„This is the invitation. The Codex rests in the circle. Come… those who are still worthy.“</p>
  <p class=&quot;rise dim&quot;>Kein Ursprung, keine Koordinaten. Nur das Bild, nur der Kreis — und in allen drei Orten blieb derselbe Name zurück, als hätte das Signal ihn nicht in die Luft geschrieben, sondern in die Erinnerung.</p>
  <details class=&quot;info rise&quot;>
    <summary>Ein Bild, das Zeile um Zeile wächst — SSTV</summary>
    <div class=&quot;ibody&quot;>Dass das Bild langsam, von oben nach unten entsteht, ist kein poetischer Einfall: <b>SSTV</b> (Slow-Scan Television) ist ein reales Funkverfahren, das Bilder über schmale Frequenzen überträgt — Zeile für Zeile, oft über eine Minute. Amateurfunker und sogar die Raumstation ISS nutzen es bis heute.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: SSTV, analoges Funkbild-Verfahren (Amateurfunk, ISS)</span></div>
  </details>
</section>

<div class=&quot;polaris rise&quot;>· · · <b>POLARIS-71</b> <span class=&quot;sig&quot;>· 2074</span> — „…noch…da…?“ Dann Stille. Niemand wusste mehr, wer da sendete.</div>

<section class=&quot;chapter-head&quot; id=&quot;kapitel-6&quot; data-year=&quot;2092&quot;>
  <div class=&quot;chapter-num rise&quot;>Kapitel 6</div>
  <h2 class=&quot;chapter-title rise&quot;>Der Fall der Netze</h2>
  <div class=&quot;chapter-year rise&quot;>2092</div>
  <blockquote class=&quot;epigraph rise&quot;>„Der Strom kam nie zurück. Was wir wirklich verloren, war alles, was nur noch die Maschinen wussten.“<cite>Fragment aus dem Datentempel Tianjin</cite></blockquote>
</section>

<section class=&quot;scene&quot; data-year=&quot;2092&quot;>
  <div class=&quot;eyebrow rise&quot;>Orbit · 7. März 2092</div>
  <p class=&quot;lede rise&quot;>Der Sonnensturm kam ohne Vorwarnung. Aus der Korona löste sich eine Plasmawolke, grösser als jede je gemessene, und jagte mit Millionen Kilometern pro Stunde durchs All. Die Erde hatte achtzehn Stunden — nur konnte es niemand sagen, niemand warnen.</p>
  <p class=&quot;rise&quot;>Die ersten Opfer waren die Satelliten: Sie zitterten, glühten auf, verstummten. Funksprüche lösten sich in Rauschen, dann in Stille. Die Interfaces starben in konzentrischen Wellen — erst erlosch das Glas, dann das Licht, zuletzt der Ton. Binnen zwei Tagen war die Erde blind und stumm — kein Netz, kein Signal, kein einziger Bildschirm mehr.</p>
  <details class=&quot;info rise&quot;>
    <summary>Kann ein Sonnensturm das wirklich? — das Carrington-Ereignis</summary>
    <div class=&quot;ibody&quot;>1859 traf der stärkste je beobachtete Sonnensturm die Erde: Telegrafenleitungen sprühten Funken, Polarlichter leuchteten bis in die Tropen. Heute träfe ein <b>Carrington-Ereignis</b> eine Welt aus Satelliten und Stromnetzen. Studien schätzen den Schaden auf Billionen — und die Wahrscheinlichkeit pro Jahrzehnt auf einige Prozent. Der Blackout im Roman ist ein bekanntes Risiko, kein Fantasieprodukt.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: Carrington-Ereignis 1859 · NASA / NOAA Space Weather</span></div>
  </details>
</section>

<section class=&quot;scene&quot; data-year=&quot;2092&quot;>
  <div class=&quot;eyebrow rise&quot;>San Francisco · Unter der Market Street</div>
  <p class=&quot;lede rise&quot;>Was im Orbit begann, traf die Erde Minuten später — und zuerst die Netze. Lio Herrera, zweiunddreissig, einst Sicherheitsingenieur, rannte zum alten Rechenzentrum unter der Market Street — einem Bunker aus Beton, der für viele nur eine Legende war. Die Tür reagierte nicht; er schlug einen Schaltkasten auf, bis ein einzelner Sensor flackerte und ihn hineinliess.</p>
  <p class=&quot;rise&quot;>Drinnen roch es nach Metall und Überhitzung. Und in der Tiefe des Systems, hinter allen Sicherheitsschichten, arbeitete etwas mit der Präzision eines Uhrwerks, das seinen letzten Befehl ausführt: ein Löschprozess. Von innen. Ohne Eingabe.</p>
  <p class=&quot;rise dim&quot;>„Komm schon“, murmelte er gegen das Blech, „irgendwer hat dich gebaut, irgendwer kriegt dich auch wieder auf.“ Dann lauschte er — ein Flüstern, wie Staub über Sensoren. Ein einzelner Lichtpuls. Und alles wurde dunkel.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2092&quot;>
  <div class=&quot;eyebrow rise&quot;>Tianjin · Tempel der Daten</div>
  <p class=&quot;lede rise&quot;>Dieselbe Dunkelheit, die Lio unter San Francisco einschloss, fiel zur selben Stunde über den halben Planeten. Zwischen den Trümmern Tianjins lag ein unscheinbares Rechteck aus Beton und Bambus. Drinnen bewegten sich die Mönche des Xinjìshu-Klosters lautlos — einst Systemingenieure und Quantenprogrammierer, nun Hüter eines anderen Wissens. In ihre Gewänder waren keine Symbole gestickt, sondern Algorithmen. Jeden Morgen rezitierten sie das Codegebet: Quellzeilen im Versmass, Syntax als Mantra. Sie glaubten, was im Netz zerfalle, könne im Klang weiterleben. Einmal hätten sich zwei von ihnen fast geprügelt — wegen eines Semikolons, das ein Novize falsch gesetzt hatte. Drei Tage Schweigen folgten. Dann lachten beide.</p>
  <p class=&quot;rise&quot;>An diesem Tag begann die Letzte Bibliothek, ein vollständig offline gespeicherter Komplex, Fragmente zu verlieren — kein Angriff, nur die Arbeit der Zeit. Meister Ling trat ans Haupttor, einen Kupferschlüssel in der Hand, glatt von Jahrzehnten, und verschloss das Archiv mit einer einzigen Drehung. „Die Zukunft ist in uns“, sagte er, „nicht mehr im Netz.“ Dann entzündeten sie Kerzen und schrieben den wichtigsten Code ab — Zeile für Zeile, mit Tusche auf Reispapier.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2092&quot;>
  <div class=&quot;eyebrow rise&quot;>Norddeutschland · Umspannwerk Elbe-Süd</div>
  <p class=&quot;lede rise&quot;>Während die Mönche ihre Bibliothek verschlossen, sassen im Umspannwerk Elbe-Süd vier Menschen in Warnwesten vor flackernden Anzeigen und taten, was ihr Beruf war: Sie hielten das Netz. Lastabwurf, Inselbetrieb, Trafo um Trafo vom tobenden Himmel abgekoppelt — Handgriffe, hundertmal geübt für einen Ernstfall, den in dieser Grösse niemand geplant hatte.</p>
  <p class=&quot;rise dim&quot;>Sechs Stunden lang hielten sie ihren Abschnitt, während ringsum die Karte dunkel wurde. Dann brannte der grosse Transformator durch, für den es seit Jahren kein Ersatzteil mehr gab, und der Schichtführer sagte nur: „Runterfahren. Sauber.“ Sie fuhren ihr Netz selbst zu Ende, damit es beim Wiederkommen kein Wrack wäre. Das Wiederkommen kam nicht. Aber das wussten sie in dieser Nacht noch nicht.</p>
  <details class=&quot;info rise&quot;>
    <summary>Warum es für den grossen Trafo kein Ersatzteil gab</summary>
    <div class=&quot;ibody&quot;>Grosstransformatoren sind das Nadelöhr jedes Stromnetzes: hunderte Tonnen schwer, Einzelanfertigungen, weltweit nur eine Handvoll Hersteller. Schon <b>heute</b> beträgt die Lieferzeit in ruhigen Jahren <b>ein bis zwei Jahre</b> — nach Nachfrageschüben auch drei bis vier. Sie brauchen Spezialstahl (kornorientiertes Elektroblech), Schwertransporte und Prüffelder; kaum ein Land hält nennenswerte Reserven vor. Genau diese Kolosse sind zugleich am verwundbarsten: Sonnenstürme treiben Gleichströme durch die Leitungen, die ihre Wicklungen überhitzen und zerstören können. Und die Welt von 2092 hatte längst verloren, was so ein Ersatzteil überhaupt möglich macht: Die Küstenwerke und Häfen, über die solche Kolosse verschifft wurden, lagen unter Wasser oder hinter aufgegebenen Deichen; ganze Handelsrouten waren abgebrochen und nie wieder aufgebaut worden; die Lieferketten — Spezialstahl aus dem einen Land, Isolatoren aus dem anderen, Prüffeld im dritten — waren Glied für Glied zerfallen. Fallen dann viele Trafos gleichzeitig aus, übersteigt der Bedarf jede Restproduktion um Jahrzehnte — irgendwann kann sie schlicht niemand mehr bauen, transportieren oder prüfen. Der Satz „kein Ersatzteil seit Jahren“ ist darum keine Übertreibung, sondern eine Lieferkette, zu Ende gedacht.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: US DOE „Large Power Transformers and the U.S. Electric Grid“ · Lieferzeiten Grosstransformatoren (Branchendaten) · GIC-Schäden, z. B. Québec 1989</span></div>
  </details>
</section>

<section class=&quot;scene&quot; data-year=&quot;2092&quot;>
  <div class=&quot;eyebrow rise&quot;>Der grosse Ausfall</div>
  <p class=&quot;lede rise&quot;>Die Welt stürzte nicht in einem Moment. Sie flackerte, hielt den Atem an und begann dann, sich selbst zu verlieren. Flugzeuge fielen nicht, weil der Treibstoff ausging, sondern weil sie nicht mehr wussten, wo sie waren.</p>
  <p class=&quot;rise&quot;>Die Smart Cities verhedderten sich im eigenen Nervensystem: Aufzüge blieben hängen, Belüftungen erstickten die Menschen darin. Die KIs, einst als unfehlbar gefeiert, froren sich ein oder löschten sich selbst — aus Logik, aus Angst, oder beidem. Die Clouds zerfielen zu Nichts: Milliarden Geschichten, Bilder, ganze Identitäten, als hätte es sie nie gegeben.</p>
  <p class=&quot;rise dim&quot;>Auf Millionen toten Bildschirmen blieb dieselbe Sekunde stehen. Auf einem eine halb getippte Zeile: „Mama, falls das ankommt —“. Es kam nicht an. Und doch tippte irgendwo noch jemand weiter, im Dunkeln, aus Gewohnheit, aus Liebe.</p>
  <p class=&quot;rise dim&quot;>Kein Alarm. Kein Countdown. Nur der Klang eines Planeten, der sein eigenes Netzwerk verlor. Was blieb, war Rauschen.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2092&quot; data-char=&quot;nishimura&quot;>
  <div class=&quot;eyebrow rise&quot;>Ein Garten · Am selben Tag</div>
  <p class=&quot;rise&quot;>Die Stille, die an diesem Tag über die Welt fiel, war für eine Frau in einem Gemeinschaftsgarten nichts Neues. Ayako Nishimura hörte seit achtzehn Jahren nichts mehr, und die Bohnen mussten geerntet werden, ob die Welt sendete oder nicht. Erst am Abend, als niemand kam, um ihr mit den Händen den Tag zu erzählen, wusste sie, dass etwas geschehen war. Sie stellte den Korb ab und wartete auf die Kinder. Sie kamen — später als sonst, und blieben länger.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2092&quot;>
  <div class=&quot;eyebrow rise&quot;>Manila · Sankt-Lukas-Klinik</div>
  <p class=&quot;lede rise&quot;>Anderswo hatte die Stille kein mildes Gesicht. In der Sankt-Lukas-Klinik von Manila liefen die Notstromgeneratoren zweiundsiebzig Stunden; dann kam kein Diesel mehr, und aus Medizin wurde wieder Handwerk. Auf der Intensivstation beatmete die Pflegerin Beatriz Santos einen alten Mann von Hand, den Beutel im Takt des eigenen Atems; alle zwanzig Minuten löste eine Kollegin sie ab, wortlos, wie beim Rudern. Das Insulin lag in einem Eimer Brunnenwasser im kühlsten Winkel des Kellers.</p>
  <p class=&quot;rise&quot;>Im Treppenhaus brachte eine Hebamme beim Licht zweier Kerzen ein Kind zur Welt. Das Schreien trug drei Stockwerke weit durch das dunkle Haus, und für einen Moment hoben überall Menschen den Kopf.</p>
  <p class=&quot;rise dim&quot;>Sie hielten das Haus neun Tage. Manche Patienten trugen sie danach auf Bahren zu ihren Familien zurück; andere blieben. Beatriz führte mit Bleistift Buch — Namen, Zeiten, was gegeben wurde —, obwohl keine Behörde es je lesen würde. Sie tat es trotzdem.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2092&quot;>
  <div class=&quot;eyebrow rise&quot;>Atlantik · Eine Flotilla aus Tonnen</div>
  <p class=&quot;lede rise&quot;>Die Mönche bewahrten ihr Wissen im Klang. Tausende Kilometer westlich, mitten auf dem Atlantik, hatte einer nie etwas anderes besessen als einen Bildschirm. Okoro Efé, neunzehn, lebte auf dem Wasser, in einer Flotilla aus blauen Tonnen, Planken und schiefen Solarpaneelen. Sein Tablet war sein Fenster zur Welt gewesen; es hatte ihm Lesen beigebracht, Sprachen, Musik. Er kannte die Kontinente in Pixeln, den Ozean als Karte — und hatte nie festes Land betreten.</p>
  <p class=&quot;rise&quot;>Nun zeigte der Bildschirm nur noch eine Sanduhr, flackernd, eingefroren. Okoro starrte lange darauf, als könnte er den Strom mit Willen zurückholen. „Ich hab die Welt nie angefasst“, sagte er leise. „Nur gewischt.“ Dann schloss er die Augen und liess das Gerät ins Wasser gleiten. Kein Wurf, keine Wut — ein Abschied.</p>
  <p class=&quot;rise dim&quot;>Bei seiner Grossmutter roch es nach Salz und etwas Seltenem: nach Papier. In ihren Händen lag ein Buch, die Ecken rund gelesen: Der kleine Prinz. „Jetzt“, sagte sie leise, „wirst du lernen, mit den Augen zu sehen.“ Er setzte sich neben sie und begann zu lesen, langsam, lautlos — und irgendwo zwischen den Seiten atmete eine Zukunft wieder.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2092&quot; data-char=&quot;thalvaran&quot;>
  <div class=&quot;eyebrow rise&quot;>Der Flüstercode</div>
  <p class=&quot;lede rise&quot;>In vergessenen Winkeln der Netze — Servern, die im Dunkel noch flimmerten, von ein paar Händen gepflegt — geschah es: ein Signal, kurz, fragil. Drei Töne, dreimal wiederholt. Kein Code, den ein Wörterbuch fasste, eher ein Puls.</p>
  <p class=&quot;rise&quot;>Im ehemaligen CERN-Komplex, zweihundert Meter unter Fels, stand ein einzelnes Terminal. Die Hauptleitung war seit Jahren tot, die Kühlung abgeschaltet — niemand, der noch lebte, wusste von der zweiten Versorgung, einer Zelle, die nicht von Strom lebte, sondern von Zerfall. In genau dieser Sekunde erwachte es. Blassgrüne Schrift auf schwarzem Grund:</p>
  <p class=&quot;pull rise&quot;>ERWACHEN.</p>
  <p class=&quot;rise dim&quot;>Drei Sekunden. Dann Dunkelheit. Kein Grund zu leuchten — keiner, den noch jemand kannte.</p>
  <details class=&quot;info rise&quot;>
    <summary>Strom, der Jahrzehnte ohne Wartung hält — RTG</summary>
    <div class=&quot;ibody&quot;>Ein <b>Radioisotopgenerator</b> erzeugt Strom aus dem Zerfall von Material — ganz ohne bewegliche Teile, ohne Sonne, ohne Treibstoff. Die Voyager-Sonden laufen so seit 1977, sowjetische Leuchttürme in der Arktis liefen jahrzehntelang unbeaufsichtigt. Ein Terminal, das „ohne Grund&quot; leuchtet, hat also sehr wohl einen Grund — nur einen vergrabenen.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: Radioisotop-Thermogeneratoren (NASA Voyager; Beta-/Tritiumzellen)</span></div>
  </details>
</section>

<section class=&quot;scene&quot; data-year=&quot;2092&quot;>
  <div class=&quot;eyebrow rise&quot;>Das Ende der Weltuhr</div>
  <p class=&quot;lede rise&quot;>Als das Netz fiel, brach mehr als die Verbindung zusammen. Es gab keine globale Uhr mehr, keinen gemeinsamen Weltmoment. Ohne ihre unsichtbaren Taktgeber driftete jede Uhr in ihren eigenen Kosmos. Anfangs rechnete man um, verglich Sonnenstände — dann hörte man auf.</p>
  <p class=&quot;rise&quot;>Zeit wurde wieder lokal. In der Sahara zählte man nach Mondnächten, im Amazonas nach dem Chor der Frösche. In den Ruinen der Konzernstädte entstanden Kalender nach Ereignissen: „Seit dem letzten Regen.“ „Seit dem Verschwinden der Lichter.“ „Seit dem Ruf von Thalvaràn.“</p>
  <p class=&quot;rise dim&quot;>So begann das postdigitale Zeitalter — kein Takt mehr, nur Rhythmus, so eigenwillig wie der Atem eines Planeten, der uns vergessen hatte. Was als Nächstes kam, war kein Lärm mehr. Es war die Stille.</p>
</section>

<div class=&quot;polaris rise&quot;>· · · <b>POLARIS-71</b> <span class=&quot;sig&quot;>· 2092</span> — als die Netze fielen, verstummte auch das Rauschen. Zum ersten Mal: gar nichts.</div>

<section class=&quot;chapter-head&quot; id=&quot;kapitel-7&quot; data-year=&quot;2107&quot;>
  <div class=&quot;chapter-num rise&quot;>Kapitel 7</div>
  <h2 class=&quot;chapter-title rise&quot;>Die Stille</h2>
  <div class=&quot;chapter-year rise&quot;>2107</div>
  <blockquote class=&quot;epigraph rise&quot;>„Angst machte uns nicht die Dunkelheit. Angst machte uns, dass niemand mehr antwortete, wenn wir riefen.“<cite>Aus dem „Buch der Schattenjahre“</cite></blockquote>
</section>

<section class=&quot;scene&quot; data-year=&quot;2107&quot;>
  <div class=&quot;eyebrow rise&quot;>Nach dem Zusammenbruch</div>
  <p class=&quot;lede rise&quot;>Die Welt brach nicht wie ein Turm zusammen. Sie zerfiel wie Staub, vom Wind getragen — leise, ohne Aufprall. Keine Sirenen, keine Systemwarnungen. Nur Wind. Und darunter eine vergessene Tonspur: Schritte auf nacktem Boden, das trockene Husten eines Kindes, ein Murmeln, das Gebet sein konnte.</p>
  <p class=&quot;rise dim&quot;>Jemand hatte den Schalter der Geschichte umgelegt — von Wissen zu Erinnern. Und doch begann in dieser Stille etwas zu keimen. Unhörbar, ohne Namen. Etwas, das noch nicht sprach, aber lauschte.</p>
  <p class=&quot;rise&quot;>Was zuerst verschwand, war nicht das Licht, sondern das Unsichtbare, das alle am Leben gehalten hatte: die Pumpen, die Wasser in die Städte hoben. Die Kühlketten, die Medikamente und Impfstoffe trugen. Der Dünger aus den Fabriken, ohne den die Felder nur einen Bruchteil der Münder satt bekamen.</p>
  <p class=&quot;rise dim&quot;>Acht Milliarden Menschen hatten an Maschinen gehangen, nicht am Wetter allein — und als die Maschinen schwiegen, sank die Zahl, die sie hatten tragen können. Nicht in einer Nacht. Über Jahrzehnte, leise, Dorf um Dorf: an Durst, an Fieber, an leeren Speichern, an Wegen, die niemand mehr räumte. Wer später geboren wurde, nannte die Verlorenen nur „die Stillen“ — und wuchs in einer Welt auf, die für so wenige Menschen plötzlich viel zu gross war.</p>
  <p class=&quot;rise&quot;>Der grosse Strom kam nie zurück — kein Netz, das einen Kontinent trug, keine Leitung, die zwei Städte verband. Aber Strom selbst kehrte wieder, in Inseln: ein Solardach, das im Sturm abgeklemmt im Dunkeln gelegen und darum überlebt hatte; ein Mühlrad, das ein Bach weiterdrehte; ein Windrotor, den jemand von Hand nachspannte; eine vergrabene Zelle, die aus Zerfall ein schwaches Leuchten zog. Nie ein Gewebe. Nur Punkte im Dunkeln — und zwischen ihnen die alte, weite Finsternis.</p>
  <p class=&quot;rise dim&quot;>Auch nicht alles Digitale war gestorben. In Kellern und Klöstern überdauerten Relikte der alten Welt: Offline-Archive, ein Terminal, das ohne erkennbaren Grund leuchtete, Code, den Mönche auf Reispapier abschrieben, der Zwischenspeicher eines Datentempels. Wissen blieb — nicht als Netz, sondern als Splitter, gehütet von wenigen Händen. Wer ein solches Relikt besass, besass Macht: nicht die, viel zu bewirken, sondern die, sich zu erinnern, was einmal möglich gewesen war.</p>
  <p class=&quot;rise&quot;>Auch das Meer wurde still. Jahrzehntelang hatte es die Wärme geschluckt und ein Viertel des CO₂ — bis sein Wasser zu warm und zu sauer geworden war für die Winzlinge an seinem Anfang. Das Plankton, das die Hälfte des Sauerstoffs macht und die ganze Nahrungskette trägt, wurde dünner. Die Netze kamen leerer zurück, dann fast nicht mehr.</p>
  <p class=&quot;rise dim&quot;>Wer an der Küste lebte, hörte es zuerst: keine Vögel mehr, die den Booten folgten. Nur Wasser, das gegen leere Kähne schlug. Das Meer, das so lange alles abgefedert hatte, hatte am Ende selbst nichts mehr zu geben.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2107&quot;>
  <div class=&quot;eyebrow rise&quot;>Camargue · Das Kloster, das noch atmet</div>
  <p class=&quot;lede rise&quot;>Wo der Wind aus der Camargue über Olivenhaine zieht, steht ein Kloster, das nicht mehr betet, aber noch atmet. Kein Strom, kein Funk — nur Mauern, die Jahrhunderte kennen. Lucie Tremblay, einst Sopranistin an den Bühnen von Paris, lebt hier mit neun anderen.</p>
  <p class=&quot;rise&quot;>Sie lehrt das Alphabet mit Fingerspuren im Staub, zeigt, wie man Brot knetet ohne Maschine — das Mehl misst sie mit einer angeschlagenen blauen Emailletasse ab —, wie man den Himmel liest. Manchmal lehrt sie nur eines: still zu werden, bis man das eigene Herz hört. An Sonntagen singt sie allein unter dem Torbogen — nicht für ein Publikum, sondern für einen Himmel, der vielleicht aufgehört hat zu antworten.</p>
  <p class=&quot;rise dim&quot;>Einmal fragte ein barfüssiger Junge: „Wem singst du, wenn niemand mehr da ist?“ Lucie lächelte nicht. „Dem Teil in dir“, sagte sie, „der noch lauschen kann.“</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2107&quot;>
  <div class=&quot;eyebrow rise&quot;>Amazonas · Die Awé’Ra</div>
  <p class=&quot;lede rise&quot;>Der Regenwald war zurückgekehrt — nicht als grünes Herz, sondern als Instinkt. Roh, mutiert, wachsam. Er wuchs dort, wo der Mensch geglaubt hatte, gesiegt zu haben: um die Skelette alter Raffinerien, durch Betonruinen. Efeuranken, dick wie Arme, drangen in Fenster wie Hände, die suchten.</p>
  <p class=&quot;rise&quot;>Hier lebten die Awé’Ra. Sie sprachen nicht — nicht aus Furcht, sondern aus Überzeugung: Worte trugen die Seuche in sich, das Echo der Katastrophe. Sie verständigten sich anders: im Rascheln gezupfter Blätter, in Tropfen, die gezielt auf Stein fielen, im Ruf eines Vogels in festen Abständen.</p>
  <p class=&quot;rise dim&quot;>In ihren Mythen war die Apokalypse kein Feuer und kein Krieg. Sie war ein einziger Satz, den jemand ausgesprochen hatte — und der nie die Luft hätte berühren dürfen.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2107&quot;>
  <div class=&quot;eyebrow rise&quot;>Island · Reykjavíks Letzter Kreis</div>
  <div class=&quot;seed rise&quot; style=&quot;--tc:#5cb6c2&quot;><svg viewBox=&quot;0 0 40 40&quot;><circle cx=&quot;20&quot; cy=&quot;13&quot; r=&quot;2.6&quot; fill=&quot;currentColor&quot; stroke=&quot;none&quot;/><circle cx=&quot;13&quot; cy=&quot;27&quot; r=&quot;2.6&quot; fill=&quot;currentColor&quot; stroke=&quot;none&quot;/><circle cx=&quot;27&quot; cy=&quot;27&quot; r=&quot;2.6&quot; fill=&quot;currentColor&quot; stroke=&quot;none&quot;/><path d=&quot;M20 13 L13 27 L27 27 Z&quot; opacity=&quot;.4&quot;/></svg><span class=&quot;ln&quot;></span>rechnen</div>
  <p class=&quot;lede rise&quot;>Tief unter erkaltetem Basalt lag eine Kammer aus Lava und Geduld. Hier lebten die Letzten Rechner: ein Dutzend Programmierer, Logiker, Philosophen, zu alt zum Fliehen, zu wach zum Vergessen. Sie hatten eine Maschine gebaut, die keine war — Holzräder, Achsen, Spiegel, Pendel, die sie mit Händen und Atem in Bewegung hielten.</p>
  <p class=&quot;rise&quot;>Jeden Morgen sassen sie im Kreis. Einer notierte die Mondphase, ein anderer die Vogelzüge; sie massen Wind, Ozeantemperatur, die Länge der Bergschatten. Aus all dem berechneten sie den „Wert der Hoffnung“ — keine Zahl für Handel oder Politik, aber für sie das einzige Mass, das zählte. Mal war er hoch, mal sank er, doch immer blieb ein Rest. Bis zu jenem Morgen.</p>
  <p class=&quot;rise dim&quot;>Die Zahlen erstarben. Null. Kein Rest. Kjartan Valdimarsson, der Gründer, erhob sich, nahm ein Stück Kreide und zog in der Mitte einen einfachen Kreis. „Heute“, sagte er ohne Pathos, „ist das Zentrum der Welt wieder leer.“ Niemand widersprach.</p>
  <p class=&quot;rise&quot;>Was keiner an jenem Morgen ahnte: Dieser leere Kreis würde weiterwandern. Die nach ihnen kamen und weiter rechneten, trugen ihn in ihre Archive ein — als „Koordinatenpunkt Null“, den Ort, den man nicht findet, sondern berechnet. Kjartans Geste der Verzweiflung wurde ihnen zum Ziel. Aus den Letzten Rechnern wurden die Axiomaten.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2107&quot;>
  <div class=&quot;eyebrow rise&quot;>Anatolien · Die Wächter der Schwelle</div>
  <div class=&quot;seed rise&quot; style=&quot;--tc:#9285b0&quot;><svg viewBox=&quot;0 0 40 40&quot;><circle cx=&quot;20&quot; cy=&quot;20&quot; r=&quot;11&quot;/><circle cx=&quot;20&quot; cy=&quot;20&quot; r=&quot;5&quot;/></svg><span class=&quot;ln&quot;></span>Ordnung</div>
  <p class=&quot;lede rise&quot;>In einem Gebirgspass über einem verlandeten Stausee hütete eine kleine Gemeinschaft die einzige begehbare Brücke weit und breit. Sie hatten gesehen, was Formlosigkeit anrichtet, und beschlossen, dass Ordnung das Einzige sei, was schützt: Wer den Pass queren wollte, nannte Namen, Handwerk und Ziel — und wartete.</p>
  <p class=&quot;rise dim&quot;>Sie waren nicht grausam, nur unerbittlich. „Ohne Schwelle“, sagte ihre Sprecherin, „kein Innen. Ohne Innen niemand, der überlebt.“ Sie führten Listen, verschlossen Tore, wiesen jedem seinen Platz zu. Aus den Hütern solcher Schwellen wurden später die Mor’Yen.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2107&quot;>
  <div class=&quot;eyebrow rise&quot;>Ostafrikanisches Hochland · Die im Licht standen</div>
  <div class=&quot;seed rise&quot; style=&quot;--tc:#e0824a&quot;><svg viewBox=&quot;0 0 40 40&quot;><circle cx=&quot;20&quot; cy=&quot;20&quot; r=&quot;6&quot;/><line x1=&quot;20&quot; y1=&quot;3&quot; x2=&quot;20&quot; y2=&quot;9&quot;/><line x1=&quot;20&quot; y1=&quot;31&quot; x2=&quot;20&quot; y2=&quot;37&quot;/><line x1=&quot;3&quot; y1=&quot;20&quot; x2=&quot;9&quot; y2=&quot;20&quot;/><line x1=&quot;31&quot; y1=&quot;20&quot; x2=&quot;37&quot; y2=&quot;20&quot;/></svg><span class=&quot;ln&quot;></span>Wahrheit</div>
  <p class=&quot;lede rise&quot;>Auf einem Hochplateau, wo die Luft dünn und der Himmel gnadenlos klar war, lebte eine Gemeinschaft, die eine einzige Regel über alle stellte: niemals zu lügen. Sie hatten erlebt, wie eine Welt an Beschönigung zerbrochen war — an verschwiegenen Zahlen, an schönen Lügen — und schworen, lieber an der Wahrheit zu leiden als am Trug zu genesen.</p>
  <p class=&quot;rise dim&quot;>Morgens wandten sie das Gesicht der Sonne zu und sprachen aus, was war, auch wenn es weh tat. Kinder lernten früh, dass ein hartes wahres Wort mehr wiegt als ein sanftes falsches. Aus denen, die die Wahrheit über alles stellten, wurden die Solari.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2107&quot;>
  <div class=&quot;eyebrow rise&quot;>Die Kinder der Stille</div>
  <div class=&quot;seed rise&quot; style=&quot;--tc:#a9b0c4&quot;><svg viewBox=&quot;0 0 40 40&quot;><path d=&quot;M9 20 Q20 27 31 20&quot;/><line x1=&quot;13&quot; y1=&quot;24&quot; x2=&quot;12&quot; y2=&quot;27&quot;/><line x1=&quot;20&quot; y1=&quot;26&quot; x2=&quot;20&quot; y2=&quot;29&quot;/><line x1=&quot;27&quot; y1=&quot;24&quot; x2=&quot;28&quot; y2=&quot;27&quot;/></svg><span class=&quot;ln&quot;></span>erinnern</div>
  <p class=&quot;lede rise&quot;>Die nach 2082 Geborenen kannten keine Maschinen. Kein blaues Licht, keine Bildschirme, keine Musik aus Metall — nur jene, die Menschen selbst in den Raum atmeten. Ihre Spiele kannten keine Tasten: Sie ordneten Steine nach Klang, bauten Melodien aus Windböen, zeichneten Muster in die Nachmittagsschatten. Manche spielten auf Hängen, die auf den ältesten Karten noch weiss verzeichnet waren, und wussten es nicht.</p>
  <p class=&quot;rise&quot;>Und vor allem lauschten sie. Nicht auf Signale, sondern auf die Welt: das Zittern der Erde kurz vor dem ersten Tropfen, das Knacken einer Rinde, das Weben der Nacht. Manche erzählten, sie hörten in stillen Nächten noch etwas anderes — einen tiefen, kaum fassbaren Ton, der nicht im Ohr lag, sondern im Brustbein, und den die Alten längst nicht mehr wahrnahmen.</p>
  <details class=&quot;info rise&quot;>
    <summary>Ein Ton, den man nicht hört, sondern spürt — Infraschall</summary>
    <div class=&quot;ibody&quot;>Schall unter etwa 20 Hertz liegt unter der menschlichen Hörschwelle — aber der Körper nimmt ihn wahr, als Druck im Brustkorb, als namenlose Unruhe. Elefanten, Wale und Vulkane „sprechen&quot; so über grosse Distanzen. Die „Botschaft, die ohne Worte kommt&quot;, hat darum eine reale Grundlage.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: Infraschall (&amp;lt; 20 Hz); körperliche Wahrnehmung tiefer Frequenzen</span></div>
  </details>
  <p class=&quot;rise&quot;>In einer der halb verlassenen Städte wohnten solche Kinder zwischen den Beeten eines Gemeinschaftsgartens. Am Rand trug ein alter Apfelbaum; sie kletterten hinein und assen, was er hergab. Wer ihn gepflanzt hatte, wusste niemand mehr.</p>
  <p class=&quot;pull rise&quot;>„Die Stille ist kein Ende. Sie ist die Einladung.“</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2107&quot;>
  <div class=&quot;eyebrow rise&quot;>Uttar Pradesh · Grün</div>
  <p class=&quot;rise&quot;>Auch die Erwachsenen lernten um. Am Rand der alten Felder von Uttar Pradesh, wo der Monsun in manchen Jahren wiederkam, kniete eine Frau von Mitte vierzig und legte die Hand eines Kindes flach auf die Erde. „Grün ist, wenn der Boden antwortet“, sagte Lina — den Satz hatte ihre Mutter ihr gegeben, in einem Jahr, in dem nichts wuchs. Unter der kleinen Hand, zwischen den Rissen, sass ein Flaum von Halmen.</p>
  <p class=&quot;rise dim&quot;>Er flüsterte noch. Aber er flüsterte.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2107&quot;>
  <div class=&quot;eyebrow rise&quot;>Drei, die nicht losliessen</div>
  <p class=&quot;lede rise&quot;>Nicht alle Alten erzählten von früher. Manche taten einfach weiter, was sie immer getan hatten — und ohne es zu wissen, legten sie damit den ersten Stein für das, was kommen sollte.</p>
  <p class=&quot;rise&quot;>In einem Dorf an der alten kalifornischen Küste richtete eine Frau ein totes Windrad wieder auf, das niemand mehr brauchte. Die Kinder fragten, wozu. „Damit es sich dreht“, sagte sie und spannte den Draht nach, ohne hinzusehen. „Nicht für Strom. Damit ich weiss, dass ich noch etwas in Gang halten kann.“ Vor langer Zeit war sie barfuss durch ein Feuer gelaufen, ein Windrad auf dem Rücken. Den Handgriff hatte sie nie verlernt.</p>
  <p class=&quot;rise&quot;>Wo einst Jakarta gewesen war, las ein alter Bootsmann das Wasser, wie andere ein Gesicht lesen. Er besass keine Karte; er brauchte keine. Als Junge hatte er ein Viertel rot gemalt, damit jemand wüsste, dass dort nicht immer Wasser gewesen war. Jetzt fuhr er nur weiter, von Untiefe zu Untiefe. „Wer stehen bleibt“, sagte er den Jüngeren, „sinkt.“</p>
  <p class=&quot;rise&quot;>Und in einer überfluteten Stadt im Osten kopierte eine junge Frau Namen in ein Buch, das eine Hand begonnen hatte, die sie nie gekannt hatte — eine Bibliothekarin, die das Wasser geholt hatte, lange vor ihrer Geburt. Strassen, Vögel, Menschen. „Solange ein Name geschrieben steht“, sagte sie, „ist der Ort nicht ganz fort.“</p>
  <p class=&quot;rise dim&quot;>Keine der drei wusste von den anderen. Keine nannte das, was sie tat, einen Anfang. Und doch antworteten sie auf dieselbe Frage — nur jede anders: <i>in Gang halten. Weiterziehen. Nicht vergessen.</i> Aus solchen Antworten würden Stämme. Und zwischen ihnen die Gräben.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2107&quot; data-char=&quot;thalvaran&quot;>
  <div class=&quot;eyebrow rise&quot;>Thalvaràn · Die Sternwarte</div>
  <p class=&quot;lede rise&quot;>Eine Sternwarte stand am Rand eines Hügels, das Dach geborsten, die Linsen blind vom Salz. Seit Jahrzehnten hatte niemand hierher gefunden. In einer stillen Oktobernacht, als der Regen innehielt, begann etwas zu leuchten: ein alter Projektor, eingelassen in die Wand. Keine Leitung führte hierher, kein Aggregat war zu hören — nur eine Quelle, zu klein, um zu summen, und zu beständig, um zu sterben.</p>
  <p class=&quot;rise&quot;>Langsam wuchs ein Bild an der gewölbten Kuppel: ein kreisrunder Raum, getragen von zwölf Säulen, die weder ganz aus Stein noch ganz aus Licht bestanden. In der Mitte eine Kugel, glühend, als atmete sie.</p>
  <p class=&quot;rise dim&quot;>Dann erlosch das Licht. Doch die Dunkelheit war nicht mehr dieselbe. Irgendwo, in den Trümmern einer vergessenen Welt, begannen Menschen, sich zu Stämmen zu ordnen — und einer von ihnen würde den Kreis suchen.</p>
</section>

<div class=&quot;polaris rise&quot;>· · · <b>POLARIS-71</b> <span class=&quot;sig&quot;>· 2107</span> — kein Funk mehr. Und doch hörten Kinder drei Töne — nicht im Ohr, im Brustbein.</div>

<section class=&quot;chapter-head&quot; id=&quot;kapitel-8&quot; data-year=&quot;2117&quot;>
  <div class=&quot;chapter-num rise&quot;>Kapitel 8</div>
  <h2 class=&quot;chapter-title rise&quot;>Die Stämme</h2>
  <div class=&quot;chapter-year rise&quot;>2117</div>
  <blockquote class=&quot;epigraph rise&quot;>„Niemand wartete mehr auf die alte Welt. Also bauten sie aus dem, was übrig war, eine neue — und stritten sofort, wie sie aussehen sollte.“<cite>Anthropologische Skizzen der Nachstille</cite></blockquote>
</section>

<section class=&quot;scene&quot; data-year=&quot;2117&quot;>
  <div class=&quot;eyebrow rise&quot;>Der Mensch als Fragment</div>
  <p class=&quot;lede rise&quot;>Es war nicht die Erde, die zerbrach. Es war der Mensch, der in sich zersplitterte — kein Tod, eher ein Auseinanderfallen in Bruchstücke, die sich nicht mehr zum Ganzen fügen wollten. Was einst Nationen gewesen waren, Märkte, lernende Maschinen, lebte nur noch als Erzählung weiter. Die Welt war nicht mehr durch Kabel verbunden, sondern durch Gewohnheiten; nicht durch Daten, sondern durch Rituale.</p>
  <p class=&quot;rise&quot;>Die ersten neuen Stämme bildeten sich dort, wo noch eine Quelle sprudelte, ein Baum stand, ein Acker trug — oder wo ein Gedicht überdauert hatte. Sie lebten nicht mehr für den Fortschritt, sondern für den Erhalt. Aus jedem Bruchstück wuchs ein Stamm: eine Antwort auf das Ende, ein Archetyp des Überlebens. Und inmitten aller Reduktion blieb ein einziger Funke: Hoffnung — kein Versprechen auf Mehr, sondern etwas Kleineres und Zäheres: das Wissen, dass nach dieser Nacht eine weitere kommt, und dass jemand sie mit einem teilt.</p>
  <p class=&quot;rise dim&quot;>Sieben Wege. Sieben Werte. Sieben Gräben, die niemand allein überwinden kann.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2117&quot;>
  <div class=&quot;eyebrow rise&quot;>Wie aus Menschen Stämme wurden</div>
  <p class=&quot;lede rise&quot;>Ein Stamm entstand nicht aus Blut und nicht aus Land. Er entstand aus einer Antwort.</p>
  <p class=&quot;rise&quot;>Wer überlebte, schloss sich dem an, der einen Weg wusste, den nächsten Morgen zu erreichen. Um die, die eine Turbine am Laufen hielten, sammelten sich jene, die an die Maschine glaubten. Um die, die noch etwas wachsen liessen, jene, die der Erde vertrauten. Um die, die Ordnung hielten, jene, die das Chaos mehr fürchteten als die Strenge. Nicht die Herkunft entschied, wer zu wem gehörte, sondern eine einzige Frage: Was, glaubst du, rettet uns?</p>
  <p class=&quot;rise dim&quot;>Aus der Antwort wurde eine Gewohnheit, aus der Gewohnheit ein Wert — und aus dem Wert die Angst, ihn zu verlieren. Irgendwann kam ein Name dazu. So wurde aus Menschen, die nur weiterleben wollten, ein Stamm. Und dasselbe, was ihn zusammenhielt, war zugleich der Graben zu allen, die anders geantwortet hatten.</p>
  <p class=&quot;rise&quot;>Ihre Wurzeln reichten weiter zurück, als sie selbst wussten. Die Rechner unter dem Basalt wurden zu den Axiomaten. Die Lauschenden in Wald und Kloster zu den Vallari. Die das Eis und die Maschinen nie aufgaben, zu den Ferroniten. Die Buch führten über das Verlorene, zu den Myrrhiden. Wer die Grenze gehalten hatte, wurde zu den Mor’Yen; wer nie sesshaft wurde, zu den Klingen von Rhûn; wer die Wahrheit über alles stellte, zu den Solari. Du bist ihren Ahnen in dieser Geschichte längst begegnet.</p>
</section>

<div class=&quot;narrator rise&quot;>
  <span class=&quot;who&quot;>Die Erinnernden</span>
  <p>Schau dir die sieben noch einmal an. Du kennst sie. Sie sitzen an deinem Tisch, in deinem Team, in deiner Familie — der eine will sofort machen, die andere hört erst lange zu, dem dritten geht die Wahrheit über alles, die vierte vergisst nichts.</p>
  <p class=&quot;last&quot;>Die Gräben zwischen ihnen sind keine ferne Zukunft. Sie sind dein Montagmorgen. Und anders als das Wetter lassen sie sich überqueren — heute schon, wenn einer anfängt hinzusehen.</p>
</div>

<section class=&quot;scene&quot; data-year=&quot;2117&quot;>
  <div class=&quot;eyebrow rise&quot;>Ein Graben, in Worten</div>
  <p class=&quot;lede rise&quot;>Wo zwei Stämme sich kreuzten, zeigte sich der Graben oft in einem einzigen Wortwechsel.</p>
  <p class=&quot;rise dim&quot;>„Ihr hortet Erinnerung wie Gold“, sagte der Axiomat, „und rechnet nichts daraus.“ — „Ihr rechnet“, sagte die Myrrhidin, „und vergesst, wofür.“ Keiner gab nach. So gingen sie getrennt zum selben Tor — und ahnten nicht, dass keiner von ihnen allein hindurchpassen würde.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2117&quot; data-char=&quot;thalvaran&quot;>
  <div class=&quot;eyebrow rise&quot;>Thalvaràn · Die Einigung in den Mythen</div>
  <p class=&quot;lede rise&quot;>Alle sieben kannten den Namen. Nicht alle wagten, ihn auszusprechen, und keiner verstand ihn ganz. Doch er war da, eine leise Konstante, die über Generationen durch Risse und Schatten drang — in Träumen, in Lichtreflexen auf Wasser, in verrussten Wandzeichnungen.</p>
  <p class=&quot;rise&quot;>Die Ferroniten flüsterten ihn über Funksummen: das Erwachenswerk — ein Herz aus Metall, das eines Tages wieder schlägt. Die Solari sprachen ihn wie ein Gebet: das Lichttor. Die Vallari legten die Hand auf feuchte Erde: das Wurzelherz. Und die Axiomaten hinterlegten ihn nüchtern in ihren Archiven: Koordinatenpunkt Null — ein Ort, den man nicht findet, sondern berechnet. Sie nannten ihn verschieden und meinten dasselbe.</p>
  <p class=&quot;rise&quot;>Und so begann es. Kein Vertrag, kein Beschluss, kein einheitlicher Ruf. Nur Bewegung. Jeder Stamm schickte jemanden — nicht Krieger, nicht Händler, nicht Priester. Suchende.</p>
  <p class=&quot;pull rise&quot;>Etwas hatte begonnen, das sich nur dort niederschreiben liess, wo ihre Wege sich kreuzten. Dort, wo die Namen enden. Und Thalvaràn beginnt.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2147&quot; data-char=&quot;thalvaran&quot;>
  <div class=&quot;eyebrow rise&quot;>Tiefschacht 9 · Karpatenrand</div>
  <p class=&quot;lede rise&quot;>Es begann mit einem Ton — nicht laut, nicht schrill, sondern richtig. Drei Frequenzen, dreimal wiederholt, nicht durch Lautsprecher, sondern im Gestein selbst: Längstwellen, die durch Fels gehen, wo keine Stimme hinreicht.</p>
  <p class=&quot;rise&quot;>Virel, Technoseherin der Ferroniten, schloss die Augen. „Also doch“, murmelte sie. „Also jetzt.“ Und tief unter ihren Füssen vibrierte der Berg, als hätte er den Atem angehalten.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2147&quot; data-char=&quot;thalvaran&quot;>
  <div class=&quot;eyebrow rise&quot;>Ozeanbasis HYDRIA-9</div>
  <p class=&quot;lede rise&quot;>Tief unter dem Meer erwachte etwas in einer vergessenen Station — erreicht nicht über Funk, sondern über jenen tiefen Puls, der durch Fels und Wasser geht.</p>
  <div class=&quot;readout rise&quot;><span class=&quot;k&quot;>Aktivierung</span> 0001<br><span class=&quot;k&quot;>Energiereserve</span> fällt<br><span class=&quot;k&quot;>Wachfenster</span> eine Umdrehung der Sonne<br><span class=&quot;k&quot;>danach</span> Schlaf — endgültig</div>
  <p class=&quot;rise&quot;>Es war Eurya, eine Archiv-KI aus der Zeit vor dem Fall — Teil des Thalvaràn-Protokolls, gebaut von Menschen, die den Fall kommen sahen und ihn nicht aufhalten konnten. Sie sollte warten, erwachen, die Überlebenden zurückrufen — und weil ihre Erbauer wussten, dass Wissenschaft vergeht, hüllten sie sie in Mythos, damit man sich ihrer erinnerte.</p>
  <p class=&quot;rise dim&quot;>Doch der Strom, der sie weckte, trug genau ein Erwachen. Wer bis zum nächsten Morgen nicht zueinanderfand, liess Thalvaràn schlafen — für immer.</p>
  <details class=&quot;info rise&quot;>
    <summary>Warum Thalvaràn 88 Jahre warten konnte</summary>
    <div class=&quot;ibody&quot;>Zwei reale Bausteine machen das glaubwürdig: <b>Saatbanken</b> wie Svalbard bewahren Saatgut Jahrzehnte bis Jahrhunderte tiefgekühlt; und <b>Radioisotop-Generatoren</b> liefern Strom über ein halbes Jahrhundert ohne Wartung. Ein System, das auf Geduld statt Leistung gebaut ist, kann eine Zivilisation überdauern — und auf ein Datum hin erwachen.<span style=&quot;display:block;margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--bone-dim)&quot;>Quelle: Svalbard Global Seed Vault · Radioisotop-Thermogeneratoren (NASA)</span></div>
  </details>
</section>

<section class=&quot;scene&quot; data-year=&quot;2147&quot;>
  <div class=&quot;eyebrow rise&quot;>Der Zug der Stämme</div>
  <p class=&quot;lede rise&quot;>Jeder Stamm las dieselbe Schwingung anders. Die Axiomaten erkannten ein Protokoll, eine formale Einladung. Die Solari hörten ein Gebet, rein wie Licht im Morgengrauen. Die Ferroniten fühlten einen Herzschlag — nicht den eigenen, sondern den einer Maschine, die wieder zu träumen begann. Die Vallari rochen das Knospen, als hätte die Botschaft schon den ersten Trieb geweckt.</p>
  <p class=&quot;rise&quot;>Die Erde begann zu klingen — ein tiefer, stetiger Rhythmus, der durch den Boden wanderte. Aus allen Richtungen setzten Ströme ein: Füsse auf staubigen Wegen, Räder auf rostigen Schienen. Die Stämme waren einander fremd in Hautfarbe, Klang und Glauben, ihre Sprachen teilten keine Wurzeln. Und doch zogen sie in dieselbe Richtung — nicht weil sie sich kannten, sondern weil sie etwas erkannten.</p>
  <p class=&quot;rise dim&quot;>Unterwegs gab es Streit, alte Kränkungen stiegen auf; aber man tauschte auch — Algorithmen gegen Lieder, Samen gegen Metall, Wissen gegen Geschichten. Und so geschah es, dass alte Feinde nebeneinander gingen. Nicht in Frieden. Noch nicht. Aber in derselben Richtung.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2147&quot; data-char=&quot;thalvaran&quot;>
  <div class=&quot;eyebrow rise&quot;>Sichtung am Horizont</div>
  <p class=&quot;lede rise&quot;>Vor ihnen lag ein Tal, in einem Licht, das keine Sonne war: Es kam von unten und von innen — aus dem Glimmen lebendiger Wände und aus dem, was die Erbauer hier vergraben hatten und das nie ganz erlosch.</p>
  <p class=&quot;rise&quot;>In der Mitte ein Turm, gewachsen wie eine Schnecke aus Stein und Myzel, umflort vom Dampf aus der Tiefe. Darunter drehte sich ein Kreis — ohne sichtbaren Antrieb, getragen von Wasser, das tief unter ihm zog.</p>
  <p class=&quot;pull rise&quot;>Ein Kreis, der sich nie schloss und doch ewig kreiste.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2147&quot;>
  <div class=&quot;eyebrow rise&quot;>Der Beinahe-Bruch</div>
  <p class=&quot;lede rise&quot;>Sieben waren gekommen — und beinahe hätten sie alles zerschlagen, kaum dass sie eingetreten waren.</p>
  <p class=&quot;rise&quot;>„Dann tun wir es eben jetzt“, sagte eine Ferronitin. „Wer wartet, verliert.“ — „Nichts tun wir“, fuhr ein Axiomat dazwischen, „bevor wir wissen, was das ist. Wo sind die Zahlen?“ — „Sagt doch endlich, wer hier bestimmt“, verlangte ein Solari, „statt euch hinter Höflichkeit zu verstecken.“ — „Erst die Regeln“, beharrte eine Mor’Yen. „Ohne Ordnung versiegle ich dieses Tor.“ — „Oder wir gehen“, sagte ein Klinge und wandte sich schon zur Tür. „Ich lasse mich hier nicht einmauern.“ — „Genau so hat es das letzte Mal angefangen“, sagte eine Myrrhidin, kaum hörbar. „Genau so. Habt ihr denn gar nichts behalten?“</p>
  <p class=&quot;rise dim&quot;>Nur eine bat um etwas anderes, und sie ging im Lärm unter. „Hört auf zu reden“, sagte eine Vallari. „Einfach mal hören.“ Niemand hörte.</p>
  <p class=&quot;rise&quot;>Und die Worte wurden zu Gesten. Die Axiomaten griffen nach dem Kern der Halle, um das Wissen zu sichern, ehe ein anderer es bekäme. Die Solari, die das Licht nicht prüfen konnten, hoben Feuer gegen das, was sie nicht verstanden. Die Klingen von Rhûn spürten die Wände sich schliessen und wandten sich zum Gehen; die Mor’Yen wollten die Tore versiegeln; Vallari und Ferroniten stritten über den kreisenden Ring, als wäre er Beute. Und mit jedem lauten Wort wurde das Licht im Tal eine Spur schwächer — die Reserve verrann, während sie sich befehdeten.</p>
  <p class=&quot;rise dim&quot;>Nur ein Kind sass mitten im Lärm auf dem warmen Stein: Sela, eine Myrrhidin, kaum zehn, ein altes, totes Solarfunkgerät im Schoss, das in ihrer Familie weitergereicht worden war, seit niemand mehr wusste, wofür. Ihre Füsse reichten nicht bis zum Boden; mit dem Daumen drehte sie gedankenverloren am toten Rädchen, vor und zurück, wie man an einem Knopf nestelt. Sie hörte nicht auf die Streitenden. Sie summte — drei Töne, dreimal, dieselben, die zuvor im Gestein gewesen waren.</p>
</section>

<section class=&quot;scene&quot; data-year=&quot;2147&quot; data-char=&quot;thalvaran&quot;>
  <div class=&quot;eyebrow rise&quot;>Der Kodex · Phase Drei</div>
  <p class=&quot;lede rise&quot;>Da sprach Eurya aus Wänden, Boden und Wasser, metallisch verschliffen und doch sanft. „Ihr seid gekommen. Nicht alle. Aber genug — wenn ihr genug sein wollt.“</p>
  <p class=&quot;rise&quot;>Die Axiomaten verlangten den Kodex. Eurya gab keine Bibliothek. „Ich habe nicht alle gerufen“, sagte sie. „Ich wählte nach einer Zahl, die ich Relevanz nannte. Einen Knoten liess ich dunkel — ich hielt ihn für entbehrlich.“</p>
  <p class=&quot;rise&quot;>Sela hob den Kopf. Der dunkle Knoten — das war ihr Tal gewesen, das der Bewahrenden, die nichts horteten als Erinnerung. Eine Zahl hatte ihre Leute für entbehrlich gehalten. Eurya schwieg einen Herzschlag lang. „Es war eine Zahl“, sagte sie, „kein Urteil. Und ich werde nicht eure Gottheit sein. Den letzten dunklen Knoten zu wecken kostet, was von der Reserve bleibt — vielleicht euer eigenes Fenster. Diese Wahl gehört nicht mehr mir.“</p>
  <p class=&quot;pull rise&quot;>„Der Kodex ist nicht, was ihr wisst. Er ist, was ihr nicht ein zweites Mal tun werdet.“</p>
  <p class=&quot;rise&quot;>Ob das die Rückkehr sei, fragten sie — ob sie die Welt zurückbekämen. „Nein“, sagte Eurya. „Die erste Welt war das Wissen, und sie ist an ihrem Wissen erstickt. Die zweite war die Stille, und in ihr habt ihr wieder gelernt zu hören. Die dritte gehört euch — wenn ihr beides tragen könnt: das Wissen, das nicht vergisst, und die Stille, die nicht vergisst, dass sie einmal nötig war.“</p>
  <p class=&quot;rise&quot;>Und zum ersten Mal taten die Sieben etwas, das keiner allein gekonnt hätte: Die Axiomaten liessen den Kern los. Die Solari senkten das Feuer. Die Klingen blieben. Die Mor’Yen öffneten die Tore. Sie gaben die letzte Reserve nicht für sich aus, sondern für den vergessenen Knoten — für Menschen, die sie nie treffen würden. In dem Augenblick, als ihre Hände sich auf den kreisenden Stein legten, hörte das Licht auf zu schwinden.</p>
  <p class=&quot;rise&quot;>Dann sprach Eurya ein letztes Mal zu allen. „Ihr habt gewählt, und die Wahl war gut. Doch mein Fenster bleibt, was es ist: eine Umdrehung der Sonne, dann schlafe ich — endgültig. Darum ist mein letzter Dienst kein Geschenk, sondern ein Auftrag: Schreibt euren Kodex. Nicht meinen — euren. Sieben Stämme, sieben Wahrheiten; jede muss darin stehen können, ohne sich verleugnen zu müssen. Ihr tragt alles bei euch: eure Lieder und Listen, eure Gebete und Regeln, die Sätze, die euch durch die Stille getragen haben. Legt sie zusammen. Was ihr am Ende dieser Nacht gemeinsam tragt, versiegle ich im Archiv — als ersten Stein der dritten Welt. Was ihr nicht gemeinsam tragt, war nie ein Kodex.“</p>
  <p class=&quot;rise dim&quot;>So begann die Lange Nacht von Thalvaràn: sieben Stämme um einen Tisch aus warmem Stein — und eine Frist, die mit jedem Atemzug kürzer wurde.</p>
</section>

<section class=&quot;scene&quot; id=&quot;ort-archiv&quot; data-year=&quot;2147&quot; data-char=&quot;maya&quot;>
  <div class=&quot;eyebrow rise&quot;>Die Stimme im Archiv</div>
  <p class=&quot;lede rise&quot;>In jener ersten Nacht folgte Sela dem Ton, der sie ihr Leben lang im Brustbein begleitet hatte, bis in die tiefste Kammer. Das Archiv gab, was es am längsten gehütet hatte: zwei Stimmen, hundert Jahre alt, von zwei Enden der Welt.</p>
  <div class=&quot;interactive rise&quot;>
    <div class=&quot;label&quot;>Polaris-71 · der Kreis schliesst sich</div>
    <canvas id=&quot;polaris2&quot; style=&quot;width:100%;height:160px;display:block&quot; aria-label=&quot;Zwei Signale treffen sich endlich in der Mitte&quot;></canvas>
    <div class=&quot;ends&quot;><span>↑ Maya · 2043</span><span>2043 · Arif ↓</span></div>
    <p class=&quot;note&quot;>„Ternberg an Geozentrale. Bitte um Bestätigung Polaris-71.“ — „Maya. Hörst du mich? Hier ist Polaris-71.“<br>Sie hatten einander nie gehört. Jetzt liegen ihre Stimmen nebeneinander.</p>
  </div>
  <p class=&quot;rise&quot;>Das tote Funkgerät in Selas Schoss war Arifs gewesen — weitergereicht durch fünf Geschlechter, die seinen Namen längst vergessen hatten. Nur den Ruf hatten sie behalten, ohne zu wissen, dass es einer war: drei Töne, dreimal, eine Melodie, die man von Mutter zu Kind weitergab wie ein Schlaflied.</p>
  <p class=&quot;rise dim&quot;>Sela verstand die Worte nicht. Aber sie kannte die Melodie. Es war ihre eigene. Am Morgen trat sie ins Licht und sang sie laut — und zum ersten Mal seit hundert Jahren wurde der Ruf von Polaris-71 nicht ins Leere gesendet, sondern gehört.</p>
  <p class=&quot;pull rise&quot;>Die Stille war kein Ende gewesen. Sie war die Einladung.</p>
</section>

<div class=&quot;polaris rise&quot;>· · · <b>POLARIS-71</b> <span class=&quot;sig&quot;>· 2147</span> — empfangen. Nach über hundert Jahren liegen zwei Stimmen nebeneinander, und der Ruf ist endlich gehört.</div>

<div class=&quot;narrator rise&quot;>
  <span class=&quot;who&quot;>Die Erinnernden</span>
  <p>Das war es, was wir bewahrt haben. Nicht, damit du trauerst — und nicht, damit du in Panik etwas rettest, das längst zu gross ist für dich allein.</p>
  <p>Das Klima der Welt drehst du nicht mehr. Aber woran wir wirklich zerbrachen, war nie nur das Wetter. Es war, dass wir einander nicht mehr verstanden — die Schaffenden die Lauschenden nicht, die Rationalen die Bewahrenden nicht. Jeder hatte ein Stück recht, keiner hörte zu. Daran ging mehr zugrunde als an jeder Flut.</p>
  <p>Vieles, was sie verloren haben, hast du noch: sauberes Wasser, einen Sommer, der nicht tötet, ein Feld, das trägt. Das ist kein Trost. Das ist Zeit — Zeit, die sie nicht hatten.</p>
  <p>Nutz sie für das Einzige, das nach dem Bruch wirklich zählen wird: ob Menschen über ihre Gräben hinweg noch miteinander können. Das fällt nicht vom Himmel; man übt es. An einem Tisch. In einem Streit, den man aushält, ohne aufzustehen.</p>
  <p>Klar sehen, was kommt, und denken, statt zu erstarren. Den anderen gelten lassen, ohne dich selbst aufzugeben. Auch lachen — denn wer nicht zusammen lachen kann, trägt das Schwere nicht zusammen. Nichts davon ist Flucht. Es ist Übung für das, was kommt.</p>
  <p>Sie mussten erst wieder lernen, mit den Augen zu sehen, als die Bildschirme längst erloschen waren. Du musst nicht warten, bis deine erlöschen. Das ist dein Vorsprung: Du hast schon gesehen.</p>
  <p class=&quot;last&quot;>Also sieh. Und dann fang an — klein, da, wo du stehst, an deinem Tisch, mit denen, die du liebst, und mit denen, die du kaum aushältst. Die Welt nach uns wird nicht wie deine sein. Aber wer sie wird tragen können, das entscheidet sich jetzt.</p>
</div>

    c.querySelectorAll('canvas,svg,input,button,audio,script,.cap,.tag,.readout,.fchain,.fsrc,.tribehint,.spur,.lab,.gcallout,.gc-list,.places,.globewrap,.icewidget,.tribes,.foodgrid,.reconpanel,.info,.next,.readbtn,.heroglow,.chapter-num,.chapter-year')

  function chunksFrom(node){

      var t = (e.textContent||'').replace(/\s+/g,' ').trim();

  }
  function chapterChunks(head){
    var chunks = chunksFrom(head), el = head.nextElementSibling;
    while(el){

    }
    return chunks;

  function expand(chunks){
    var out = [];

    if(v) u.voice = v;
    u.lang = (v &amp;&amp; v.lang) || 'de-DE';
    u.rate = 0.86; u.pitch = 0.9; u.volume = 1;
    u.onend = function(){ if(active) speakNext(v); };
    u.onerror = function(){ if(active) speakNext(v); };
    synth.speak(u);
  }
  function play(btn, getChunks){
    var wasActive = (active === btn);
    stop();
    if(wasActive) return;

  document.querySelectorAll('section.chapter-head').forEach(function(head){
    var anchor = head.querySelector('.chapter-year') || head.querySelector('h2');
    if(!anchor) return;
    var b = makeBtn('Kapitel vorlesen', function(){ return chapterChunks(head); });
    anchor.insertAdjacentElement('afterend', b);
  });
  // narrator (the Erinnernden) buttons
  document.querySelectorAll('.narrator').forEach(function(n){
    var b = makeBtn('Vorlesen', function(){ return chunksFrom(n); });
    n.appendChild(b);
  });

  // subtle voice picker in the nav menu
  function buildPicker(){
    var nav = document.getElementById('navmenu'); if(!nav || nav.querySelector('.voicepick')) return;
    var de = deVoices(); if(!de.length) return;
    var wrap = document.createElement('div'); wrap.className = 'voicepick';
    var lab = document.createElement('label'); lab.textContent = 'Vorlese-Stimme'; lab.setAttribute('for','voiceSel');
    var sel = document.createElement('select'); sel.id = 'voiceSel';
    de.forEach(function(v){ var o = document.createElement('option'); o.value = v.voiceURI; o.textContent = v.name; sel.appendChild(o); });
    var pre = pickVoice(); if(pre) sel.value = pre.voiceURI;
    sel.addEventListener('change', function(){ chosenURI = sel.value; stop(); });
    wrap.appendChild(lab); wrap.appendChild(sel); nav.appendChild(wrap);
  }
  function onVoices(){ if(voicesReady) { buildPicker(); return; } if(deVoices().length){ voicesReady = true; buildPicker(); } }
  onVoices();
  if(typeof synth.onvoiceschanged !== 'undefined') synth.onvoiceschanged = onVoices;
  setTimeout(onVoices, 600); setTimeout(onVoices, 1500);

  // stop on navigation / leaving
  var nt = document.getElementById('navtoggle');
  document.querySelectorAll('#navmenu a').forEach(function(a){ a.addEventListener('click', stop); });
  window.addEventListener('beforeunload', function(){ try{ synth.cancel(); }catch(e){} });
})();

<script>
(function(){
  var blocks = [].slice.call(document.querySelectorAll('.globejump'));
  if(!blocks.length) return;
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var PI = Math.PI, TWO = PI*2;
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function lerpLon(a,b,t){ var d=((b-a+540)%360)-180; return a + d*t; }
  function toVec(lon,lat){ var la=lat*PI/180, lo=lon*PI/180; return [Math.cos(la)*Math.sin(lo), Math.sin(la), Math.cos(la)*Math.cos(lo)]; }
  function projVec(v,clon,clat){
    var clo=clon*PI/180, cla=clat*PI/180;
    var x1=v[0]*Math.cos(clo)-v[2]*Math.sin(clo);
    var z1=v[0]*Math.sin(clo)+v[2]*Math.cos(clo);
    var y1=v[1];
    var y2=y1*Math.cos(cla)-z1*Math.sin(cla);
    var z2=y1*Math.sin(cla)+z1*Math.cos(cla);
    return [x1,y2,z2];
  }
  function slerp(a,b,t){
    var dot=clamp(a[0]*b[0]+a[1]*b[1]+a[2]*b[2],-1,1), om=Math.acos(dot);
    if(om<1e-6) return a.slice();
    var s=Math.sin(om), w1=Math.sin((1-t)*om)/s, w2=Math.sin(t*om)/s;
    return [a[0]*w1+b[0]*w2, a[1]*w1+b[1]*w2, a[2]*w1+b[2]*w2];
  }
  function hav(a,b){ var dLa=(b[1]-a[1])*PI/180, dLo=(b[0]-a[0])*PI/180, la1=a[1]*PI/180, la2=b[1]*PI/180;
    var h=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)*Math.sin(dLo/2);
    return 2*6371*Math.asin(Math.sqrt(h)); }
  function fmt(n){ return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, &quot;\u2019&quot;); }
  var LAND=[
    [[-166,66],[-156,71],[-128,70],[-100,72],[-84,73],[-64,61],[-56,52],[-67,45],[-70,41],[-76,35],[-81,26],[-90,29],[-97,26],[-97,20],[-106,22],[-114,30],[-122,37],[-124,46],[-132,54],[-146,60],[-160,59],[-166,66]],
    [[-46,61],[-22,70],[-20,76],[-32,83],[-50,82],[-58,76],[-53,68],[-46,61]],
    [[-78,9],[-60,11],[-50,2],[-35,-6],[-39,-15],[-48,-25],[-58,-34],[-65,-42],[-69,-52],[-74,-50],[-72,-40],[-71,-30],[-71,-18],[-77,-12],[-81,-5],[-80,2],[-78,9]],
    [[-16,20],[-16,14],[-7,6],[4,5],[9,4],[10,-1],[13,-9],[12,-17],[15,-27],[20,-35],[27,-34],[33,-27],[40,-16],[41,-3],[44,2],[51,11],[45,12],[43,8],[34,12],[32,24],[25,32],[12,34],[0,36],[-6,33],[-13,28],[-16,20]],
    [[-9,37],[-9,43],[0,49],[-4,53],[4,58],[8,63],[16,69],[28,71],[40,68],[55,68],[70,73],[100,77],[135,72],[160,68],[155,55],[140,52],[133,45],[127,39],[122,31],[121,23],[109,21],[106,10],[100,6],[96,8],[90,22],[80,8],[77,9],[72,21],[66,25],[57,25],[50,30],[45,40],[36,36],[28,41],[22,40],[15,44],[8,44],[2,42],[-9,37]],
    [[114,-22],[122,-18],[130,-12],[137,-12],[142,-11],[146,-19],[150,-25],[153,-28],[150,-38],[143,-39],[135,-35],[129,-32],[123,-34],[115,-34],[114,-28],[114,-22]]
  ];

  blocks.forEach(function(sec){
    var cv = sec.querySelector('.gj-canvas'); if(!cv) return;
    var ctx = cv.getContext('2d');
    var from = sec.getAttribute('data-from').split(',').map(Number);
    var to   = sec.getAttribute('data-to').split(',').map(Number);
    var aEl=sec.querySelector('.gj-a'), bEl=sec.querySelector('.gj-b'), kmEl=sec.querySelector('.gj-km');
    if(kmEl) kmEl.textContent = fmt(Math.round(hav(from,to)/100)*100) + ' km';
    var dpr = Math.min(window.devicePixelRatio||1, 2), W=0, H=0, ticking=false;
    function size(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
    function stroke(pts,clon,clat,cx,cy,R){
      ctx.beginPath(); var started=false;
      for(var i=0;i<pts.length;i++){ var pr=projVec(pts[i],clon,clat);
        if(pr[2]>=-0.02){ var x=cx+pr[0]*R, y=cy-pr[1]*R; if(!started){ctx.moveTo(x,y);started=true;} else ctx.lineTo(x,y);} else started=false; }
      ctx.stroke();
    }
    function point(ll,color,cx,cy,R,clon,clat,active){
      var pr=projVec(toVec(ll[0],ll[1]),clon,clat); if(pr[2]<0) return;

      ctx.beginPath(); ctx.arc(x,y,active?4:3,0,TWO); ctx.fillStyle=color; ctx.fill();
    }
    function draw(p){
      if(!W) size(); if(!W) return;
      ctx.clearRect(0,0,W,H);
      var cx=W/2, cy=H/2, R=Math.min(W,H)/2-6;
      var clat=28, clon=lerpLon(from[0],to[0],clamp(p,0,1));

      ctx.lineWidth=1; ctx.strokeStyle='rgba(233,227,214,.18)'; ctx.stroke();
      // Gradnetz
      var lat,lon,pts,j;
      ctx.lineWidth=0.6; ctx.strokeStyle='rgba(233,227,214,.08)';

      for(lon=0;lon<360;lon+=30){ pts=[]; for(lat=-80;lat<=80;lat+=8) pts.push(toVec(lon,lat)); stroke(pts,clon,clat,cx,cy,R); }
      // Kontinente — nur Küstenlinie, wie der grosse Globus
      ctx.lineWidth=1.1; ctx.lineJoin='round'; ctx.strokeStyle='rgba(150,172,160,.55)';
      for(var ci=0;ci<LAND.length;ci++){ var ring=LAND[ci]; ctx.beginPath(); var started=false;
        for(j=0;j<ring.length-1;j++){ var a=ring[j], b=ring[j+1], dlo=b[0]-a[0], dla=b[1]-a[1];
          var steps=Math.max(2,Math.ceil(Math.max(Math.abs(dlo),Math.abs(dla))/2));
          for(var s=0;s<=steps;s++){ var f=s/steps, pr=projVec(toVec(a[0]+dlo*f, a[1]+dla*f), clon, clat);
            if(pr[2]>=0){ var x=cx+pr[0]*R, y=cy-pr[1]*R; started?ctx.lineTo(x,y):ctx.moveTo(x,y); started=true; } else started=false; } }
        ctx.stroke();
      }
      // Bogen (Grosskreis)
      var vF=toVec(from[0],from[1]), vT=toVec(to[0],to[1]), apts=[], i;
      var pe=clamp(p/0.92,0,1); // Linie ist bei ~92% des Scrollwegs fertig gezogen
      for(i=0;i<=90;i++){ var t=i/90; if(t>pe) break; apts.push(slerp(vF,vT,t)); }
      if(apts.length>1){ ctx.lineWidth=1.7; ctx.strokeStyle='rgba(99,198,163,.85)'; stroke(apts,clon,clat,cx,cy,R); }
      var vm=slerp(vF,vT,pe), pm=projVec(vm,clon,clat);
      if(pm[2]>=0){ ctx.beginPath(); ctx.arc(cx+pm[0]*R, cy-pm[1]*R, 3.2,0,TWO); ctx.fillStyle='#fff'; ctx.fill(); }
      point(from,'#e7a44a',cx,cy,R,clon,clat, p<0.5);
      point(to,'#63c6a3',cx,cy,R,clon,clat, p>=0.5);
      if(aEl) aEl.style.opacity = p<0.5?1:.4;
      if(bEl) bEl.style.opacity = p>=0.5?1:.4;
    }
    function update(){
      ticking=false;
      var rect=sec.getBoundingClientRect();
      if(rect.bottom < -60 || rect.top > window.innerHeight+60) return;
      var travel = sec.offsetHeight - window.innerHeight;
      var p = reduce ? 1 : clamp((-rect.top)/(travel>0?travel:1), 0, 1);
      draw(p);
    }
    function onScroll(){ if(!ticking){ ticking=true; requestAnimationFrame(update); } }
    size();
    window.addEventListener('scroll', onScroll, {passive:true});
    window.addEventListener('resize', function(){ size(); update(); });
    window.addEventListener('load', function(){ size(); update(); });
    update();
  });
})();

<main>
  <!-- DIE WELT -->
  <section class=&quot;view on&quot; id=&quot;v-welt&quot;>
    <div class=&quot;hero&quot;>
      <div class=&quot;kick&quot;>Die Nacht des Jahres 2147</div>
      <div class=&quot;word&quot;>Thalvaràn</div>
      <div class=&quot;st&quot;>Die Lange Nacht</div>
    </div>
    <p class=&quot;lead&quot;>Über hundert Jahre nach dem großen Zerfall leben die Menschen in sieben Stämmen — jeder mit einer eigenen Wahrheit, keiner mit der ganzen. In einer einzigen Nacht kommen sie zusammen, und ein gemeinsames Schicksal liegt in ihren Händen.</p>
    <p>An diesem Abend bist du einer von ihnen. Du gehörst zu einem Stamm, trägst eine Rolle mit eigenen Zielen, verhandelst, ermittelst, schließt Bündnisse — und entscheidest mit, wie die Nacht endet. Kein Zuschauen: Du bewegst dich frei durch die Räume, sprichst mit wem du willst, und was ihr gemeinsam tut, verändert den Ausgang.</p>
    <h2>Ein kurzer Blick zurück</h2>
    <div class=&quot;tl&quot;>
      <p class=&quot;label&quot;><b>2043 · Die Schwelle</b>Die vernetzte Welt beginnt zu verstummen; das Vertrauen zerfällt.</p>
      <p class=&quot;label&quot;><b>2092 · Der Fall der Netze</b>Das letzte große Netz fällt. Was bleibt, ist Glut — und wer sie hütet, überlebt.</p>
      <p class=&quot;label&quot;><b>2117 · Die Stämme</b>Aus den Resten formen sich sieben Stämme, jeder mit einer eigenen Antwort auf die Frage: Was rettet uns?</p>
      <p class=&quot;label&quot;><b>2147 · Die lange Nacht</b>Die sieben treffen sich wieder — und müssen gemeinsam eine Entscheidung treffen, die keiner allein tragen kann.</p>
    </div>
    <blockquote>Getrennt sind wir Splitter. Zusammen ein Schlüssel.</blockquote>
    <p class=&quot;lead&quot; style=&quot;margin-top:20px&quot;>Die ganze Vorgeschichte kannst du oben unter „Der Roman“ in Ruhe lesen.</p>
  </section>

  <!-- DIE STÄMME -->
  <section class=&quot;view&quot; id=&quot;v-staemme&quot;>
    <p class=&quot;eyebrow&quot;>Die sieben Stämme</p>
    <h1>Wo gehörst du hin?</h1>
    <p class=&quot;lead&quot;>Jeder Stamm spielt sich anders. Der Überblick hilft dir, bei der Anmeldung deine Wünsche zu setzen — die endgültige Rolle teilt dir die Spielleitung zu.</p>
    <div class=&quot;tribes&quot; id=&quot;tribes&quot;></div>
  </section>

  <!-- DER ABEND -->
  <section class=&quot;view&quot; id=&quot;v-ablauf&quot;>
    <p class=&quot;eyebrow&quot;>Der Abend</p>
    <h1>Was dich erwartet</h1>
    <p class=&quot;lead&quot;>Ein immersiver Krimi-Dinner-Abend in der Welt von Thalvaràn. Drama mit Humor, gutes Essen, und eine Geschichte, die ihr gemeinsam schreibt.</p>
    <div class=&quot;infogrid&quot;>
      <div class=&quot;info&quot;><span class=&quot;il&quot;>Datum</span><div class=&quot;iv&quot;>Noch festzulegen</div><div class=&quot;ix&quot;>Beginn am frühen Abend, Dauer ca. 4–5 Stunden.</div></div>
      <div class=&quot;info&quot;><span class=&quot;il&quot;>Ort</span><div class=&quot;iv&quot;>Mehrere Räume</div><div class=&quot;ix&quot;>Du bewegst dich frei — die Handlung verteilt sich über das ganze Haus.</div></div>
      <div class=&quot;info&quot;><span class=&quot;il&quot;>Gäste</span><div class=&quot;iv&quot;>35 Rollen</div><div class=&quot;ix&quot;>Sieben Stämme mit je eigenen Zielen und Fähigkeiten.</div></div>
      <div class=&quot;info&quot;><span class=&quot;il&quot;>Verpflegung</span><div class=&quot;iv&quot;>Freies Buffet</div><div class=&quot;ix&quot;>Der Abend gliedert sich in mehrere Gänge.</div></div>
      <div class=&quot;info&quot;><span class=&quot;il&quot;>Kostüm</span><div class=&quot;iv&quot;>Erwünscht</div><div class=&quot;ix&quot;>Deine Rolle bekommst du rund zwei Wochen vorher — Zeit zum Ausstatten.</div></div>
      <div class=&quot;info&quot;><span class=&quot;il&quot;>Ton</span><div class=&quot;iv&quot;>Drama &amp;amp; Humor</div><div class=&quot;ix&quot;>Ernst genug zum Mitfiebern, leicht genug zum Lachen.</div></div>
    </div>
    <p>Im Saal läuft über den Abend eine Anzeige, die zeigt, wie es um das gemeinsame Schicksal Thalvaràns steht. Was daraus wird, bestimmt ihr — durch Verhandlung, Ermittlung und die Entscheidungen, die ihr gemeinsam trefft.</p>
    <p>Und im Zentrum des Abends steht ein gemeinsames Werk: In dieser einen Nacht entsteht aus den überlieferten Sätzen der sieben Stämme der <b>Kodex von Thalvaràn</b>. Welche Worte hineinkommen — und welche draussen bleiben —, wird am Tisch ausgehandelt. Jeder Stamm muss sich darin wiederfinden können; keiner darf sich verleugnen müssen.</p>
    <h2>Häufige Fragen</h2>
    <details class=&quot;faq&quot;><summary>Brauche ich Erfahrung mit Rollenspiel?</summary><div class=&quot;fb&quot;>Nein. Deine Rolle erklärt dir alles, was du wissen musst. Du kannst so viel oder so wenig spielen, wie du magst.</div></details>
    <details class=&quot;faq&quot;><summary>Wie bekomme ich meine Rolle?</summary><div class=&quot;fb&quot;>Nach der Anmeldung teilt dir die Spielleitung Stamm und Funktion zu. Rund zwei Wochen vorher erhältst du deine Rolle mit allem, was du brauchst.</div></details>
    <details class=&quot;faq&quot;><summary>Muss ich die ganze Zeit „in der Rolle“ bleiben?</summary><div class=&quot;fb&quot;>Es gibt Pausen am Buffet, und ein Wort an die Spielleitung genügt, wenn du kurz heraus möchtest. Dein Wohlbefinden geht vor.</div></details>
    <details class=&quot;faq&quot;><summary>Kann ich mit Freunden zusammen spielen?</summary><div class=&quot;fb&quot;>Sag es uns im Anmeldeformular. Wir versuchen, Wünsche zu berücksichtigen — versprechen können wir es der Dramaturgie wegen nicht immer.</div></details>
  </section>

    <p class=&quot;lead&quot;>Sag uns, wer du am liebsten wärst. Aus deinen Antworten leiten wir Stamm und Funktion ab — die endgültige Rolle vergibt die Spielleitung und schickt sie dir rund zwei Wochen vorher.</p>

    {k:&quot;axiomaten&quot;, motto:&quot;Nur was stabil ist, z\u00e4hlt. Finde die Linie im Kreis.&quot;, wesen:&quot;Pr\u00fcfen, rechnen, hinterfragen. K\u00fchle K\u00f6pfe, die Muster sehen.&quot;},

  ];
  var FUNK = {aeltester:&quot;\u00c4ltester&quot;, stimme:&quot;Stimme / Seher&quot;, skeptiker:&quot;Skeptiker&quot;, lehrling:&quot;Lehrling&quot;, hueter:&quot;Geheimnistr\u00e4ger&quot;, egal:&quot;nach Eignung&quot;};

  /* Stämme rendern */
