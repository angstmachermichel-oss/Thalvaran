    el.innerHTML = '<h3>'+s.name+'</h3><div class=&quot;arch&quot;>Stamm</div><div class=&quot;motto&quot;>\u201e'+t.motto+'\u201c</div><div class=&quot;wesen&quot;>'+t.wesen+'</div>';
    tribesEl.appendChild(el);
  });

  /* Ansicht-Umschaltung */
  var views = {welt:1, staemme:1, ablauf:1, anmeldung:1};
  var tabs = document.querySelectorAll(&quot;header.sub button&quot;);
  function show(v){
    Object.keys(views).forEach(function(k){ document.getElementById(&quot;v-&quot;+k).classList.toggle(&quot;on&quot;, k===v); });
    tabs.forEach(function(b){ b.setAttribute(&quot;aria-current&quot;, b.dataset.view===v ? &quot;true&quot;:&quot;false&quot;); });
    window.scrollTo(0,0);
  }
  tabs.forEach(function(b){ b.addEventListener(&quot;click&quot;, function(){ show(b.dataset.view); }); });

  /* Stamm-Optionen */
  var stammOpts = document.getElementById(&quot;stammOpts&quot;);
  Object.keys(STAMM).forEach(function(k){ var b=document.createElement(&quot;button&quot;); b.dataset.v=k; b.textContent=STAMM[k].name; stammOpts.appendChild(b); });
  var bs=document.createElement(&quot;button&quot;); bs.dataset.v=&quot;egal&quot;; bs.textContent=&quot;\u00fcberrasch mich&quot;; stammOpts.appendChild(bs);

  /* Antworten sammeln */
  var answers = {}; var multi = { freude: [] };
  document.querySelectorAll(&quot;.q[data-q]&quot;).forEach(function(q){

    q.querySelectorAll(&quot;.opts button&quot;).forEach(function(b){
      b.addEventListener(&quot;click&quot;, function(){
        if(isMulti){

  /* Stamm-Fit */
  function suggest(){
    var sc={ferroniten:0,axiomaten:0,myrrhiden:0,moryen:0,rhun:0,solari:0,vallari:0};
    function add(o){ Object.keys(o).forEach(function(k){ sc[k]+=o[k]; }); }
    var R={
      rat:{fuehren:{ferroniten:3,rhun:1},vermitteln:{solari:3,vallari:2},hinterfragen:{axiomaten:3},hintergrund:{myrrhiden:3,moryen:2}},

    if(answers.rat===&quot;hintergrund&quot; || answers.geheim===&quot;liebe&quot;) return &quot;hueter&quot;;
    if(answers.rat===&quot;vermitteln&quot;) return &quot;stimme&quot;;
    return &quot;lehrling&quot;;
  }

  var sending=false;
  function send(payload, done){
    if(String(ANMELDUNG_ENDPOINT).indexOf(&quot;http&quot;)!==0){ done(&quot;demo&quot;); return; }
    fetch(ANMELDUNG_ENDPOINT,{method:&quot;POST&quot;,headers:{&quot;Content-Type&quot;:&quot;text/plain;charset=utf-8&quot;},body:JSON.stringify(payload)})
      .then(function(r){ return r.text(); }).then(function(){ done(&quot;sent&quot;); }).catch(function(){ done(&quot;error&quot;); });
  }

  document.getElementById(&quot;annSubmit&quot;).addEventListener(&quot;click&quot;, function(){
    if(sending) return;
    var btn=this, name=(document.getElementById(&quot;annName&quot;).value||&quot;&quot;).trim(), mail=(document.getElementById(&quot;annMail&quot;).value||&quot;&quot;).trim();
    var conf=document.getElementById(&quot;annConfirm&quot;);
    if(!name || !emailOk(mail)){
      conf.classList.add(&quot;on&quot;); conf.style.borderColor=&quot;color-mix(in oklab,var(--blood),var(--frost))&quot;;
      conf.innerHTML='<div class=&quot;ch&quot; style=&quot;color:var(--blood)&quot;>Fast geschafft</div>Bitte trag Name und eine g\u00fcltige E-Mail ein.';
      document.getElementById(&quot;annName&quot;).scrollIntoView({behavior:&quot;smooth&quot;,block:&quot;center&quot;}); return;
    }
    conf.style.borderColor=&quot;&quot;;
    var best=suggest(), top=best[0], st=STAMM[top], fk=archetype();
    document.documentElement.style.setProperty(&quot;--tc&quot;, st.c);
    var wesen=(TRIBES.find(function(t){return t.k===top;})||{wesen:&quot;&quot;}).wesen;
    var res=document.getElementById(&quot;annResult&quot;);
    res.innerHTML='<span class=&quot;rk&quot;>Vorschlag der Spielleitung</span><div class=&quot;rt&quot;>'+st.name+(fk!==&quot;egal&quot;?&quot; \u00b7 &quot;+FUNK[fk]:&quot;&quot;)+'</div>'+
      '<p class=&quot;rr&quot;>'+wesen+'</p>'+
      '<p class=&quot;rb&quot;>Das passt zu deinen Antworten. <b>Die endg\u00fcltige Rolle vergibt die Spielleitung</b> und schickt sie dir rund zwei Wochen vorher.</p>'+
      '<p class=&quot;alts&quot;>Auch denkbar: '+STAMM[best[1]].name+&quot; \u00b7 &quot;+STAMM[best[2]].name+'</p>';
    res.classList.add(&quot;on&quot;);

    var payload={
      name:name, email:mail,
      rat:lab(&quot;rat&quot;,answers.rat), geheimnisse:lab(&quot;geheim&quot;,answers.geheim), bluffen:lab(&quot;bluff&quot;,answers.bluff),
      konflikt:lab(&quot;konflikt&quot;,answers.konflikt), auftritt:lab(&quot;auftritt&quot;,answers.auftritt),
      erfahrung:lab(&quot;erfahrung&quot;,answers.erfahrung), sonderrolle:lab(&quot;sonder&quot;,answers.sonder),
      freude:(multi.freude||[]).map(function(v){return lab(&quot;freude&quot;,v);}).join(&quot;, &quot;) || &quot;\u2014&quot;,
      frueh_briefing:lab(&quot;frueh&quot;,answers.frueh),
      wunsch_stamm: answers.stamm ? (answers.stamm===&quot;egal&quot;?&quot;\u00fcberrasch mich&quot;:(STAMM[answers.stamm]?STAMM[answers.stamm].name:answers.stamm)) : &quot;\u2014&quot;,
      wunsch_funktion: (answers.funktion &amp;&amp; answers.funktion!==&quot;egal&quot;) ? FUNK[answers.funktion] : &quot;egal&quot;,
      vorschlag_stamm: st.name,
      vorschlag_funktion: fk!==&quot;egal&quot; ? FUNK[fk] : &quot;nach Eignung&quot;,
      vorschlag_alternativen: STAMM[best[1]].name+&quot; / &quot;+STAMM[best[2]].name,
      hinweise:(document.getElementById(&quot;annHinweise&quot;).value||&quot;&quot;).trim() || &quot;\u2014&quot;,
      quelle:&quot;Thalvar\u00e0n Website&quot;
    };

    sending=true; btn.disabled=true; btn.textContent=&quot;Wird gesendet \u2026&quot;;
    conf.classList.add(&quot;on&quot;); conf.innerHTML='<div class=&quot;ch&quot;>Wird \u00fcbermittelt \u2026</div>Einen Moment.';
    send(payload, function(status){
      sending=false; btn.disabled=false; btn.textContent=&quot;Vorschlag berechnen &amp; anmelden&quot;;
      if(status===&quot;sent&quot;) conf.innerHTML='<div class=&quot;ch&quot;>Anmeldung gesendet</div>Danke, '+name+'. Deine Anmeldung ist bei der Spielleitung eingegangen. Du bekommst deine Rolle rund zwei Wochen vorher.';
      else if(status===&quot;demo&quot;) conf.innerHTML='<div class=&quot;ch&quot;>Vorschau-Modus</div>Danke, '+name+'. Sobald das Formular scharf geschaltet ist, geht deine Anmeldung automatisch an die Spielleitung.';
      else { conf.style.borderColor=&quot;color-mix(in oklab,var(--blood),var(--frost))&quot;; conf.innerHTML='<div class=&quot;ch&quot; style=&quot;color:var(--blood)&quot;>Senden hat nicht geklappt</div>Bitte versuch es gleich noch einmal.'; }
      res.scrollIntoView({behavior:&quot;smooth&quot;,block:&quot;start&quot;});
    });
  });
})();
</script>
</body>
</html>

<script>
  (function(){
    var fr=document.getElementById('f-roman'), fb=document.getElementById('f-bibel');
    var tr=document.getElementById('t-roman'), tb=document.getElementById('t-bibel');
    function show(which){
      var roman = which==='roman';
      fr.classList.toggle('on', roman); fb.classList.toggle('on', !roman);
      tr.setAttribute('aria-current', roman?'true':'false');
      tb.setAttribute('aria-current', roman?'false':'true');
    }
    tr.addEventListener('click', function(){ show('roman'); });
    tb.addEventListener('click', function(){ show('bibel'); });
  })();
</script>
