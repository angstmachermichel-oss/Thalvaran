<!DOCTYPE html>
<!-- Neues Dropdown-Menü, Vorgeschichte aktualisiert -->
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thalvaràn — Die Lange Nacht</title>
<style>
  :root{
    --ink:#080d10; --frost:#16242a; --frost-2:#1d2f35;
    --bone:#e9e3d6; --bone-dim:#a4aba8; --aurora:#63c6a3;
    <link rel="manifest" href="manifest.json">
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
    --bar:54px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--ink);color:var(--bone);font-family:var(--serif);overflow:hidden}
  header.bar{height:var(--bar);position:fixed;top:0;left:0;right:0;z-index:30;
    background:color-mix(in oklab,var(--ink),#000 28%);border-bottom:1px solid var(--frost);
    backdrop-filter:blur(8px);display:flex;align-items:center;gap:14px;padding:0 18px}
  .brand{display:flex;align-items:center;gap:10px;margin-right:auto;min-width:0}
  .sigil{width:28px;height:28px;flex:0 0 auto}
  .sigil svg{width:100%;height:100%}
  .sigil .r{fill:none;stroke:var(--aurora);stroke-width:1.6}
  .sigil .c{fill:var(--aurora)}
  .brand .mk{font-size:16px;letter-spacing:.05em;white-space:nowrap}
  .brand .sub{font-family:var(--mono);font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--bone-dim);display:block;margin-top:1px;white-space:nowrap}

  nav{display:flex;gap:4px;position:relative}
  nav button{font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;
    color:var(--bone-dim);background:transparent;border:1px solid var(--frost-2);border-radius:20px;
    padding:8px 14px;cursor:pointer;transition:.2s;white-space:nowrap}
  nav button:hover{color:var(--bone)}
  nav button[aria-current="true"]{color:#08110d;background:var(--aurora);border-color:var(--aurora)}

  .dropdown{position:relative}
  .dropdown > .dtoggle{display:inline-flex;align-items:center;gap:6px}
  .dropdown .car{font-size:9px;transition:transform .2s ease;display:inline-block}
  .dropdown.open .car{transform:rotate(180deg)}
  .dropdown-menu{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);
    background:color-mix(in oklab,var(--ink),#000 18%);border:1px solid var(--frost-2);border-radius:12px;
    padding:6px;display:none;flex-direction:column;gap:2px;min-width:180px;
    box-shadow:0 14px 34px rgba(0,0,0,.5);z-index:31}
  .dropdown.open .dropdown-menu{display:flex}
  .dropdown-menu button{width:100%;text-align:left;border-radius:8px;border-color:transparent;padding:9px 12px}
  .dropdown-menu button[aria-current="true"]{color:#08110d;background:var(--aurora)}

  @media (max-width:560px){
    .brand .sub{display:none}
    nav button{padding:8px 11px;font-size:10px}
    .dropdown-menu{left:auto;right:0;transform:none}
  }
  .frames{position:fixed;top:var(--bar);left:0;right:0;bottom:0}
  iframe.frame{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--ink)}
  iframe.frame.on{display:block}
  #install-banner{position:fixed;left:12px;right:12px;bottom:12px;z-index:40;background:color-mix(in oklab,var(--ink),#000 15%);border:1px solid var(--frost-2);border-radius:14px;padding:14px 14px;display:none;gap:12px;align-items:center;box-shadow:0 14px 34px rgba(0,0,0,.5);max-width:520px;margin:0 auto} #install-banner.show{display:flex} #install-banner .ib-icon{width:38px;height:38px;border-radius:9px;flex:0 0 auto;overflow:hidden} #install-banner .ib-icon img{width:100%;height:100%;display:block} #install-banner .ib-text{flex:1 1 auto;min-width:0} #install-banner .ib-title{font-size:14px;color:var(--bone);margin:0 0 2px} #install-banner .ib-desc{font-family:var(--mono);font-size:10.5px;letter-spacing:.02em;color:var(--bone-dim);line-height:1.5;margin:0} #install-banner .ib-actions{display:flex;gap:8px;flex:0 0 auto} #install-banner button{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;border-radius:16px;padding:8px 13px;cursor:pointer;white-space:nowrap;border:1px solid var(--frost-2);background:transparent;color:var(--bone-dim)} #install-banner button.primary{background:var(--aurora);border-color:var(--aurora);color:#08110d} #install-banner button:hover{color:var(--bone)} #install-banner button.primary:hover{color:#08110d} @media (max-width:480px){#install-banner{align-items:flex-start}#install-banner .ib-actions{flex-direction:column}}
</style>
</head>
<body>
<header class="bar">
  <div class="brand">
    <span class="sigil"><svg viewBox="0 0 28 28"><circle class="r" cx="14" cy="14" r="12"/><circle class="c" cx="14" cy="14" r="3.2"/></svg></span>
    <span><span class="mk">Thalvaràn</span><span class="sub">Die Lange Nacht</span></span>
  </div>
  <nav aria-label="Ansicht">
    <button id="t-vorgeschichte" data-section="vorgeschichte" aria-current="true">Vorgeschichte</button>

    <div class="dropdown" id="info-dropdown">
      <button class="dtoggle" id="t-info" data-section="info" aria-haspopup="true" aria-expanded="false">
        Informationen <span class="car">▾</span>
      </button>
      <div class="dropdown-menu" role="menu">
        <button data-section="info" data-view="welt" aria-current="false">Die Welt</button>
        <button data-section="info" data-view="staemme" aria-current="false">Die Stämme</button>
        <button data-section="info" data-view="ablauf" aria-current="false">Der Abend</button>
      </div>
    </div>

    <button id="t-anmeldung" data-section="anmeldung" data-view="anmeldung" aria-current="false">Anmeldung</button>
    <button id="t-spielzugang" data-section="spielzugang" aria-current="false">Spielzugang</button>
  </nav>
</header>

<div class="frames">
  <iframe id="f-vorgeschichte" class="frame on" title="Vorgeschichte" src="roman-final.html"></iframe>
  <iframe id="f-info" class="frame" title="Informationen &amp; Anmeldung" src="informationen.html"></iframe>
  <iframe id="f-spielzugang" class="frame" title="Spielzugang" src="thalvaran-kodex-app.html"></iframe>
  <div id="install-banner" role="dialog" aria-label="App installieren"><div class="ib-icon"><img src="icon-192.png" alt=""></div><div class="ib-text"><p class="ib-title" id="ib-title">Thalvaràn installieren</p>p><p class="ib-desc" id="ib-desc">Für schnellen Zugriff als App auf dem Startbildschirm speichern.</p>p></div><div class="ib-actions"><button id="ib-dismiss">Nicht jetzt</button>button><button id="ib-install" class="primary">Installieren</button>button></div></div>
</div>

<script>
(function(){
  var frames = {
    vorgeschichte: document.getElementById('f-vorgeschichte'),
    info:          document.getElementById('f-info'),
    anmeldung:     document.getElementById('f-info'),
    spielzugang:   document.getElementById('f-spielzugang')
  };
  var topButtons = document.querySelectorAll('nav > button, nav > .dropdown > .dtoggle');
  var infoDropdown = document.getElementById('info-dropdown');
  var infoToggle = document.getElementById('t-info');
  var infoMenuBtns = document.querySelectorAll('.dropdown-menu button');
  var loaded = {};

  ['f-vorgeschichte','f-info','f-spielzugang'].forEach(function(id){
    document.getElementById(id).addEventListener('load', function(){ loaded[id] = true; });
  });

  function frameIdOf(section){
    if(section === 'vorgeschichte') return 'f-vorgeschichte';
    if(section === 'spielzugang') return 'f-spielzugang';
    return 'f-info';
  }

  function setView(iframe, view){
    if(!view) return;
    function apply(){ try{ if(iframe.contentWindow && iframe.contentWindow.showView) iframe.contentWindow.showView(view); }catch(e){} }
    if(loaded[iframe.id]) apply();
    else iframe.addEventListener('load', apply, { once:true });
  }

  function closeDropdown(){
    infoDropdown.classList.remove('open');
    infoToggle.setAttribute('aria-expanded','false');
  }

  function activate(section, view){
    var fid = frameIdOf(section);
    Object.keys(frames).forEach(function(){});
    document.querySelectorAll('iframe.frame').forEach(function(f){ f.classList.toggle('on', f.id === fid); });

    document.getElementById('t-vorgeschichte').setAttribute('aria-current', section==='vorgeschichte' ? 'true':'false');
    document.getElementById('t-anmeldung').setAttribute('aria-current', section==='anmeldung' ? 'true':'false');
    document.getElementById('t-spielzugang').setAttribute('aria-current', section==='spielzugang' ? 'true':'false');
    infoToggle.setAttribute('aria-current', section==='info' ? 'true':'false');
    infoMenuBtns.forEach(function(b){ b.setAttribute('aria-current', (section==='info' && b.dataset.view===view) ? 'true':'false'); });

    setView(document.getElementById(fid), view);
    closeDropdown();
  }

  document.getElementById('t-vorgeschichte').addEventListener('click', function(){ activate('vorgeschichte'); });
  document.getElementById('t-anmeldung').addEventListener('click', function(){ activate('anmeldung','anmeldung'); });
  document.getElementById('t-spielzugang').addEventListener('click', function(){ activate('spielzugang'); });

  infoToggle.addEventListener('click', function(e){
    e.stopPropagation();
    var open = infoDropdown.classList.toggle('open');
    infoToggle.setAttribute('aria-expanded', open ? 'true':'false');
  });
  infoMenuBtns.forEach(function(b){
    b.addEventListener('click', function(){ activate('info', b.dataset.view); });
  });
  document.addEventListener('click', function(e){
    if(!infoDropdown.contains(e.target)) closeDropdown();
  });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closeDropdown();
  });
})();
  (function(){var KEY="thalvaran:installDismissedAt";var banner=document.getElementById("install-banner");var title=document.getElementById("ib-title");var desc=document.getElementById("ib-desc");var btnInstall=document.getElementById("ib-install");var btnDismiss=document.getElementById("ib-dismiss");var deferredPrompt=null;function isStandalone(){return window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone===true;}function isIos(){return /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());}function recentlyDismissed(){var t=localStorage.getItem(KEY);if(!t)return false;return(Date.now()-Number(t))<14*24*60*60*1000;}function dismiss(){try{localStorage.setItem(KEY,String(Date.now()));}catch(e){}banner.classList.remove("show");}if(isStandalone()||recentlyDismissed()){} else if(isIos()){title.textContent="Thalvaràn installieren";desc.textContent="h, dann „Zum Home-Bildschirm“ wählen.";btnInstall.style.display="none";banner.classList.add("show");}else{window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();deferredPrompt=e;title.textContent="Thalvaràn installieren";desc.textContent="Als App auf dem Startbildschirm speichern, für schnellen Zugriff auch offline.";banner.classList.add("show");});window.addEventListener("appinstalled",function(){dismiss();});}btnDismiss.addEventListener("click",dismiss);btnInstall.addEventListener("click",function(){if(!deferredPrompt)return;banner.classList.remove("show");deferredPrompt.prompt();deferredPrompt.userChoice.finally(function(){deferredPrompt=null;});});})();
</script>
</body>
</html>
